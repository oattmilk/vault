        )}
      </div>

      {/* Pockets */}
      {accGoals.map(g=>(
        <PocketRow key={g.id} g={g} fmt={fmt} updGoalSaved={updGoalSaved} delGoal={delGoal} allPockets={accGoals}/>
      ))}

      {/* Add pocket - inline form, single cancel */}
      {showPocketForm&&(
        <div style={{padding:"14px 16px",borderTop:"1px solid var(--b1)"}}>
          <div style={{display:"flex",gap:6,marginBottom:10}}>
            <PillBtn small active={goalForm.type!=="saving"} onClick={()=>setGoalForm(f=>({...f,type:"spending",accountId:acc.id,currency:acc.currency}))}>💸 Spending</PillBtn>
            <PillBtn small active={goalForm.type==="saving"} onClick={()=>setGoalForm(f=>({...f,type:"saving",accountId:acc.id,currency:acc.currency}))} color="var(--green)">🏦 Saving</PillBtn>
          </div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>
            {["🛒","🍕","🚗","✈️","🏠","🎬","💊","👗","🎮","☕","💰","🎓"].map(e=>(
              <button key={e} onClick={()=>setGoalForm(f=>({...f,emoji:e,accountId:acc.id,currency:acc.currency}))} style={{fontSize:16,padding:"3px 5px",borderRadius:6,cursor:"pointer",background:goalForm.emoji===e?"rgba(0,201,167,0.15)":"transparent",border:goalForm.emoji===e?"1px solid var(--acc)":"1px solid transparent"}}>{e}</button>
            ))}
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:10}}>
            <input placeholder="Pocket name" value={goalForm.accountId===acc.id?goalForm.name:""} onChange={e=>setGoalForm(f=>({...f,name:e.target.value,accountId:acc.id,currency:acc.currency}))} style={IS}/>
            {goalForm.type==="saving"&&(
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                <NumInput placeholder="Target amount" value={goalForm.accountId===acc.id?goalForm.target:""} onChange={v=>setGoalForm(f=>({...f,target:v,accountId:acc.id,currency:acc.currency}))} style={IS}/>
                <NumInput placeholder="Monthly contrib." value={goalForm.accountId===acc.id?goalForm.monthlyContrib||"":""} onChange={v=>setGoalForm(f=>({...f,monthlyContrib:v,accountId:acc.id,currency:acc.currency}))} style={IS}/>
              </div>
            )}
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>{setGoalForm(f=>({...f,accountId:acc.id,currency:acc.currency}));addGoal();setShowPocketForm(false);}} style={{flex:1,padding:"10px",borderRadius:8,border:"none",background:goalForm.type==="saving"?"var(--green)":"var(--acc)",color:"#000",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"var(--font)"}}>ADD POCKET</button>
            <button onClick={()=>setShowPocketForm(false)} style={{padding:"10px 16px",borderRadius:8,border:"1px solid var(--b2)",background:"transparent",color:"var(--muted)",fontSize:11,cursor:"pointer",fontFamily:"var(--font)"}}>CANCEL</button>
          </div>
        </div>
      )}

      {/* Toggle button - only show when form is hidden */}
      {!showPocketForm&&(
        <div style={{padding:"10px 16px",borderTop:"1px solid var(--b1)"}}>
          <button onClick={()=>{setShowPocketForm(true);setGoalForm(f=>({...f,accountId:acc.id,currency:acc.currency,name:"",target:"",emoji:"🛒",type:"spending"}));}} style={{background:"none",border:"none",color:"var(--acc)",fontSize:11,cursor:"pointer",fontFamily:"var(--font)"}}>
            + Add pocket
          </button>
        </div>
      )}
    </div>
  );
}

function PocketRow({g,fmt,updGoalSaved,delGoal,allPockets}) {
  const [mode,setMode]=useState(null);
  const [val,setVal]=useState("");
  const [moveTo,setMoveTo]=useState("free");
  const isSaving=g.type==="saving";
  const pct=isSaving&&g.target>0?(g.saved/g.target)*100:0;

  const confirm=()=>{
    const v=parseFloat(val);
    if(!isNaN(v)&&v>0){
      if(mode==="topup"){
        updGoalSaved(g.id, g.saved+v);
      } else if(mode==="move"){
        updGoalSaved(g.id, g.saved-v);
        if(moveTo!=="free"){
          const dest=allPockets.find(p=>String(p.id)===String(moveTo));
          if(dest) updGoalSaved(dest.id, dest.saved+v);
        }
      }
    }
    setVal(""); setMode(null); setMoveTo("free");
  };

  const otherPockets=allPockets.filter(p=>p.id!==g.id);

  return (
    <div style={{borderBottom:"1px solid var(--b1)",background:g.saved<0?"rgba(255,107,107,0.04)":"transparent"}}>
      <div style={{padding:"12px 16px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:isSaving&&g.target>0?6:0}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:16}}>{g.emoji}</span>
            <span style={{fontSize:13,fontWeight:600,color:"var(--fg)"}}>{g.name}</span>
            <span style={{fontSize:9,padding:"2px 5px",borderRadius:4,background:isSaving?"rgba(116,185,255,0.15)":"rgba(0,201,167,0.1)",color:isSaving?"var(--green)":"var(--green)"}}>{isSaving?"SAVE":"SPEND"}</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontSize:14,fontWeight:700,color:g.saved<0?"var(--red)":isSaving?"var(--green)":"var(--green)"}}>{fmt(g.saved)}</span>
            <MenuBtn items={[
              {label:"Top up",action:()=>setMode("topup")},
              {label:"Move",action:()=>setMode("move")},
              {label:"Delete",danger:true,action:()=>delGoal(g.id)},
            ]}/>
          </div>
        </div>
        {isSaving&&g.target>0&&(
          <>
            <ProgressBar pct={Math.min(pct,100)} color={pct>=100?"var(--acc)":"var(--green)"}/>
            <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
              <span style={{fontSize:10,color:"var(--muted)"}}>{pct.toFixed(0)}%</span>
              <span style={{fontSize:10,color:"var(--muted)"}}>of {fmt(g.target)}</span>
            </div>
          </>
        )}
        {g.saved<0&&!mode&&(
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:6,padding:"6px 10px",borderRadius:6,background:"rgba(255,107,107,0.08)"}}>
            <span style={{fontSize:11,color:"var(--red)"}}>Cover this?</span>
            <button onClick={()=>setMode("topup")} style={{fontSize:11,color:"var(--acc)",background:"none",border:"1px solid var(--acc)",borderRadius:6,padding:"3px 10px",cursor:"pointer",fontFamily:"var(--font)"}}>+ Add</button>
          </div>
        )}
      </div>
      {mode&&(
        <div style={{padding:"0 16px 12px",display:"flex",flexDirection:"column",gap:6}}>
          {mode==="move"&&(
            <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
              <PillBtn small active={moveTo==="free"} onClick={()=>setMoveTo("free")}>🆓 Free</PillBtn>
              {otherPockets.map(p=>(
                <PillBtn small key={p.id} active={String(moveTo)===String(p.id)} onClick={()=>setMoveTo(String(p.id))} color="var(--green)">{p.emoji} {p.name}</PillBtn>
              ))}
            </div>
          )}
          <div style={{display:"flex",gap:6}}>
            <NumInput value={val} onChange={v=>setVal(v)} placeholder="Amount" style={{...IS,flex:1,padding:"8px 10px"}}/>
            <button onClick={confirm} style={{padding:"0 14px",borderRadius:8,border:"none",background:mode==="topup"?"var(--acc)":"var(--green)",color:"#000",fontSize:11,fontWeight:700,cursor:"pointer"}}>OK</button>
            <button onClick={()=>{setVal("");setMode(null);}} style={{padding:"0 10px",borderRadius:8,border:"1px solid var(--b2)",background:"transparent",color:"var(--muted)",fontSize:11,cursor:"pointer"}}>×</button>
          </div>
        </div>
      )}
    </div>
  );
}

function DebtCard({d,fmt,pct,dynamicMonthly,_totalMonths,daysUntil,delDebt,upd,data}) {
  const [showEdit,setShowEdit]=useState(false);
  const [editForm,setEditForm]=useState({name:d.name,remaining:d.remaining,nextDate:d.nextDate||""});
  const debts=data.debts||[];

  const saveEdit=()=>{
    const updated={...d,name:editForm.name,remaining:parseFloat(editForm.remaining)||0,nextDate:editForm.nextDate};
    upd("debts",debts.map(debt=>debt.id===d.id?updated:debt));
    setShowEdit(false);
  };

  return (
    <div style={{background:"var(--s1)",borderRadius:14,padding:"14px 16px",border:"1px solid rgba(255,107,107,0.2)"}}>
      <Modal show={showEdit} onClose={()=>setShowEdit(false)} title="Edit Debt">
        <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:16}}>
          <Field label="NAME"><input value={editForm.name} onChange={e=>setEditForm(f=>({...f,name:e.target.value}))} style={IS}/></Field>
          <Field label="REMAINING"><NumInput value={editForm.remaining} onChange={v=>setEditForm(f=>({...f,remaining:v}))} style={IS}/></Field>
          <DatePicker label="NEXT PAYMENT" value={editForm.nextDate} onChange={v=>setEditForm(f=>({...f,nextDate:v}))}/>
        </div>
        <ActionBtn onClick={saveEdit} color="var(--red)">SAVE</ActionBtn>
      </Modal>

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
        <div style={{flex:1}}>
          <div style={{fontSize:14,fontWeight:700,color:"var(--fg)"}}>💳 {d.name}</div>
          {_totalMonths>0&&<div style={{fontSize:11,color:"var(--muted)",marginTop:2}}>{fmt(dynamicMonthly)}/mo · {_totalMonths} months</div>}
          {daysUntil!==null&&(
            <div style={{fontSize:11,marginTop:3,color:daysUntil<=3?"var(--red)":daysUntil<=7?"var(--amber)":"var(--muted)"}}>
              Next: {daysUntil<0?"Overdue":daysUntil===0?"Today":`in ${daysUntil}d`}
            </div>
          )}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:16,fontWeight:700,color:"var(--red)"}}>{fmt(d.remaining)}</div>
            <div style={{fontSize:10,color:"var(--muted)"}}>of {fmt(d.total)}</div>
          </div>
          <MenuBtn items={[
            {label:"Edit",action:()=>{setEditForm({name:d.name,remaining:d.remaining,nextDate:d.nextDate||""});setShowEdit(true);}},
            {label:"Delete",danger:true,action:()=>delDebt(d.id)},
          ]}/>
        </div>
      </div>
      <ProgressBar pct={pct} color="var(--acc)"/>
    </div>
  );
}

function SubRow({s,i,total,del,upd,data}) {
  const [showEdit,setShowEdit]=useState(false);
  const [editForm,setEditForm]=useState({name:s.name,amount:s.amount,renewal:s.renewal,nextDate:s.nextDate||""});
  const days=Math.ceil((new Date(s.nextDate)-new Date())/86400000);
  const fmt=s.currency==="IDR"?fmtIDR:fmtEUR;
  const subs=data.subscriptions||[];

  const saveEdit=()=>{
    const updated={...s,name:editForm.name,amount:parseFloat(editForm.amount)||0,renewal:editForm.renewal,nextDate:editForm.nextDate};
    upd("subscriptions",subs.map(sub=>sub.id===s.id?updated:sub));
    setShowEdit(false);
  };

  return (
    <div style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",borderBottom:i<total-1?"1px solid var(--b1)":"none"}}>
      <Modal show={showEdit} onClose={()=>setShowEdit(false)} title="Edit Subscription">
        <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:16}}>
          <Field label="NAME"><input value={editForm.name} onChange={e=>setEditForm(f=>({...f,name:e.target.value}))} style={IS}/></Field>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <Field label="AMOUNT"><NumInput value={editForm.amount} onChange={v=>setEditForm(f=>({...f,amount:v}))} style={IS}/></Field>
            <Field label="RENEWAL"><select value={editForm.renewal} onChange={e=>setEditForm(f=>({...f,renewal:e.target.value}))} style={IS}>{RENEWAL.map(r=><option key={r}>{r}</option>)}</select></Field>
          </div>
          <DatePicker label="NEXT RENEWAL" value={editForm.nextDate} onChange={v=>setEditForm(f=>({...f,nextDate:v}))}/>
        </div>
        <ActionBtn onClick={saveEdit} color="var(--acc)">SAVE</ActionBtn>
      </Modal>

      <div style={{width:36,height:36,borderRadius:10,background:"rgba(196,181,253,0.12)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700,color:"var(--acc)",flexShrink:0}}>
        {s.name[0].toUpperCase()}
      </div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:13,fontWeight:600,color:"var(--fg)"}}>{s.name}</div>
        <div style={{fontSize:11,color:"var(--muted)",marginTop:1}}>{s.renewal}</div>
        <div style={{fontSize:11,marginTop:1,color:days<=3?"var(--red)":days<=7?"var(--amber)":"var(--muted)"}}>
          {days<0?"Overdue":days===0?"Due today":`Due in ${days}d`}
        </div>
      </div>
      <div style={{textAlign:"right",flexShrink:0}}>
        <div style={{fontSize:14,fontWeight:700,color:"var(--orange)"}}>{fmt(s.amount)}</div>
      </div>
      <MenuBtn openUp items={[
        {label:"Edit",action:()=>{setEditForm({name:s.name,amount:s.amount,renewal:s.renewal,nextDate:s.nextDate||""});setShowEdit(true);}},
        {label:"Delete",danger:true,action:()=>del(s.id)},
      ]}/>
    </div>
  );
}

function SettingsBtn({data,upd}) {
  const [show,setShow]=useState(false);
  const [confirmReset,setConfirmReset]=useState(false);
  const [showCategories,setShowCategories]=useState(false);

  const exportData=()=>{
    const json=JSON.stringify(data,null,2);
    navigator.clipboard.writeText(json).then(()=>{
      alert("Data copied to clipboard!");
    }).catch(()=>{
      const w=window.open("","_blank");
      w.document.write("<pre>"+json+"</pre>");
    });
    setShow(false);
  };

  const doReset=()=>{
    localStorage.clear();
    window.location.reload();
  };

  return (
    <div style={{position:"relative"}}>
      <button onClick={()=>setShow(s=>!s)} style={{background:"none",border:"none",color:"var(--muted)",fontSize:18,cursor:"pointer",padding:"4px",lineHeight:1}}>☰</button>
      
      {/* Dropdown menu */}
      {show&&(
        <>
          <div onClick={()=>setShow(false)} style={{position:"fixed",inset:0,zIndex:40}}/>
          <div style={{position:"absolute",left:0,top:"calc(100% + 8px)",background:"var(--s2)",border:"1px solid var(--b2)",borderRadius:10,zIndex:50,minWidth:200,boxShadow:"0 4px 20px rgba(0,0,0,0.5)",overflow:"hidden"}}>
            <button onClick={()=>{setShow(false);setShowCategories(true);}} style={{
              display:"block",width:"100%",padding:"12px 16px",border:"none",
              borderBottom:"1px solid var(--b1)",
              background:"transparent",color:"var(--fg)",
              fontSize:13,fontFamily:"var(--font)",cursor:"pointer",textAlign:"left",whiteSpace:"nowrap",
            }}>
              ◷ Manage Categories
            </button>
            <button onClick={exportData} style={{
              display:"block",width:"100%",padding:"12px 16px",border:"none",
              borderBottom:"1px solid var(--b1)",
              background:"transparent",color:"var(--fg)",
              fontSize:13,fontFamily:"var(--font)",cursor:"pointer",textAlign:"left",
            }}>
              ↗ Export Data
            </button>
            <button onClick={()=>{setShow(false);setConfirmReset(true);}} style={{
              display:"block",width:"100%",padding:"12px 16px",border:"none",
              background:"transparent",color:"var(--red)",
              fontSize:13,fontFamily:"var(--font)",cursor:"pointer",textAlign:"left",
            }}>
              × Reset Data
            </button>
          </div>
        </>
      )}

      {/* Manage Categories Modal */}
      <ManageCategoriesModal show={showCategories} onClose={()=>setShowCategories(false)} data={data} upd={upd}/>

      {/* Reset confirmation modal */}
      <Modal show={confirmReset} onClose={()=>setConfirmReset(false)} title="Reset All Data?">
        <div style={{fontSize:13,color:"var(--muted)",marginBottom:16,textAlign:"center"}}>
          This will delete all your accounts, transactions, debts, subscriptions, and investments. This cannot be undone.
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={doReset} style={{
            flex:1,padding:"12px",borderRadius:8,border:"none",background:"var(--red)",
            color:"#fff",fontSize:12,fontFamily:"var(--font)",cursor:"pointer",fontWeight:700,
          }}>YES, DELETE EVERYTHING</button>
          <button onClick={()=>setConfirmReset(false)} style={{
            flex:1,padding:"12px",borderRadius:8,border:"1px solid var(--b2)",
            background:"transparent",color:"var(--muted)",fontSize:12,fontFamily:"var(--font)",cursor:"pointer",
          }}>CANCEL</button>
        </div>
      </Modal>
    </div>
  );
}

// Manage Categories Modal
function ManageCategoriesModal({show,onClose,data,upd}) {
  const [newCat,setNewCat]=useState("");
  const [newColor,setNewColor]=useState("#FF6B6B");
  const [newType,setNewType]=useState("expense");
  const [editId,setEditId]=useState(null);
  const [editName,setEditName]=useState("");
  const [editColor,setEditColor]=useState("");
  
  const categories=data.categories||[];
  const expCats=categories.filter(c=>c.type==="expense");
  const incCats=categories.filter(c=>c.type==="income");
  const sysCats=categories.filter(c=>c.type==="system");
  
  const addCat=()=>{
    if(!newCat.trim()) return;
    if(categories.find(c=>c.name.toLowerCase()===newCat.trim().toLowerCase())) return alert("Category already exists");
    upd("categories",[...categories,{name:newCat.trim(),color:newColor,type:newType}]);
    setNewCat("");
  };

  const delCat=(name,type)=>{
    if(type==="system") return; // System categories not deletable
    const remaining=categories.filter(c=>c.name!==name);
    const hasExp=remaining.some(c=>c.type==="expense");
    const hasInc=remaining.some(c=>c.type==="income");
    if(!hasExp||!hasInc) return alert("Need at least one expense and one income category");
    upd("categories",remaining);
  };

  const startEdit=(c)=>{
    setEditId(c.name);
    setEditName(c.name);
    setEditColor(c.color);
  };

  const saveEdit=(oldName)=>{
    if(!editName.trim()) return;
    upd("categories",categories.map(c=>c.name===oldName?{...c,name:editName.trim(),color:editColor}:c));
    setEditId(null);
  };

  if(!show) return null;

  const renderCatList=(cats,title,isSystem=false)=>(
    <div style={{marginBottom:16}}>
      <div style={{fontSize:11,color:"var(--muted)",marginBottom:8,letterSpacing:"0.05em"}}>{title}</div>
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {cats.map(c=>(
          <div key={c.name} style={{display:"flex",alignItems:"center",gap:8,background:"var(--s2)",padding:"8px 12px",borderRadius:8}}>
            {editId===c.name?(
              <>
                <div style={{width:28,height:28,borderRadius:6,overflow:"hidden",background:editColor,position:"relative",flexShrink:0}}>
                  <input type="color" value={editColor} onChange={e=>setEditColor(e.target.value)} style={{position:"absolute",inset:0,width:"100%",height:"100%",opacity:0,cursor:"pointer"}}/>
                </div>
                <input value={editName} onChange={e=>setEditName(e.target.value)} style={{flex:1,padding:"6px 10px",borderRadius:6,border:"1px solid var(--b2)",background:"var(--s1)",color:"var(--fg)",fontSize:12,fontFamily:"var(--font)"}}/>
                <button onClick={()=>saveEdit(c.name)} style={{background:"var(--acc)",border:"none",color:"#000",fontSize:11,padding:"6px 10px",borderRadius:6,cursor:"pointer",fontWeight:600}}>Save</button>
                <button onClick={()=>setEditId(null)} style={{background:"none",border:"none",color:"var(--muted)",fontSize:14,cursor:"pointer"}}>×</button>
              </>
            ):(
              <>
                <span style={{fontSize:12,padding:"4px 10px",borderRadius:6,background:c.color,color:"#fff",fontWeight:500}}>{c.name}</span>
                <div style={{flex:1}}/>
                <button onClick={()=>startEdit(c)} style={{background:"none",border:"none",color:"var(--muted)",fontSize:11,cursor:"pointer",fontFamily:"var(--font)"}}>Edit</button>
                {!isSystem&&<button onClick={()=>delCat(c.name,c.type)} style={{background:"none",border:"none",color:"var(--red)",fontSize:14,cursor:"pointer"}}>×</button>}
              </>
            )}
          </div>
        ))}
      </div>
    </div>
  );

  return (
    <Modal show={show} onClose={onClose} title="Manage Categories">
      <div style={{display:"flex",flexDirection:"column",maxHeight:"70vh"}}>
        {/* Scrollable category list */}
        <div style={{flex:1,overflow:"auto",paddingRight:4}}>
          {expCats.length>0&&renderCatList(expCats,"EXPENSE")}
          {incCats.length>0&&renderCatList(incCats,"INCOME")}
          {sysCats.length>0&&renderCatList(sysCats,"SYSTEM",true)}
        </div>

        {/* Fixed add section */}
        <div style={{borderTop:"1px solid var(--b1)",paddingTop:16,marginTop:8,flexShrink:0}}>
          <div style={{fontSize:11,color:"var(--muted)",marginBottom:8,letterSpacing:"0.05em"}}>ADD CATEGORY</div>
          <div style={{display:"flex",gap:6,marginBottom:10}}>
            {["expense","income"].map(t=>(
              <button key={t} onClick={()=>setNewType(t)} style={{
                flex:1,padding:"8px",borderRadius:6,border:`1px solid ${newType===t?"var(--acc)":"var(--b2)"}`,
                background:newType===t?"rgba(0,201,167,0.1)":"transparent",
                color:newType===t?"var(--acc)":"var(--muted)",fontSize:11,fontFamily:"var(--font)",cursor:"pointer",textTransform:"capitalize",
              }}>{t}</button>
            ))}
          </div>
          <div style={{display:"flex",gap:8,marginBottom:12}}>
            <input 
              value={newCat} 
              onChange={e=>setNewCat(e.target.value)} 
              placeholder="Category name"
              style={{flex:1,padding:"10px 12px",borderRadius:8,border:"1px solid var(--b2)",background:"var(--s2)",color:"var(--fg)",fontSize:13,fontFamily:"var(--font)"}}
            />
            <div style={{width:44,height:44,borderRadius:8,overflow:"hidden",background:newColor,position:"relative"}}>
              <input 
                type="color" 
                value={newColor} 
                onChange={e=>setNewColor(e.target.value)}
                style={{position:"absolute",inset:0,width:"100%",height:"100%",opacity:0,cursor:"pointer"}}
              />
            </div>
          </div>
          <button onClick={addCat} style={{
            width:"100%",padding:"12px",borderRadius:8,border:"none",
            background:"var(--acc)",color:"#fff",fontSize:12,fontFamily:"var(--font)",cursor:"pointer",fontWeight:700,
          }}>+ ADD CATEGORY</button>
        </div>
      </div>
    </Modal>
  );
}
