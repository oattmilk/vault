<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#06060A">
  <title>vault.</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    html,body,#root{height:100%;width:100%;background:#06060A;}
    body{font-family:'Outfit',sans-serif;-webkit-font-smoothing:antialiased;}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const fmtEUR = (n) => "€" + (n ?? 0).toLocaleString("de-DE", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtIDR = (n) => "Rp" + Math.round(n ?? 0).toLocaleString("id-ID");
const fmtDate = (d) => d ? new Date(d).toLocaleDateString("en-GB", { day: "2-digit", month: "short" }) : "";
const todayStr = () => new Date().toISOString().split("T")[0];
const thisMonthStr = () => new Date().toISOString().slice(0, 7);
const thisWeekStr = () => { const d = new Date(); d.setDate(d.getDate() - d.getDay()); return d.toISOString().split("T")[0]; };

const CAT_FALLBACKS=["#FF6B6B","#FF9F43","#FFC048","#A29BFE","#74B9FF","#FD79A8","#55EFC4","#E17055","#6C5CE7","#00CEC9","#00B894","#FDCB6E"];
const getCatColor=(cat,categories=[])=>{
  const found=categories.find(c=>c.name===cat);
  if(found&&found.color) return found.color;
  let hash=0; for(let i=0;i<(cat||"").length;i++) hash=cat.charCodeAt(i)+((hash<<5)-hash);
  return CAT_FALLBACKS[Math.abs(hash)%CAT_FALLBACKS.length];
};
const RENEWAL = ["Monthly","Yearly","Weekly","Quarterly"];

const TABS = [
  {id:"track", icon:"+-", label:"Track"},
  {id:"home",  icon:"H", label:"Home"},
  {id:"vault", icon:"V", label:"Vault"},
];

const DEFAULT_EXP_CATS = [
  {name:"Food",color:"#FF6B6B",type:"expense"},
  {name:"Groceries",color:"#FF8C42",type:"expense"},
  {name:"Rent",color:"#FF9F43",type:"expense"},
  {name:"Transport",color:"#FFC048",type:"expense"},
  {name:"Shopping",color:"#FD79A8",type:"expense"},
  {name:"Utilities",color:"#55EFC4",type:"expense"},
  {name:"Other",color:"#B2BEC3",type:"expense"},
];
const DEFAULT_INC_CATS = [
  {name:"Salary",color:"#00B894",type:"income"},
  {name:"Freelance",color:"#00CEC9",type:"income"},
  {name:"Other Income",color:"#FDCB6E",type:"income"},
];
const DEFAULT_SYS_CATS = [
  {name:"Subscription",color:"#A29BFE",type:"system"},
  {name:"Debt",color:"#D63031",type:"system"},
];

const SEED = {
  transactions:[], investments:[], subscriptions:[],
  transfers:[], goals:[], debts:[],
  categories:[...DEFAULT_EXP_CATS,...DEFAULT_INC_CATS,...DEFAULT_SYS_CATS],
  eurAccounts:[], idrAccounts:[],
  eurCash:0, idrCash:0,
  lastCurrency:"EUR", lastAccountId:null, lastCategory:"Food",
};

const IS = {
  width:"100%", padding:"13px 14px", borderRadius:12,
  border:"1px solid var(--b2)", background:"var(--s2)",
  color:"var(--fg)", fontSize:14, fontFamily:"var(--font)", outline:"none",
  transition:"border-color 0.15s, box-shadow 0.15s",
};

const Lbl = ({children,c}) => (
  <div style={{fontSize:10,letterSpacing:"0.1em",textTransform:"uppercase",color:c||"var(--muted)",marginBottom:6,fontWeight:600}}>
    {children}
  </div>
);

function Field({label,col,children}) {
  return <div style={{minWidth:0,...(col?{gridColumn:col}:{})}}>{label&&<Lbl>{label}</Lbl>}{children}</div>;
}

function NumInput({value, onChange, placeholder, style, onBlur, autoFocus}) {
  const fmt = (v) => {
    if(v===""||v===undefined||v===null) return "";
    const parts = String(v).split(".");
    parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ".");
    return parts.join(",");
  };
  const parse = (s) => s.replace(/\./g,"").replace(",",".");
  const [display, setDisplay] = useState(fmt(value));

  useEffect(()=>{
    const raw = parseFloat(String(value));
    if(!isNaN(raw)) setDisplay(fmt(raw));
    else setDisplay("");
  },[value]);

  const handleChange = (e) => {
    const raw = e.target.value.replace(/[^0-9,]/g,"");
    setDisplay(raw);
    const num = parseFloat(parse(raw));
    if(!isNaN(num)) onChange(num);
    else if(raw==="") onChange("");
  };

  return (
    <input
      autoFocus={autoFocus}
      type="text"
      inputMode="decimal"
      value={display}
      onChange={handleChange}
      onBlur={()=>{
        const num=parseFloat(parse(display));
        if(!isNaN(num)){setDisplay(fmt(num));if(onBlur)onBlur(num);}
        else{setDisplay("");if(onBlur)onBlur("");}
      }}
      placeholder={placeholder}
      style={style||IS}
    />
  );
}

function PillBtn({active,onClick,children,color,small}) {
  const ac = color||"var(--acc)";
  return (
    <button onClick={onClick} style={{
      padding:small?"5px 11px":"8px 15px",
      borderRadius:20,
      border:"1.5px solid " + (active?ac:"var(--b2)"),
      background:active?(ac+"18"):"transparent",
      color:active?ac:"var(--muted)",
      fontSize:small?11:12,fontFamily:"var(--font)",cursor:"pointer",
      letterSpacing:"0.03em",transition:"all 0.15s",
      whiteSpace:"nowrap",fontWeight:active?600:500,
    }}>{children}</button>
  );
}

function ActionBtn({onClick,children,color,disabled}) {
  const c = color||"var(--acc)";
  return (
    <button onClick={onClick} disabled={disabled} style={{
      width:"100%",padding:"15px",borderRadius:12,border:"none",
      background:disabled?"var(--b2)":c,
      color:disabled?"var(--muted)":"#000",
      fontSize:13,fontWeight:700,fontFamily:"var(--font)",cursor:disabled?"not-allowed":"pointer",
      letterSpacing:"0.05em",transition:"all 0.15s",
      opacity:disabled?0.6:1,
    }}>{children}</button>
  );
}

function ProgressBar({pct,color}) {
  return (
    <div style={{background:"var(--b2)",borderRadius:6,height:4,overflow:"hidden"}}>
      <div style={{width:Math.min(pct,100)+"%",height:"100%",borderRadius:6,background:color,transition:"width 0.5s cubic-bezier(0.4,0,0.2,1)"}}/>
    </div>
  );
}

function DatePicker({value,onChange,label}) {
  return (
    <div>
      {label&&<Lbl>{label}</Lbl>}
      <div style={{position:"relative",borderRadius:12,border:"1px solid var(--b2)",background:"var(--s2)",height:48,display:"flex",alignItems:"center",paddingLeft:14,transition:"all 0.15s"}}>
        <span style={{fontSize:14,color:value?"var(--fg)":"var(--muted)",fontFamily:"var(--font)",pointerEvents:"none"}}>
          {value?new Date(value+"T00:00:00").toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"}):"Select date"}
        </span>
        <span style={{marginLeft:"auto",paddingRight:14,fontSize:14,color:"var(--muted)",pointerEvents:"none"}}>cal</span>
        <input type="date" value={value||""} onChange={e=>onChange(e.target.value)}
          style={{position:"absolute",inset:0,width:"100%",height:"100%",opacity:0,cursor:"pointer",border:"none",background:"none"}}/>
      </div>
    </div>
  );
}

function Section({title,subtitle,children,action}) {
  return (
    <div style={{marginBottom:28}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div>
          <div style={{fontSize:10,fontWeight:700,letterSpacing:"0.14em",color:"var(--muted)"}}>{title}</div>
          {subtitle&&<div style={{fontSize:11,color:"var(--dim)",marginTop:2}}>{subtitle}</div>}
        </div>
        {action}
      </div>
      {children}
    </div>
  );
}

function FormCard({children}) {
  return (
    <div style={{
      background:"linear-gradient(160deg, var(--s1) 0%, var(--s2) 100%)",
      borderRadius:20,padding:20,
      border:"1px solid var(--b1)",
      marginBottom:20,
      boxShadow:"0 4px 24px rgba(0,0,0,0.2)",
    }}>
      {children}
    </div>
  );
}

function TxRow({t,onDelete,onEdit,compact}) {
  const isInc = t.type==="income";
  const fmt = t.currency==="IDR"?fmtIDR:fmtEUR;
  const color = t.pending?"var(--amber)":isInc?"var(--green)":"var(--red)";
  const bgColor = t.pending?"rgba(251,191,36,0.1)":isInc?"rgba(16,185,129,0.1)":"rgba(248,113,113,0.1)";
  return (
    <div className="txrow" style={{display:"flex",alignItems:"center",gap:10,padding:compact?"11px 0":"13px 0",borderBottom:"1px solid var(--b1)",opacity:t.pending?0.85:1}}>
      <div style={{width:34,height:34,borderRadius:10,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",background:bgColor,fontSize:13,color:color}}>
        {t.pending?"o":isInc?"^":"v"}
      </div>
      <div style={{flex:1,minWidth:0,overflow:"hidden"}}>
        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2}}>
          <div style={{fontSize:13,fontWeight:600,color:"var(--fg)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",minWidth:0,flex:1}}>
            {t.note||t.category}
          </div>
          {t.pending&&<span style={{fontSize:9,padding:"2px 6px",borderRadius:5,background:"rgba(251,191,36,0.12)",color:"var(--amber)",flexShrink:0,letterSpacing:"0.04em",fontWeight:600}}>DUE</span>}
        </div>
        <div style={{fontSize:11,color:"var(--muted)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.category} · {fmtDate(t.date)}</div>
      </div>
      <div style={{fontSize:13,fontWeight:700,color:color,whiteSpace:"nowrap",flexShrink:0}}>
        {isInc?"+":"-"}{fmt(t.amount)}
      </div>
      {t.pending && onEdit && (
        <button onClick={()=>onEdit(t)} style={{background:"none",border:"none",color:"var(--acc)",fontSize:14,cursor:"pointer",lineHeight:1,padding:"2px 4px",flexShrink:0}}>e</button>
      )}
      {onDelete && (
        <button onClick={()=>onDelete(t.id)} style={{background:"none",border:"none",color:"var(--dim)",fontSize:20,cursor:"pointer",lineHeight:1,padding:"2px 4px",flexShrink:0}}>x</button>
      )}
    </div>
  );
}

function EditPendingModal({show,tx,onClose,onSave,onDelete,categories}) {
  const allCats = (categories||[]).filter(c=>c.type!=="system").map(c=>c.name);
  const [form,setForm] = useState(null);
  useEffect(()=>{ if(tx) setForm({amount:tx.amount,date:tx.date,note:tx.note||"",category:tx.category}); },[tx]);
  if(!show||!form) return null;
  return (
    <Modal show={show} onClose={onClose} title="Edit Upcoming">
      <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:20}}>
        <Field label="AMOUNT">
          <NumInput value={form.amount} onChange={v=>setForm(f=>({...f,amount:v}))} style={IS}/>
        </Field>
        <Field label="CATEGORY">
          <select value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))} style={IS}>
            {allCats.map(c=><option key={c}>{c}</option>)}
          </select>
        </Field>
        <DatePicker label="DATE" value={form.date} onChange={v=>setForm(f=>({...f,date:v}))}/>
        <Field label="NOTE">
          <input placeholder="optional" value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))} style={IS}/>
        </Field>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        <ActionBtn onClick={()=>onSave(form)}>SAVE CHANGES</ActionBtn>
        <button onClick={()=>onDelete(tx.id)} style={{width:"100%",padding:"13px",borderRadius:12,border:"1px solid rgba(248,113,113,0.3)",background:"rgba(248,113,113,0.06)",color:"var(--red)",fontSize:13,fontWeight:700,fontFamily:"var(--font)",cursor:"pointer"}}>DELETE UPCOMING</button>
      </div>
    </Modal>
  );
}

function Menu({show,onClose,items,openUp}) {
  if(!show) return null;
  const posStyle = openUp?{bottom:"calc(100% + 8px)",top:"auto"}:{top:"calc(100% + 8px)",bottom:"auto"};
  return (
    <React.Fragment>
      <div onClick={onClose} style={{position:"fixed",inset:0,zIndex:40}}/>
      <div style={{position:"absolute",right:0,...posStyle,background:"linear-gradient(145deg,var(--s2),var(--s1))",border:"1px solid var(--b2)",borderRadius:14,zIndex:50,minWidth:150,boxShadow:"0 8px 32px rgba(0,0,0,0.5)",overflow:"hidden"}}>
        {items.map((item,i)=>(
          <button key={i} onClick={()=>{item.action();onClose();}} style={{
            display:"block",width:"100%",padding:"13px 18px",border:"none",
            borderBottom:i<items.length-1?"1px solid var(--b1)":"none",
            background:"transparent",color:item.danger?"var(--red)":"var(--fg)",
            fontSize:13,fontFamily:"var(--font)",cursor:"pointer",textAlign:"left",fontWeight:500,
          }}>{item.label}</button>
        ))}
      </div>
    </React.Fragment>
  );
}

function MenuBtn({items,openUp}) {
  const [show,setShow]=useState(false);
  return (
    <div style={{position:"relative"}}>
      <button onClick={()=>setShow(s=>!s)} style={{background:"none",border:"none",color:"var(--muted)",fontSize:18,cursor:"pointer",padding:"4px 8px",lineHeight:1}}>...</button>
      <Menu show={show} onClose={()=>setShow(false)} items={items} openUp={openUp}/>
    </div>
  );
}

function Modal({show,onClose,title,children}) {
  if(!show) return null;
  return (
    <div
      onClick={onClose}
      style={{
        position:"fixed",inset:0,
        background:"rgba(0,0,0,0.75)",
        backdropFilter:"blur(8px)",
        zIndex:200,
        display:"flex",
        alignItems:"center",
        justifyContent:"center",
        padding:"20px 16px",
        overflowY:"auto",
      }}
    >
      <div
        onClick={e=>e.stopPropagation()}
        style={{
          background:"linear-gradient(160deg, var(--s1) 0%, var(--bg) 100%)",
          borderRadius:22,
          padding:"24px 22px 28px",
          width:"100%",
          maxWidth:420,
          border:"1px solid var(--b1)",
          boxShadow:"0 24px 64px rgba(0,0,0,0.6)",
          position:"relative",
          margin:"auto",
        }}
      >
        <div style={{width:36,height:3,background:"var(--b2)",borderRadius:2,margin:"0 auto 20px"}}/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22}}>
          <div style={{fontSize:16,fontWeight:700,color:"var(--fg)",letterSpacing:"-0.3px"}}>{title}</div>
          <button onClick={onClose} style={{background:"var(--b1)",border:"none",color:"var(--muted)",fontSize:16,cursor:"pointer",lineHeight:1,width:30,height:30,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center"}}>x</button>
        </div>
        {children}
      </div>
    </div>
  );
}

function Vault() {
  const [tab,setTab] = useState("track");
  const [data,setData] = useState(SEED);
  const [loaded,setLoaded] = useState(false);

  useEffect(()=>{
    try{ const r=localStorage.getItem("vault_v4"); if(r) setData(JSON.parse(r)); }catch(e){}
    setLoaded(true);
  },[]);

  useEffect(()=>{
    if(!loaded) return;
    try{ localStorage.setItem("vault_v4",JSON.stringify(data)); }catch(e){}
  },[data,loaded]);

  useEffect(()=>{
    if(!loaded) return;
    const investments=data.investments||[];
    const thisMonth=thisMonthStr();
    const todayDay=new Date().getDate();
    let updated=false;
    const newInvs=investments.map(inv=>{
      if(!inv.monthlyAmount||inv.monthlyAmount<=0) return inv;
      if((inv.lastSparplanMonth||"")===thisMonth) return inv;
      if(todayDay<(inv.sparplanDay||1)) return inv;
      updated=true;
      return {...inv,totalInvested:(inv.totalInvested||0)+inv.monthlyAmount,lastSparplanMonth:thisMonth,lastUpdated:todayStr()};
    });
    if(updated) upd("investments",newInvs);
  },[loaded]);

  useEffect(()=>{
    if(!loaded) return;
    const subs=data.subscriptions||[];
    const txs=data.transactions||[];
    const in30=new Date(); in30.setDate(in30.getDate()+30);
    const in30Str=in30.toISOString().split("T")[0];
    const newTxs=[];
    subs.forEach(sub=>{
      if(!sub.nextDate||sub.nextDate>in30Str) return;
      if(txs.find(t=>t.subId===sub.id&&t.pending)) return;
      newTxs.push({id:Date.now()+Math.random(),type:"expense",currency:sub.currency,amount:sub.amount,category:"Subscription",note:sub.name,date:sub.nextDate,accountId:sub.accountId,accountName:sub.accountName||"",pending:true,subId:sub.id});
    });
    if(newTxs.length>0) upd("transactions",[...newTxs,...txs]);
  },[loaded,data.subscriptions.length]);

  const upd = (key,val) => setData(d=>({...d,[key]:val}));

  const investments=data.investments||[];
  const eurInvTotal=investments.filter(i=>i.currency==="EUR").reduce((s,i)=>s+i.currentValue,0);
  const idrInvTotal=investments.filter(i=>i.currency==="IDR").reduce((s,i)=>s+i.currentValue,0);
  const eurAccTotal=data.eurAccounts.reduce((s,a)=>s+a.balance,0)+(data.eurCash||0);
  const idrAccTotal=data.idrAccounts.reduce((s,a)=>s+a.balance,0)+(data.idrCash||0);
  const eurNetWorth=eurAccTotal+eurInvTotal;
  const idrNetWorth=idrAccTotal+idrInvTotal;
  const debts=data.debts||[];
  const eurDebtTotal=debts.filter(d=>d.currency==="EUR").reduce((s,d)=>s+d.remaining,0);
  const idrDebtTotal=debts.filter(d=>d.currency==="IDR").reduce((s,d)=>s+d.remaining,0);

  const shared={data,upd,eurAccTotal,idrAccTotal,eurNetWorth,idrNetWorth,eurInvTotal,idrInvTotal,eurDebtTotal,idrDebtTotal};

  return (
    <div style={{
      "--font":"'Outfit',sans-serif",
      "--bg":"#06060A","--s1":"#0C0C12","--s2":"#111118",
      "--b1":"#1A1A24","--b2":"#252530",
      "--fg":"#F4F4F6","--muted":"#6B6B78","--dim":"#3A3A45",
      "--acc":"#C4B5FD","--green":"#10B981","--red":"#F87171","--amber":"#FBBF24",
      "--blue":"#60A5FA","--orange":"#FB923C",
      fontFamily:"var(--font)",background:"var(--bg)",
      minHeight:"100vh",color:"var(--fg)",maxWidth:430,margin:"0 auto",paddingBottom:100,
    }}>
      <style>{"@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');*{box-sizing:border-box;margin:0;padding:0;}::-webkit-scrollbar{width:0;}input,select{outline:none;color-scheme:dark;}input:focus,select:focus{border-color:var(--acc)!important;box-shadow:0 0 0 3px rgba(196,181,253,0.1)!important;}select option{background:var(--s2);}select{border-radius:12px;}.txrow:last-child{border-bottom:none!important;}@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}.au{animation:fadeUp 0.25s ease forwards;}input[type=date]::-webkit-calendar-picker-indicator{filter:invert(0.5);}input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}input[type=number]{-moz-appearance:textfield;}button:active{transform:scale(0.97);}"}</style>

      <div style={{
        padding:"16px 20px 14px",
        paddingTop:"calc(14px + env(safe-area-inset-top))",
        borderBottom:"1px solid var(--b1)",
        position:"sticky",top:0,zIndex:10,
        background:"rgba(6,6,10,0.9)",
        backdropFilter:"blur(12px)",
      }}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <SettingsBtn data={data} upd={upd}/>
            <div style={{fontSize:26,fontWeight:800,letterSpacing:"-1.5px",color:"var(--fg)"}}>
              vault<span style={{color:"var(--acc)"}}>.</span>
            </div>
          </div>
          <div style={{padding:"8px 14px",borderRadius:12,background:"var(--s1)",border:"1px solid var(--b1)"}}>
            <div style={{fontSize:9,color:"var(--muted)",marginBottom:3,letterSpacing:"0.12em",fontWeight:600}}>NET WORTH</div>
            <div style={{fontSize:15,fontWeight:700,color:"var(--green)",letterSpacing:"-0.4px"}}>{fmtEUR(eurNetWorth-eurDebtTotal)}</div>
            {(idrNetWorth-idrDebtTotal)!==0&&<div style={{fontSize:11,color:"var(--blue)",marginTop:1,fontWeight:600}}>{fmtIDR(idrNetWorth-idrDebtTotal)}</div>}
          </div>
        </div>
      </div>

      <div style={{padding:"20px 18px 28px",width:"100%"}} className="au" key={tab}>
        {tab==="track" && <Track {...shared}/>}
        {tab==="home"  && <Home  {...shared}/>}
        {tab==="vault" && <VaultTab {...shared}/>}
      </div>

      <div style={{
        position:"fixed",bottom:20,left:"50%",transform:"translateX(-50%)",
        background:"linear-gradient(135deg,var(--s2),var(--s1))",
        backdropFilter:"blur(20px)",
        border:"1px solid var(--b2)",
        borderRadius:24,display:"flex",padding:5,
        zIndex:100,boxShadow:"0 8px 32px rgba(0,0,0,0.4)",
      }}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{
            padding:"11px 22px",border:"none",borderRadius:20,
            background:tab===t.id?"rgba(196,181,253,0.12)":"transparent",
            cursor:"pointer",display:"flex",alignItems:"center",gap:6,transition:"all 0.2s",
          }}>
            <span style={{fontSize:14,color:tab===t.id?"var(--acc)":"var(--dim)",transition:"color 0.2s"}}>{t.icon}</span>
            <span style={{fontSize:11,fontWeight:600,letterSpacing:"0.04em",color:tab===t.id?"var(--acc)":"var(--muted)",transition:"color 0.2s"}}>{t.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

function Track({data,upd,eurAccTotal,idrAccTotal}) {
  const allAccounts=[
    ...data.eurAccounts.map(a=>({...a,currency:"EUR"})),
    ...data.idrAccounts.map(a=>({...a,currency:"IDR"})),
  ];
  const hasAccounts=allAccounts.length>0;

  const [currency,setCurrency]=useState(data.lastCurrency||"EUR");
  const [accountId,setAccountId]=useState(data.lastAccountId||allAccounts.find(a=>a.currency===(data.lastCurrency||"EUR"))?allAccounts.find(a=>a.currency===(data.lastCurrency||"EUR")).id:"");
  const [amount,setAmount]=useState("");
  const [category,setCategory]=useState(data.lastCategory||"Food");
  const [note,setNote]=useState("");
  const [date,setDate]=useState(todayStr());
  const [showMore,setShowMore]=useState(false);
  const [mode,setMode]=useState("expense");
  const [toAccountId,setToAccountId]=useState("");
  const [pocketId,setPocketId]=useState("");
  const [debtId,setDebtId]=useState("");
  const [editTx,setEditTx]=useState(null);
  const [showEditTx,setShowEditTx]=useState(false);

  const openEdit=(t)=>{ setEditTx(t); setShowEditTx(true); };
  const closeEdit=()=>{ setShowEditTx(false); setEditTx(null); };

  const saveEditTx=(form)=>{
    upd("transactions",data.transactions.map(t=>
      t.id===editTx.id?{...t,amount:parseFloat(form.amount)||t.amount,date:form.date,note:form.note,category:form.category}:t
    ));
    closeEdit();
  };

  const delPending=(id)=>{
    upd("transactions",data.transactions.filter(t=>t.id!==id));
    closeEdit();
  };

  const allCats=data.categories||[];
  const expCats=allCats.filter(c=>c.type==="expense"||c.type==="system").map(c=>c.name);
  const incCats=allCats.filter(c=>c.type==="income").map(c=>c.name);
  const cats=mode==="income"?incCats:expCats;

  const handleCurrencyChange=(cur)=>{
    setCurrency(cur);
    const first=allAccounts.find(a=>a.currency===cur);
    setAccountId(first?first.id:"");
    setToAccountId(""); setPocketId(""); setDebtId("");
  };

  const accsForCurrency=allAccounts.filter(a=>a.currency===currency);
  const getAccName=(id)=>{
    const a=allAccounts.find(a=>a.id===id||a.id===parseInt(id));
    return a?a.name:"";
  };

  const updateAccBalance=(id,delta)=>{
    if(id==="cash_eur") upd("eurCash",(data.eurCash||0)+delta);
    else if(id==="cash_idr") upd("idrCash",(data.idrCash||0)+delta);
    else {
      const acc=allAccounts.find(a=>a.id===id||a.id===parseInt(id));
      if(!acc) return;
      if(acc.currency==="EUR") upd("eurAccounts",data.eurAccounts.map(a=>a.id==id?{...a,balance:a.balance+delta}:a));
      else upd("idrAccounts",data.idrAccounts.map(a=>a.id==id?{...a,balance:a.balance+delta}:a));
    }
  };

  const add=()=>{
    const amt=parseFloat(amount);
    if(!amt||amt<=0||!accountId||!hasAccounts) return;
    const future=date>todayStr();
    const accName=getAccName(accountId);

    if(mode==="transfer"){
      if(!toAccountId||toAccountId===accountId) return;
      const fromAcc=allAccounts.find(a=>a.id===accountId||a.id===parseInt(accountId));
      const toAcc=allAccounts.find(a=>a.id===toAccountId||a.id===parseInt(toAccountId));
      const newEurAccs=data.eurAccounts.map(a=>{
        if(a.id==accountId&&fromAcc&&fromAcc.currency==="EUR") return {...a,balance:a.balance-amt};
        if(a.id==toAccountId&&toAcc&&toAcc.currency==="EUR") return {...a,balance:a.balance+amt};
        return a;
      });
      upd("eurAccounts",newEurAccs);
      const newIdrAccs=data.idrAccounts.map(a=>{
        if(a.id==accountId&&fromAcc&&fromAcc.currency==="IDR") return {...a,balance:a.balance-amt};
        if(a.id==toAccountId&&toAcc&&toAcc.currency==="IDR") return {...a,balance:a.balance+amt};
        return a;
      });
      upd("idrAccounts",newIdrAccs);
      upd("transfers",[{id:Date.now(),fromId:accountId,toId:toAccountId,fromName:accName,toName:getAccName(toAccountId),amount:amt,currency:currency,note:note,date:date},...(data.transfers||[])]);
    } else {
      if(!future){
        const delta=mode==="income"?amt:-amt;
        updateAccBalance(accountId,delta);
        if(pocketId&&mode==="expense"){
          const goals=data.goals||[];
          const pocket=goals.find(g=>g.id===parseInt(pocketId)||g.id===pocketId);
          if(pocket) upd("goals",goals.map(g=>g.id===pocket.id?{...g,saved:g.saved-amt}:g));
        }
        if(debtId&&mode==="expense"){
          const debts=data.debts||[];
          const debt=debts.find(d=>String(d.id)===String(debtId));
          if(debt){
            const newRemaining=Math.max(0,debt.remaining-amt);
            const _tm=debt.totalMonths||(debt.total>0&&debt.monthly>0?Math.round(debt.total/debt.monthly):0);
            const newMonthly=_tm>0?newRemaining/_tm:debt.monthly;
            upd("debts",debts.map(d=>String(d.id)===String(debtId)?{...d,remaining:newRemaining}:d));
            const newTx={id:Date.now(),type:mode,currency:currency,amount:amt,category:category,note:note,date:date,accountId:accountId,accountName:accName,pending:future,pocketId:pocketId||null,debtId:debtId||null};
            upd("transactions",[newTx,...(data.transactions||[]).map(t=>
              t.pending&&String(t.debtId)===String(debtId)?{...t,amount:newMonthly}:t
            )]);
            upd("lastCurrency",currency); upd("lastAccountId",accountId); upd("lastCategory",category);
            setAmount(""); setNote(""); setPocketId(""); setDebtId(""); setShowMore(false);
            return;
          }
        }
      }
      upd("transactions",[{id:Date.now(),type:mode,currency:currency,amount:amt,category:category,note:note,date:date,accountId:accountId,accountName:accName,pending:future,pocketId:pocketId||null,debtId:debtId||null},...data.transactions]);
    }
    upd("lastCurrency",currency); upd("lastAccountId",accountId); upd("lastCategory",category);
    setAmount(""); setNote(""); setPocketId(""); setDebtId(""); setShowMore(false);
  };

  const del=(id)=>{
    const tx=data.transactions.find(t=>t.id===id);
    if(tx&&!tx.pending){
      const delta=tx.type==="income"?-tx.amount:tx.amount;
      updateAccBalance(tx.accountId,delta);
    }
    upd("transactions",data.transactions.filter(t=>t.id!==id));
  };

  useEffect(()=>{
    const due=data.transactions.filter(t=>t.pending&&t.date<=todayStr());
    if(due.length===0) return;
    let eurAccs=[...data.eurAccounts],idrAccs=[...data.idrAccounts];
    let eurCash=data.eurCash||0,idrCash=data.idrCash||0;
    due.forEach(tx=>{
      const delta=tx.type==="income"?tx.amount:-tx.amount;
      if(tx.accountId==="cash_eur") eurCash+=delta;
      else if(tx.accountId==="cash_idr") idrCash+=delta;
      else if(tx.currency==="EUR") eurAccs=eurAccs.map(a=>a.id===tx.accountId?{...a,balance:a.balance+delta}:a);
      else idrAccs=idrAccs.map(a=>a.id===tx.accountId?{...a,balance:a.balance+delta}:a);
    });
    upd("eurAccounts",eurAccs); upd("idrAccounts",idrAccs);
    upd("eurCash",eurCash); upd("idrCash",idrCash);
    upd("transactions",data.transactions.map(t=>due.find(d=>d.id===t.id)?{...t,pending:false}:t));
  },[]);

  const settledTx=data.transactions.filter(t=>!t.pending).slice(0,10);
  const upcomingTx=data.transactions.filter(t=>t.pending).sort((a,b)=>new Date(a.date)-new Date(b.date));
  const modeColor={expense:"var(--red)",income:"var(--green)",transfer:"var(--blue)"};
  const isValid=amount&&accountId&&(mode!=="transfer"||toAccountId);

  return (
    <div>
      <EditPendingModal
        show={showEditTx}
        tx={editTx}
        onClose={closeEdit}
        onSave={saveEditTx}
        onDelete={delPending}
        categories={data.categories}
      />

      <FormCard>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:16}}>
          {[["expense","OUT"],["income","IN"],["transfer","MOVE"]].map(function(pair){
            var m=pair[0],l=pair[1];
            return (
              <button key={m} onClick={()=>{setMode(m);if(m!=="transfer")setCategory(m==="income"?incCats[0]:expCats[0]);}} style={{
                padding:"10px 0",borderRadius:10,
                border:"1.5px solid "+(mode===m?modeColor[m]:"var(--b2)"),
                background:mode===m?(modeColor[m]+"12"):"transparent",
                color:mode===m?modeColor[m]:"var(--muted)",
                fontSize:11,fontFamily:"var(--font)",cursor:"pointer",fontWeight:700,letterSpacing:"0.04em",
              }}>{l}</button>
            );
          })}
        </div>

        <div style={{display:"flex",gap:8,marginBottom:12}}>
          <div style={{display:"flex",gap:4}}>
            {["EUR","IDR"].map(c=>(
              <button key={c} onClick={()=>handleCurrencyChange(c)} style={{
                padding:"9px 12px",borderRadius:10,
                border:"1.5px solid "+(currency===c?"var(--amber)":"var(--b2)"),
                background:currency===c?"rgba(251,191,36,0.1)":"transparent",
                color:currency===c?"var(--amber)":"var(--muted)",
                fontSize:12,fontFamily:"var(--font)",cursor:"pointer",fontWeight:currency===c?700:400,
              }}>{c}</button>
            ))}
          </div>
          {mode!=="transfer"&&accsForCurrency.length>0&&(
            <select value={accountId} onChange={e=>setAccountId(e.target.value)} style={{...IS,flex:1,padding:"9px 12px"}}>
              {accsForCurrency.map(a=><option key={a.id} value={a.id}>{a.name}</option>)}
            </select>
          )}
        </div>

        {mode==="transfer"&&(
          <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",gap:8,alignItems:"center",marginBottom:12}}>
            <select value={accountId} onChange={e=>setAccountId(e.target.value)} style={{...IS,padding:"10px 12px"}}>
              <option value="">From...</option>
              {allAccounts.map(a=><option key={a.id} value={a.id}>{a.name} ({a.currency})</option>)}
            </select>
            <span style={{color:"var(--dim)",fontSize:14}}>-&gt;</span>
            <select value={toAccountId} onChange={e=>setToAccountId(e.target.value)} style={{...IS,padding:"10px 12px"}}>
              <option value="">To...</option>
              {allAccounts.filter(a=>a.id!==accountId).map(a=><option key={a.id} value={a.id}>{a.name} ({a.currency})</option>)}
            </select>
          </div>
        )}

        <div style={{display:"grid",gridTemplateColumns:mode==="transfer"?"1fr":"1fr 1fr",gap:8,marginBottom:12}}>
          <NumInput placeholder="0.00" value={amount} onChange={v=>setAmount(v)} style={{...IS,fontSize:18,fontWeight:700,letterSpacing:"-0.5px"}}/>
          {mode!=="transfer"&&(
            <select value={category} onChange={e=>setCategory(e.target.value)} style={{...IS}}>
              {cats.map(c=><option key={c} value={c}>{c}</option>)}
            </select>
          )}
        </div>

        {mode!=="transfer"&&(
          <button onClick={()=>setShowMore(s=>!s)} style={{
            background:"none",border:"none",color:showMore?"var(--acc)":"var(--muted)",
            fontSize:11,cursor:"pointer",fontFamily:"var(--font)",
            padding:"4px 0 10px",display:"flex",alignItems:"center",gap:5,
            letterSpacing:"0.04em",width:"100%",
          }}>
            <span style={{fontSize:10}}>{showMore?"v":">"}</span>
            {showMore?"Hide options":"Date, note, pocket"}
          </button>
        )}

        {showMore&&mode!=="transfer"&&(
          <div style={{paddingBottom:14,borderBottom:"1px solid var(--b1)",marginBottom:14,display:"flex",flexDirection:"column",gap:12}}>
            <DatePicker label="DATE" value={date} onChange={v=>setDate(v)}/>
            {date>todayStr()&&<div style={{fontSize:11,color:"var(--amber)"}}>Will appear as upcoming</div>}
            <Field label="NOTE">
              <input placeholder="optional" value={note} onChange={e=>setNote(e.target.value)} style={IS}/>
            </Field>
            {mode==="expense"&&accountId&&(function(){
              var accPockets=(data.goals||[]).filter(g=>g.accountId===accountId||g.accountId===parseInt(accountId));
              if(!accPockets.length) return null;
              return (
                <div>
                  <Lbl>DEDUCT FROM POCKET</Lbl>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                    <PillBtn small active={!pocketId} onClick={()=>setPocketId("")}>None</PillBtn>
                    {accPockets.map(g=>(
                      <PillBtn small key={g.id} active={pocketId===g.id} onClick={()=>setPocketId(g.id)} color="var(--green)">{g.emoji} {g.name}</PillBtn>
                    ))}
                  </div>
                </div>
              );
            })()}
            {mode==="expense"&&category==="Debt"&&(function(){
              var debts=(data.debts||[]).filter(d=>d.currency===currency&&d.remaining>0);
              if(!debts.length) return null;
              return (
                <div>
                  <Lbl>APPLY TO DEBT</Lbl>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                    <PillBtn small active={!debtId} onClick={()=>setDebtId("")}>None</PillBtn>
                    {debts.map(d=>(
                      <PillBtn small key={d.id} active={String(debtId)===String(d.id)} onClick={()=>setDebtId(d.id)} color="var(--red)">{d.name}</PillBtn>
                    ))}
                  </div>
                </div>
              );
            })()}
          </div>
        )}

        <ActionBtn onClick={add} color={modeColor[mode]} disabled={!isValid}>
          ADD {mode.toUpperCase()}
        </ActionBtn>
      </FormCard>

      {!hasAccounts&&(
        <div style={{background:"rgba(251,191,36,0.06)",border:"1px solid rgba(251,191,36,0.25)",borderRadius:14,padding:"14px 16px",marginBottom:18}}>
          <div style={{fontSize:12,color:"var(--amber)"}}>No accounts yet. Add one in Vault to start tracking.</div>
        </div>
      )}

      {upcomingTx.length>0&&(
        <Section title="UPCOMING" subtitle={upcomingTx.length+" scheduled"}>
          <div style={{background:"var(--s1)",borderRadius:16,padding:"2px 16px",border:"1px solid rgba(251,191,36,0.15)"}}>
            {upcomingTx.map(t=><TxRow key={t.id} t={t} onDelete={del} onEdit={openEdit} compact/>)}
          </div>
        </Section>
      )}

      <Section title="RECENT" subtitle={settledTx.length>0?"last 10":""}>
        {settledTx.length===0
          ? <div style={{color:"var(--muted)",fontSize:13,padding:"24px 0",textAlign:"center",lineHeight:1.7}}>
              No transactions yet.
            </div>
          : <div style={{background:"var(--s1)",borderRadius:16,padding:"2px 16px",border:"1px solid var(--b1)"}}>
              {settledTx.map(t=><TxRow key={t.id} t={t} onDelete={del} compact/>)}
            </div>
        }
      </Section>
    </div>
  );
}

function Home({data,upd,eurAccTotal,idrAccTotal,eurNetWorth,idrNetWorth,eurInvTotal,idrInvTotal,eurDebtTotal,idrDebtTotal}) {
  const [period,setPeriod]=useState("month");
  const [cur,setCur]=useState("EUR");
  const fmt=cur==="EUR"?fmtEUR:fmtIDR;

  const goals=data.goals||[];
  const eurTrueNetWorth=eurNetWorth-eurDebtTotal;
  const idrTrueNetWorth=idrNetWorth-idrDebtTotal;

  const ftx=data.transactions.filter(function(t){
    if(t.currency!==cur||t.pending) return false;
    if(period==="month") return t.date&&t.date.startsWith(thisMonthStr());
    if(period==="week") return t.date>=thisWeekStr();
    return true;
  });
  const inc=ftx.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
  const exp=ftx.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
  const savRate=inc>0?((inc-exp)/inc)*100:exp>0?-100:0;

  const byCat=ftx.filter(t=>t.type==="expense").reduce(function(a,t){a[t.category]=(a[t.category]||0)+t.amount;return a;},{});
  const catList=Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
  const catTotal=catList.reduce((s,e)=>s+e[1],0)||1;

  const weekEnd=new Date(); weekEnd.setDate(weekEnd.getDate()+7);
  const weekEndStr=weekEnd.toISOString().split("T")[0];
  const upcomingThisWeek=data.transactions.filter(t=>t.pending&&t.date>=todayStr()&&t.date<=weekEndStr).sort((a,b)=>new Date(a.date)-new Date(b.date));
  const negativePockets=goals.filter(g=>g.saved<0);

  return (
    <div>
      {negativePockets.length>0&&(
        <div style={{background:"rgba(248,113,113,0.06)",border:"1px solid rgba(248,113,113,0.2)",borderRadius:14,padding:"12px 16px",marginBottom:18}}>
          <div style={{fontSize:11,color:"var(--red)",fontWeight:700,marginBottom:6,letterSpacing:"0.06em"}}>POCKETS NEED ATTENTION</div>
          {negativePockets.map(g=>(
            <div key={g.id} style={{fontSize:12,color:"var(--red)",marginBottom:2}}>{g.emoji} {g.name}: {g.currency==="IDR"?fmtIDR(g.saved):fmtEUR(g.saved)}</div>
          ))}
        </div>
      )}

      <Section title="BALANCE">
        <div style={{background:"var(--s1)",borderRadius:20,padding:20,border:"1px solid var(--b1)"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:18}}>
            <div>
              <Lbl>EUR</Lbl>
              <div style={{fontSize:24,fontWeight:700,color:eurAccTotal>=0?"var(--green)":"var(--red)",letterSpacing:"-1.5px",lineHeight:1}}>{fmtEUR(eurAccTotal)}</div>
            </div>
            <div>
              <Lbl>IDR</Lbl>
              <div style={{fontSize:20,fontWeight:700,color:idrAccTotal>=0?"var(--blue)":"var(--red)",letterSpacing:"-1px",lineHeight:1}}>{fmtIDR(idrAccTotal)}</div>
            </div>
          </div>
          <div style={{paddingTop:14,borderTop:"1px solid var(--b1)",display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
            <div>
              <div style={{fontSize:9,color:"var(--muted)",marginBottom:4,letterSpacing:"0.1em"}}>NET WORTH</div>
              <div style={{fontSize:13,fontWeight:700,color:"var(--green)"}}>{fmtEUR(eurTrueNetWorth)}</div>
              {idrTrueNetWorth!==0&&<div style={{fontSize:11,fontWeight:600,color:"var(--blue)",marginTop:1}}>{fmtIDR(idrTrueNetWorth)}</div>}
            </div>
            <div>
              <div style={{fontSize:9,color:"var(--muted)",marginBottom:4,letterSpacing:"0.1em"}}>INVESTED</div>
              <div style={{fontSize:13,fontWeight:700,color:"var(--fg)"}}>{fmtEUR(eurInvTotal)}</div>
              {idrInvTotal!==0&&<div style={{fontSize:11,fontWeight:600,color:"var(--blue)",marginTop:1}}>{fmtIDR(idrInvTotal)}</div>}
            </div>
            <div>
              <div style={{fontSize:9,color:"var(--muted)",marginBottom:4,letterSpacing:"0.1em"}}>DEBTS</div>
              <div style={{fontSize:13,fontWeight:700,color:eurDebtTotal>0?"var(--red)":"var(--fg)"}}>{eurDebtTotal>0?"-":""}{fmtEUR(eurDebtTotal)}</div>
              {idrDebtTotal!==0&&<div style={{fontSize:11,fontWeight:600,color:"var(--red)",marginTop:1}}>-{fmtIDR(idrDebtTotal)}</div>}
            </div>
          </div>
        </div>
      </Section>

      {goals.length>0&&(
        <Section title="POCKETS">
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {goals.slice(0,5).map(g=>{
              var pFmt=g.currency==="IDR"?fmtIDR:fmtEUR;
              var isSaving=g.type==="saving";
              var pct=isSaving&&g.target>0?(g.saved/g.target)*100:0;
              return (
                <div key={g.id} style={{background:"var(--s1)",borderRadius:14,padding:"13px 16px",border:"1px solid "+(g.saved<0?"rgba(248,113,113,0.25)":"var(--b1)")}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:isSaving&&g.target>0?10:0}}>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <span style={{fontSize:18}}>{g.emoji}</span>
                      <div>
                        <span style={{fontSize:13,fontWeight:600,color:"var(--fg)"}}>{g.name}</span>
                        <div style={{fontSize:10,color:isSaving?"var(--blue)":"var(--green)",marginTop:1,letterSpacing:"0.04em",fontWeight:600}}>{isSaving?"SAVING":"SPENDING"}</div>
                      </div>
                    </div>
                    <span style={{fontSize:15,fontWeight:700,color:g.saved<0?"var(--red)":"var(--green)"}}>{pFmt(g.saved)}</span>
                  </div>
                  {isSaving&&g.target>0&&<ProgressBar pct={Math.min(pct,100)} color={pct>=100?"var(--acc)":"var(--green)"}/>}
                </div>
              );
            })}
          </div>
        </Section>
      )}

      {upcomingThisWeek.length>0&&(
        <Section title="UPCOMING THIS WEEK">
          <div style={{background:"var(--s1)",borderRadius:16,border:"1px solid var(--b1)",overflow:"hidden"}}>
            {upcomingThisWeek.slice(0,5).map((t,i)=>{
              var tfmt=t.currency==="IDR"?fmtIDR:fmtEUR;
              var daysLeft=Math.ceil((new Date(t.date)-new Date())/86400000);
              return (
                <div key={t.id} style={{display:"flex",alignItems:"center",gap:12,padding:"13px 16px",borderBottom:i<Math.min(upcomingThisWeek.length,5)-1?"1px solid var(--b1)":"none"}}>
                  <div style={{width:34,height:34,borderRadius:10,background:"rgba(251,191,36,0.1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:"var(--amber)",flexShrink:0}}>!</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:600,color:"var(--fg)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.note||t.category}</div>
                    <div style={{fontSize:11,color:"var(--muted)",marginTop:1}}>{daysLeft===0?"Today":daysLeft===1?"Tomorrow":"in "+daysLeft+"d"}</div>
                  </div>
                  <div style={{fontSize:14,fontWeight:700,color:t.type==="income"?"var(--green)":"var(--red)"}}>{t.type==="income"?"+":"-"}{tfmt(t.amount)}</div>
                </div>
              );
            })}
          </div>
        </Section>
      )}

      <Section title="SPENDING" action={
        <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
          {[["week","W"],["month","M"],["all","ALL"]].map(function(pair){
            return <PillBtn key={pair[0]} small active={period===pair[0]} onClick={()=>setPeriod(pair[0])}>{pair[1]}</PillBtn>;
          })}
          <PillBtn small active={cur==="EUR"} onClick={()=>setCur("EUR")} color="var(--acc)">EUR</PillBtn>
          <PillBtn small active={cur==="IDR"} onClick={()=>setCur("IDR")} color="var(--blue)">IDR</PillBtn>
        </div>
      }>
        <div style={{background:"var(--s1)",borderRadius:16,padding:18,border:"1px solid var(--b1)"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:18}}>
            <div>
              <div style={{fontSize:9,color:"var(--muted)",marginBottom:4,letterSpacing:"0.1em"}}>INCOME</div>
              <div style={{fontSize:14,fontWeight:700,color:"var(--green)"}}>{fmt(inc)}</div>
            </div>
            <div>
              <div style={{fontSize:9,color:"var(--muted)",marginBottom:4,letterSpacing:"0.1em"}}>SPENT</div>
              <div style={{fontSize:14,fontWeight:700,color:"var(--red)"}}>{fmt(exp)}</div>
            </div>
            <div>
              <div style={{fontSize:9,color:"var(--muted)",marginBottom:4,letterSpacing:"0.1em"}}>SAVED</div>
              <div style={{fontSize:14,fontWeight:700,color:savRate>=0?"var(--green)":"var(--red)"}}>{savRate.toFixed(0)+"%"}</div>
            </div>
          </div>

          {catList.length>0&&(function(){
            var size=130,cx=size/2,cy=size/2,r=46,inner=28;
            var cumAngle=-Math.PI/2;
            var slices=catList.slice(0,6).map(function(entry){
              var cat=entry[0],val=entry[1];
              var pct=val/catTotal;
              var angle=pct*2*Math.PI;
              var x1=cx+r*Math.cos(cumAngle),y1=cy+r*Math.sin(cumAngle);
              cumAngle+=angle;
              var x2=cx+r*Math.cos(cumAngle),y2=cy+r*Math.sin(cumAngle);
              var xi1=cx+inner*Math.cos(cumAngle-angle),yi1=cy+inner*Math.sin(cumAngle-angle);
              var xi2=cx+inner*Math.cos(cumAngle),yi2=cy+inner*Math.sin(cumAngle);
              var large=angle>Math.PI?1:0;
              var d="M"+xi1+","+yi1+" L"+x1+","+y1+" A"+r+","+r+" 0 "+large+",1 "+x2+","+y2+" L"+xi2+","+yi2+" A"+inner+","+inner+" 0 "+large+",0 "+xi1+","+yi1+" Z";
              return {cat:cat,val:val,pct:pct,d:d,color:getCatColor(cat,data.categories)};
            });
            return (
              <div style={{display:"flex",gap:16,alignItems:"center"}}>
                <svg width={size} height={size} style={{flexShrink:0}}>
                  {slices.map((s,i)=><path key={i} d={s.d} fill={s.color} opacity={0.9}/>)}
                </svg>
                <div style={{flex:1,display:"flex",flexDirection:"column",gap:7}}>
                  {slices.map(function(s){
                    return (
                      <div key={s.cat} style={{display:"flex",alignItems:"center",gap:8}}>
                        <div style={{width:7,height:7,borderRadius:2,background:s.color,flexShrink:0}}/>
                        <span style={{fontSize:12,color:"var(--muted)",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.cat}</span>
                        <span style={{fontSize:12,fontWeight:600,color:"var(--fg)"}}>{(s.pct*100).toFixed(0)+"%"}</span>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })()}

          {catList.length===0&&(
            <div style={{textAlign:"center",padding:"16px 0",color:"var(--muted)",fontSize:13}}>No spending data for this period.</div>
          )}
        </div>
      </Section>

      <Section title={"MONTHLY - "+cur}>
        <div style={{background:"var(--s1)",borderRadius:16,padding:"16px 18px",border:"1px solid var(--b1)"}}>
          {(function(){
            var months=[];
            for(var i=0;i<6;i++){
              var d=new Date(); d.setMonth(d.getMonth()-(5-i));
              var key=d.toISOString().slice(0,7);
              var label=d.toLocaleString("default",{month:"short"});
              var txs=data.transactions.filter(t=>t.currency===cur&&!t.pending&&t.date&&t.date.startsWith(key));
              var income=txs.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
              var expense=txs.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
              months.push({label:label,income:income,expense:expense});
            }
            var maxVal=Math.max.apply(null,months.map(m=>Math.max(m.income,m.expense)).concat([1]));
            return (
              <React.Fragment>
                <div style={{display:"flex",gap:14,marginBottom:14}}>
                  <div style={{display:"flex",alignItems:"center",gap:5}}>
                    <div style={{width:7,height:7,borderRadius:2,background:"var(--acc)"}}/>
                    <span style={{fontSize:10,color:"var(--muted)"}}>IN</span>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:5}}>
                    <div style={{width:7,height:7,borderRadius:2,background:"var(--red)"}}/>
                    <span style={{fontSize:10,color:"var(--muted)"}}>OUT</span>
                  </div>
                </div>
                <div style={{display:"flex",alignItems:"flex-end",gap:8,height:72}}>
                  {months.map((m,i)=>(
                    <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                      <div style={{width:"100%",height:54,display:"flex",alignItems:"flex-end",gap:2}}>
                        <div style={{flex:1,borderRadius:"3px 3px 0 0",background:"var(--acc)",opacity:0.8,height:Math.max(3,(m.income/maxVal)*100)+"%"}}/>
                        <div style={{flex:1,borderRadius:"3px 3px 0 0",background:"var(--red)",opacity:0.8,height:Math.max(3,(m.expense/maxVal)*100)+"%"}}/>
                      </div>
                      <div style={{fontSize:10,color:"var(--muted)"}}>{m.label}</div>
                    </div>
                  ))}
                </div>
              </React.Fragment>
            );
          })()}
        </div>
      </Section>
    </div>
  );
}

function VaultTab() { return <div>vault tab stub</div>; }
function AccountCard() { return null; }
function PocketRow() { return null; }
function InvestCard() { return null; }
function AddAccountModal() { return null; }
function AddInvestModal() { return null; }
function SettingsBtn() { return <button>m</button>; }
function ManageCategoriesModal() { return null; }
ReactDOM.createRoot(document.getElementById("root")).render(<Vault />);

</script>
</body>
</html>
