<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#06060A">
  <title>vault.</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    html,body,#root{height:100%;width:100%;background:#06060A;}
    body{font-family:'Outfit',sans-serif;-webkit-font-smoothing:antialiased;}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const fmtEUR = (n) => `€${(n ?? 0).toLocaleString("de-DE", { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
const fmtIDR = (n) => `Rp${Math.round(n ?? 0).toLocaleString("id-ID")}`;
const fmtDate = (d) => d ? new Date(d).toLocaleDateString("en-GB", { day: "2-digit", month: "short" }) : "";
const todayStr = () => new Date().toISOString().split("T")[0];
const thisMonthStr = () => new Date().toISOString().slice(0, 7);
const thisWeekStr = () => { const d = new Date(); d.setDate(d.getDate() - d.getDay()); return d.toISOString().split("T")[0]; };

const CAT_FALLBACKS=["#FF6B6B","#FF9F43","#FFC048","#A29BFE","#74B9FF","#FD79A8","#55EFC4","#E17055","#6C5CE7","#00CEC9","#00B894","#FDCB6E"];
const getCatColor=(cat,categories=[])=>{
  const found=categories.find(c=>c.name===cat);
  if(found?.color) return found.color;
  let hash=0; for(let i=0;i<(cat||"").length;i++) hash=cat.charCodeAt(i)+((hash<<5)-hash);
  return CAT_FALLBACKS[Math.abs(hash)%CAT_FALLBACKS.length];
};
const RENEWAL = ["Monthly","Yearly","Weekly","Quarterly"];

const TABS = [
  {id:"track", icon:"±", label:"Track"},
  {id:"home",  icon:"⌂", label:"Home"},
  {id:"vault", icon:"◇", label:"Vault"},
];

const DEFAULT_EXP_CATS = [
  {name:"Food",color:"#FF6B6B",type:"expense"},
  {name:"Groceries",color:"#FF8C42",type:"expense"},
  {name:"Rent",color:"#FF9F43",type:"expense"},
  {name:"Transport",color:"#FFC048",type:"expense"},
  {name:"Shopping",color:"#FD79A8",type:"expense"},
  {name:"Utilities",color:"#55EFC4",type:"expense"},
  {name:"Other",color:"#B2BEC3",type:"expense"},
];
const DEFAULT_INC_CATS = [
  {name:"Salary",color:"#00B894",type:"income"},
  {name:"Freelance",color:"#00CEC9",type:"income"},
  {name:"Other Income",color:"#FDCB6E",type:"income"},
];
const DEFAULT_SYS_CATS = [
  {name:"Subscription",color:"#A29BFE",type:"system"},
  {name:"Debt",color:"#D63031",type:"system"},
];

const SEED = {
  transactions:[], investments:[], subscriptions:[],
  transfers:[], goals:[], debts:[],
  categories:[...DEFAULT_EXP_CATS,...DEFAULT_INC_CATS,...DEFAULT_SYS_CATS],
  eurAccounts:[], idrAccounts:[],
  eurCash:0, idrCash:0,
  lastCurrency:"EUR", lastAccountId:null, lastCategory:"Food",
};

// Input style — shared baseline
const IS = {
  width:"100%", padding:"13px 14px", borderRadius:12,
  border:"1px solid var(--b2)", background:"var(--s2)",
  color:"var(--fg)", fontSize:14, fontFamily:"var(--font)", outline:"none",
  transition:"border-color 0.15s, box-shadow 0.15s",
};

// ── Atoms ─────────────────────────────────────────────────────────────────────
const Lbl = ({children,c}) => (
  <div style={{fontSize:10,letterSpacing:"0.1em",textTransform:"uppercase",color:c||"var(--muted)",marginBottom:6,fontWeight:600}}>
    {children}
  </div>
);

function Field({label,col,children}) {
  return <div style={{minWidth:0,...(col?{gridColumn:col}:{})}}>{label&&<Lbl>{label}</Lbl>}{children}</div>;
}

function NumInput({value, onChange, placeholder, style, onBlur, autoFocus}) {
  const fmt = (v) => {
    if(v===""||v===undefined||v===null) return "";
    const parts = String(v).split(".");
    parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ".");
    return parts.join(",");
  };
  const parse = (s) => s.replace(/\./g,"").replace(",",".");
  const [display, setDisplay] = useState(fmt(value));

  useEffect(()=>{
    const raw = parseFloat(String(value));
    if(!isNaN(raw)) setDisplay(fmt(raw));
    else setDisplay("");
  },[value]);

  const handleChange = (e) => {
    const raw = e.target.value.replace(/[^0-9,]/g,"");
    setDisplay(raw);
    const num = parseFloat(parse(raw));
    if(!isNaN(num)) onChange(num);
    else if(raw==="") onChange("");
  };

  return (
    <input
      autoFocus={autoFocus}
      type="text"
      inputMode="decimal"
      value={display}
      onChange={handleChange}
      onBlur={()=>{
        const num=parseFloat(parse(display));
        if(!isNaN(num)){setDisplay(fmt(num));if(onBlur)onBlur(num);}
        else{setDisplay("");if(onBlur)onBlur("");}
      }}
      placeholder={placeholder}
      style={style||IS}
    />
  );
}

function PillBtn({active,onClick,children,color,small}) {
  const ac = color||"var(--acc)";
  return (
    <button onClick={onClick} style={{
      padding:small?"5px 11px":"8px 15px",
      borderRadius:20,
      border:`1.5px solid ${active?ac:"var(--b2)"}`,
      background:active?`${ac}18`:"transparent",
      color:active?ac:"var(--muted)",
      fontSize:small?11:12,fontFamily:"var(--font)",cursor:"pointer",
      letterSpacing:"0.03em",transition:"all 0.15s",
      whiteSpace:"nowrap",fontWeight:active?600:500,
    }}>{children}</button>
  );
}

function ActionBtn({onClick,children,color,disabled}) {
  const c = color||"var(--acc)";
  return (
    <button onClick={onClick} disabled={disabled} style={{
      width:"100%",padding:"15px",borderRadius:12,border:"none",
      background:disabled?"var(--b2)":c,
      color:disabled?"var(--muted)":"#000",
      fontSize:13,fontWeight:700,fontFamily:"var(--font)",cursor:disabled?"not-allowed":"pointer",
      letterSpacing:"0.05em",transition:"all 0.15s",
      opacity:disabled?0.6:1,
    }}>{children}</button>
  );
}

function ProgressBar({pct,color}) {
  return (
    <div style={{background:"var(--b2)",borderRadius:6,height:4,overflow:"hidden"}}>
      <div style={{width:`${Math.min(pct,100)}%`,height:"100%",borderRadius:6,background:color,transition:"width 0.5s cubic-bezier(0.4,0,0.2,1)"}}/>
    </div>
  );
}

function DatePicker({value,onChange,label}) {
  return (
    <div>
      {label&&<Lbl>{label}</Lbl>}
      <div style={{position:"relative",borderRadius:12,border:"1px solid var(--b2)",background:"var(--s2)",height:48,display:"flex",alignItems:"center",paddingLeft:14,transition:"all 0.15s"}}>
        <span style={{fontSize:14,color:value?"var(--fg)":"var(--muted)",fontFamily:"var(--font)",pointerEvents:"none"}}>
          {value?new Date(value+"T00:00:00").toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"}):"Select date"}
        </span>
        <span style={{marginLeft:"auto",paddingRight:14,fontSize:14,color:"var(--muted)",pointerEvents:"none"}}>📅</span>
        <input type="date" value={value||""} onChange={e=>onChange(e.target.value)}
          style={{position:"absolute",inset:0,width:"100%",height:"100%",opacity:0,cursor:"pointer",border:"none",background:"none"}}/>
      </div>
    </div>
  );
}

function Section({title,subtitle,children,action}) {
  return (
    <div style={{marginBottom:28}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div>
          <div style={{fontSize:10,fontWeight:700,letterSpacing:"0.14em",color:"var(--muted)"}}>{title}</div>
          {subtitle&&<div style={{fontSize:11,color:"var(--dim)",marginTop:2}}>{subtitle}</div>}
        </div>
        {action}
      </div>
      {children}
    </div>
  );
}

function FormCard({children}) {
  return (
    <div style={{
      background:"linear-gradient(160deg, var(--s1) 0%, var(--s2) 100%)",
      borderRadius:20,padding:20,
      border:"1px solid var(--b1)",
      marginBottom:20,
      boxShadow:"0 4px 24px rgba(0,0,0,0.2)",
    }}>
      {children}
    </div>
  );
}

function TxRow({t,onDelete,onEdit,compact}) {
  const isInc = t.type==="income";
  const fmt = t.currency==="IDR"?fmtIDR:fmtEUR;
  const color = t.pending?"var(--amber)":isInc?"var(--green)":"var(--red)";
  const bgColor = t.pending?"rgba(251,191,36,0.1)":isInc?"rgba(16,185,129,0.1)":"rgba(248,113,113,0.1)";

  // Pending rows: entire row is tappable → opens edit/delete modal
  // Settled rows: row is static, × delete button shown
  const rowStyle = {
    display:"flex",alignItems:"center",gap:10,
    padding:compact?"11px 0":"13px 0",
    borderBottom:"1px solid var(--b1)",
    opacity:t.pending?0.9:1,
    cursor:t.pending&&onEdit?"pointer":"default",
    borderRadius:t.pending?"8px":0,
    margin:t.pending?"0 -8px":0,
    padding:t.pending?(compact?"11px 8px":"13px 8px"):(compact?"11px 0":"13px 0"),
    transition:"background 0.15s",
  };

  const inner = (
    <>
      <div style={{width:34,height:34,borderRadius:10,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",background:bgColor,fontSize:13,color}}>
        {t.pending?"◌":isInc?"↗":"↘"}
      </div>
      <div style={{flex:1,minWidth:0,overflow:"hidden"}}>
        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2}}>
          <div style={{fontSize:13,fontWeight:600,color:"var(--fg)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",minWidth:0,flex:1}}>
            {t.note||t.category}
          </div>
          {t.pending&&<span style={{fontSize:9,padding:"2px 6px",borderRadius:5,background:"rgba(251,191,36,0.12)",color:"var(--amber)",flexShrink:0,letterSpacing:"0.04em",fontWeight:600}}>DUE</span>}
        </div>
        <div style={{fontSize:11,color:"var(--muted)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.category} · {fmtDate(t.date)}</div>
      </div>
      <div style={{fontSize:13,fontWeight:700,color,whiteSpace:"nowrap",flexShrink:0}}>
        {isInc?"+":"−"}{fmt(t.amount)}
      </div>
      {!t.pending && onDelete && (
        <button className="del" onClick={e=>{e.stopPropagation();onDelete(t.id);}} style={{background:"none",border:"none",color:"var(--dim)",fontSize:18,cursor:"pointer",lineHeight:1,padding:"2px 4px",flexShrink:0}}>×</button>
      )}
      {t.pending && <span style={{fontSize:11,color:"var(--dim)",flexShrink:0}}>›</span>}
    </>
  );

  if(t.pending && onEdit) {
    return (
      <div className="txrow" style={rowStyle} onClick={()=>onEdit(t)}
        onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,0.03)"}
        onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
        {inner}
      </div>
    );
  }
  return <div className="txrow" style={rowStyle}>{inner}</div>;
}

// ── EditPendingModal — edit or delete an upcoming transaction ─────────────────
function EditPendingModal({show,tx,onClose,onSave,onDelete,categories}) {
  const allCats = (categories||[]).filter(c=>c.type!=="system").map(c=>c.name);
  const [form,setForm] = useState(null);
  useEffect(()=>{ if(tx) setForm({amount:tx.amount,date:tx.date,note:tx.note||"",category:tx.category}); },[tx]);
  if(!show||!form) return null;
  const fmt = tx?.currency==="IDR"?fmtIDR:fmtEUR;
  return (
    <Modal show={show} onClose={onClose} title="Edit Upcoming">
      <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:20}}>
        <Field label="AMOUNT">
          <NumInput value={form.amount} onChange={v=>setForm(f=>({...f,amount:v}))} style={IS}/>
        </Field>
        <Field label="CATEGORY">
          <select value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))} style={IS}>
            {allCats.map(c=><option key={c}>{c}</option>)}
          </select>
        </Field>
        <DatePicker label="DATE" value={form.date} onChange={v=>setForm(f=>({...f,date:v}))}/>
        <Field label="NOTE">
          <input placeholder="optional" value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))} style={IS}/>
        </Field>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        <ActionBtn onClick={()=>onSave(form)}>SAVE CHANGES</ActionBtn>
        <button onClick={()=>onDelete(tx.id)} style={{width:"100%",padding:"13px",borderRadius:12,border:"1px solid rgba(248,113,113,0.3)",background:"rgba(248,113,113,0.06)",color:"var(--red)",fontSize:13,fontWeight:700,fontFamily:"var(--font)",cursor:"pointer"}}>DELETE UPCOMING</button>
      </div>
    </Modal>
  );
}

function Menu({show,onClose,items,openUp}) {
  if(!show) return null;
  const posStyle = openUp?{bottom:"calc(100% + 8px)",top:"auto"}:{top:"calc(100% + 8px)",bottom:"auto"};
  return (
    <>
      <div onClick={onClose} style={{position:"fixed",inset:0,zIndex:40}}/>
      <div style={{position:"absolute",right:0,...posStyle,background:"linear-gradient(145deg,var(--s2),var(--s1))",border:"1px solid var(--b2)",borderRadius:14,zIndex:50,minWidth:150,boxShadow:"0 8px 32px rgba(0,0,0,0.5)",overflow:"hidden"}}>
        {items.map((item,i)=>(
          <button key={i} onClick={()=>{item.action();onClose();}} style={{
            display:"block",width:"100%",padding:"13px 18px",border:"none",
            borderBottom:i<items.length-1?"1px solid var(--b1)":"none",
            background:"transparent",color:item.danger?"var(--red)":"var(--fg)",
            fontSize:13,fontFamily:"var(--font)",cursor:"pointer",textAlign:"left",fontWeight:500,
          }}>{item.label}</button>
        ))}
      </div>
    </>
  );
}

function MenuBtn({items,openUp}) {
  const [show,setShow]=useState(false);
  return (
    <div style={{position:"relative"}}>
      <button onClick={()=>setShow(s=>!s)} style={{background:"none",border:"none",color:"var(--muted)",fontSize:18,cursor:"pointer",padding:"4px 8px",lineHeight:1}}>⋯</button>
      <Menu show={show} onClose={()=>setShow(false)} items={items} openUp={openUp}/>
    </div>
  );
}

// ── MODAL — centered, scrollable, never clipped ──────────────────────────────
function Modal({show,onClose,title,children}) {
  if(!show) return null;
  return (
    <div
      onClick={onClose}
      style={{
        position:"fixed",inset:0,
        background:"rgba(0,0,0,0.75)",
        backdropFilter:"blur(8px)",
        zIndex:200,
        display:"flex",
        alignItems:"center",
        justifyContent:"center",
        padding:"20px 16px",
        overflowY:"auto",
      }}
    >
      <div
        onClick={e=>e.stopPropagation()}
        style={{
          background:"linear-gradient(160deg, var(--s1) 0%, var(--bg) 100%)",
          borderRadius:22,
          padding:"24px 22px 28px",
          width:"100%",
          maxWidth:420,
          border:"1px solid var(--b1)",
          boxShadow:"0 24px 64px rgba(0,0,0,0.6)",
          position:"relative",
          margin:"auto",
        }}
      >
        {/* Drag handle aesthetics */}
        <div style={{width:36,height:3,background:"var(--b2)",borderRadius:2,margin:"0 auto 20px"}}/>

        {/* Header */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22}}>
          <div style={{fontSize:16,fontWeight:700,color:"var(--fg)",letterSpacing:"-0.3px"}}>{title}</div>
          <button onClick={onClose} style={{background:"var(--b1)",border:"none",color:"var(--muted)",fontSize:16,cursor:"pointer",lineHeight:1,width:30,height:30,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",transition:"background 0.15s"}}>×</button>
        </div>

        {children}
      </div>
    </div>
  );
}

// ── Main ──────────────────────────────────────────────────────────────────────
function Vault() {
  const [tab,setTab] = useState("track");
  const [data,setData] = useState(SEED);
  const [loaded,setLoaded] = useState(false);

  useEffect(()=>{
    try{ const r=localStorage.getItem("vault_v4"); if(r) setData(JSON.parse(r)); }catch{}
    setLoaded(true);
  },[]);

  useEffect(()=>{
    if(!loaded) return;
    try{ localStorage.setItem("vault_v4",JSON.stringify(data)); }catch{}
  },[data,loaded]);

  // Auto-apply monthly Sparplan
  useEffect(()=>{
    if(!loaded) return;
    const investments=data.investments||[];
    const thisMonth=thisMonthStr();
    const todayDay=new Date().getDate();
    let updated=false;
    const newInvs=investments.map(inv=>{
      if(!inv.monthlyAmount||inv.monthlyAmount<=0) return inv;
      if((inv.lastSparplanMonth||"")===thisMonth) return inv;
      if(todayDay<(inv.sparplanDay||1)) return inv;
      updated=true;
      return {...inv,totalInvested:(inv.totalInvested||0)+inv.monthlyAmount,lastSparplanMonth:thisMonth,lastUpdated:todayStr()};
    });
    if(updated) upd("investments",newInvs);
  },[loaded]);

  // Auto-create upcoming subscription transactions
  useEffect(()=>{
    if(!loaded) return;
    const subs=data.subscriptions||[];
    const txs=data.transactions||[];
    const in30=new Date(); in30.setDate(in30.getDate()+30);
    const in30Str=in30.toISOString().split("T")[0];
    const newTxs=[];
    subs.forEach(sub=>{
      if(!sub.nextDate||sub.nextDate>in30Str) return;
      if(txs.find(t=>t.subId===sub.id&&t.pending)) return;
      newTxs.push({id:Date.now()+Math.random(),type:"expense",currency:sub.currency,amount:sub.amount,category:"Subscription",note:sub.name,date:sub.nextDate,accountId:sub.accountId,accountName:sub.accountName||"",pending:true,subId:sub.id});
    });
    if(newTxs.length>0) upd("transactions",[...newTxs,...txs]);
  },[loaded,data.subscriptions.length]);

  const upd = (key,val) => setData(d=>({...d,[key]:val}));

  const investments=data.investments||[];
  const eurInvTotal=investments.filter(i=>i.currency==="EUR").reduce((s,i)=>s+i.currentValue,0);
  const idrInvTotal=investments.filter(i=>i.currency==="IDR").reduce((s,i)=>s+i.currentValue,0);
  const eurAccTotal=data.eurAccounts.reduce((s,a)=>s+a.balance,0)+(data.eurCash||0);
  const idrAccTotal=data.idrAccounts.reduce((s,a)=>s+a.balance,0)+(data.idrCash||0);
  const eurNetWorth=eurAccTotal+eurInvTotal;
  const idrNetWorth=idrAccTotal+idrInvTotal;
  const debts=data.debts||[];
  const eurDebtTotal=debts.filter(d=>d.currency==="EUR").reduce((s,d)=>s+d.remaining,0);
  const idrDebtTotal=debts.filter(d=>d.currency==="IDR").reduce((s,d)=>s+d.remaining,0);

  const shared={data,upd,eurAccTotal,idrAccTotal,eurNetWorth,idrNetWorth,eurInvTotal,idrInvTotal,eurDebtTotal,idrDebtTotal};

  return (
    <div style={{
      "--font":"'Outfit',sans-serif",
      "--bg":"#06060A","--s1":"#0C0C12","--s2":"#111118",
      "--b1":"#1A1A24","--b2":"#252530",
      "--fg":"#F4F4F6","--muted":"#6B6B78","--dim":"#3A3A45",
      "--acc":"#C4B5FD","--green":"#10B981","--red":"#F87171","--amber":"#FBBF24",
      "--blue":"#60A5FA","--orange":"#FB923C",
      fontFamily:"var(--font)",background:"var(--bg)",
      minHeight:"100vh",color:"var(--fg)",maxWidth:430,margin:"0 auto",paddingBottom:100,
    }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');
        *{box-sizing:border-box;margin:0;padding:0;}
        ::-webkit-scrollbar{width:0;}
        input,select{outline:none;color-scheme:dark;}
        input:focus,select:focus{border-color:var(--acc)!important;box-shadow:0 0 0 3px rgba(196,181,253,0.1)!important;}
        select option{background:var(--s2);}
        select{border-radius:12px;}
        
        .txrow:last-child{border-bottom:none!important;}
        @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
        .au{animation:fadeUp 0.25s ease forwards;}
        input[type=date]::-webkit-calendar-picker-indicator{filter:invert(0.5);}
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}
        input[type=number]{-moz-appearance:textfield;}
        button:active{transform:scale(0.97);}
      `}</style>

      {/* Header */}
      <div style={{
        padding:"16px 20px 14px",
        paddingTop:"calc(14px + env(safe-area-inset-top))",
        borderBottom:"1px solid var(--b1)",
        position:"sticky",top:0,zIndex:10,
        background:"rgba(6,6,10,0.9)",
        backdropFilter:"blur(12px)",
      }}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <SettingsBtn data={data} upd={upd}/>
            <div style={{fontSize:26,fontWeight:800,letterSpacing:"-1.5px",color:"var(--fg)"}}>
              vault<span style={{color:"var(--acc)"}}>.</span>
            </div>
          </div>

          {/* Net worth chip */}
          <div style={{padding:"8px 14px",borderRadius:12,background:"var(--s1)",border:"1px solid var(--b1)"}}>
            <div style={{fontSize:9,color:"var(--muted)",marginBottom:3,letterSpacing:"0.12em",fontWeight:600}}>NET WORTH</div>
            <div style={{fontSize:15,fontWeight:700,color:"var(--green)",letterSpacing:"-0.4px"}}>{fmtEUR(eurNetWorth-eurDebtTotal)}</div>
            {(idrNetWorth-idrDebtTotal)!==0&&<div style={{fontSize:11,color:"var(--blue)",marginTop:1,fontWeight:600}}>{fmtIDR(idrNetWorth-idrDebtTotal)}</div>}
          </div>
        </div>
      </div>

      {/* Page content */}
      <div style={{padding:"20px 18px 28px",width:"100%"}} className="au" key={tab}>
        {tab==="track" && <Track {...shared}/>}
        {tab==="home"  && <Home  {...shared}/>}
        {tab==="vault" && <VaultTab {...shared}/>}
      </div>

      {/* Floating nav pill */}
      <div style={{
        position:"fixed",bottom:20,left:"50%",transform:"translateX(-50%)",
        background:"linear-gradient(135deg,var(--s2),var(--s1))",
        backdropFilter:"blur(20px)",
        border:"1px solid var(--b2)",
        borderRadius:24,display:"flex",padding:5,
        zIndex:100,boxShadow:"0 8px 32px rgba(0,0,0,0.4)",
      }}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{
            padding:"11px 22px",border:"none",borderRadius:20,
            background:tab===t.id?"rgba(196,181,253,0.12)":"transparent",
            cursor:"pointer",display:"flex",alignItems:"center",gap:6,transition:"all 0.2s",
          }}>
            <span style={{fontSize:14,color:tab===t.id?"var(--acc)":"var(--dim)",transition:"color 0.2s"}}>{t.icon}</span>
            <span style={{fontSize:11,fontWeight:600,letterSpacing:"0.04em",color:tab===t.id?"var(--acc)":"var(--muted)",transition:"color 0.2s"}}>{t.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════
// TRACK
// ═══════════════════════════════════════
function Track({data,upd,eurAccTotal,idrAccTotal}) {
  const allAccounts=[
    ...data.eurAccounts.map(a=>({...a,currency:"EUR"})),
    ...data.idrAccounts.map(a=>({...a,currency:"IDR"})),
  ];
  const hasAccounts=allAccounts.length>0;

  const defaultCurrency = data.lastCurrency||"EUR";
  const defaultAccount = data.lastAccountId||allAccounts.find(a=>a.currency===defaultCurrency)?.id||"";
  const [currency,setCurrency]=useState(defaultCurrency);
  const [accountId,setAccountId]=useState(defaultAccount);

  // Keep accountId in sync when currency changes (and on mount if allAccounts loads later)
  useEffect(()=>{
    const match = allAccounts.find(a=>a.id===accountId||a.id===parseInt(accountId));
    if(!match || match.currency!==currency){
      const first = allAccounts.find(a=>a.currency===currency);
      setAccountId(first?.id||"");
    }
  },[currency, data.eurAccounts.length, data.idrAccounts.length]);
  const [amount,setAmount]=useState("");
  const [category,setCategory]=useState(data.lastCategory||"Food");
  const [note,setNote]=useState("");
  const [date,setDate]=useState(todayStr());
  const [showMore,setShowMore]=useState(false);
  const [mode,setMode]=useState("expense");
  const [toAccountId,setToAccountId]=useState("");
  const [pocketId,setPocketId]=useState("");
  const [debtId,setDebtId]=useState("");

  const allCats=data.categories||[];
  const expCats=allCats.filter(c=>c.type==="expense"||c.type==="system").map(c=>c.name);
  const incCats=allCats.filter(c=>c.type==="income").map(c=>c.name);
  const cats=mode==="income"?incCats:expCats;

  const handleCurrencyChange=(cur)=>{
    setCurrency(cur);
    const first=allAccounts.find(a=>a.currency===cur);
    setAccountId(first?.id||"");
    setToAccountId(""); setPocketId(""); setDebtId("");
  };

  const accsForCurrency=allAccounts.filter(a=>a.currency===currency);
  const getAccName=(id)=>allAccounts.find(a=>a.id===id||a.id===parseInt(id))?.name||"";

  const updateAccBalance=(id,delta)=>{
    if(id==="cash_eur") upd("eurCash",(data.eurCash||0)+delta);
    else if(id==="cash_idr") upd("idrCash",(data.idrCash||0)+delta);
    else {
      const acc=allAccounts.find(a=>a.id===id||a.id===parseInt(id));
      if(!acc) return;
      if(acc.currency==="EUR") upd("eurAccounts",data.eurAccounts.map(a=>a.id==id?{...a,balance:a.balance+delta}:a));
      else upd("idrAccounts",data.idrAccounts.map(a=>a.id==id?{...a,balance:a.balance+delta}:a));
    }
  };

  const add=()=>{
    const amt=parseFloat(amount);
    if(!amt||amt<=0||!accountId||!hasAccounts) return;
    const future=date>todayStr();
    const accName=getAccName(accountId);

    if(mode==="transfer"){
      if(!toAccountId||toAccountId===accountId) return;
      const fromAcc=allAccounts.find(a=>a.id===accountId||a.id===parseInt(accountId));
      const toAcc=allAccounts.find(a=>a.id===toAccountId||a.id===parseInt(toAccountId));
      const newEurAccs=data.eurAccounts.map(a=>{
        if(a.id==accountId&&fromAcc?.currency==="EUR") return {...a,balance:a.balance-amt};
        if(a.id==toAccountId&&toAcc?.currency==="EUR") return {...a,balance:a.balance+amt};
        return a;
      });
      upd("eurAccounts",newEurAccs);
      const newIdrAccs=data.idrAccounts.map(a=>{
        if(a.id==accountId&&fromAcc?.currency==="IDR") return {...a,balance:a.balance-amt};
        if(a.id==toAccountId&&toAcc?.currency==="IDR") return {...a,balance:a.balance+amt};
        return a;
      });
      upd("idrAccounts",newIdrAccs);
      upd("transfers",[{id:Date.now(),fromId:accountId,toId:toAccountId,fromName:accName,toName:getAccName(toAccountId),amount:amt,currency,note,date},...(data.transfers||[])]);
    } else {
      if(!future){
        const delta=mode==="income"?amt:-amt;
        updateAccBalance(accountId,delta);
        if(pocketId&&mode==="expense"){
          const goals=data.goals||[];
          const pocket=goals.find(g=>g.id===parseInt(pocketId)||g.id===pocketId);
          if(pocket) upd("goals",goals.map(g=>g.id===pocket.id?{...g,saved:g.saved-amt}:g));
        }
        if(debtId&&mode==="expense"){
          const debts=data.debts||[];
          const debt=debts.find(d=>String(d.id)===String(debtId));
          if(debt){
            const newRemaining=Math.max(0,debt.remaining-amt);
            const _tm=debt.totalMonths||(debt.total>0&&debt.monthly>0?Math.round(debt.total/debt.monthly):0);
            const newMonthly=_tm>0?newRemaining/_tm:debt.monthly;
            upd("debts",debts.map(d=>String(d.id)===String(debtId)?{...d,remaining:newRemaining}:d));
            const newTx={id:Date.now(),type:mode,currency,amount:amt,category,note,date,accountId,accountName:accName,pending:future,pocketId:pocketId||null,debtId:debtId||null};
            upd("transactions",[newTx,...(data.transactions||[]).map(t=>
              t.pending&&String(t.debtId)===String(debtId)?{...t,amount:newMonthly}:t
            )]);
            upd("lastCurrency",currency); upd("lastAccountId",accountId); upd("lastCategory",category);
            setAmount(""); setNote(""); setPocketId(""); setDebtId(""); setShowMore(false);
            return;
          }
        }
      }
      upd("transactions",[{id:Date.now(),type:mode,currency,amount:amt,category,note,date,accountId,accountName:accName,pending:future,pocketId:pocketId||null,debtId:debtId||null},...data.transactions]);
    }
    upd("lastCurrency",currency); upd("lastAccountId",accountId); upd("lastCategory",category);
    setAmount(""); setNote(""); setPocketId(""); setDebtId(""); setShowMore(false);
  };

  const del=(id)=>{
    const tx=data.transactions.find(t=>t.id===id);
    if(tx&&!tx.pending){
      const delta=tx.type==="income"?-tx.amount:tx.amount;
      updateAccBalance(tx.accountId,delta);
    }
    upd("transactions",data.transactions.filter(t=>t.id!==id));
  };

  useEffect(()=>{
    const due=data.transactions.filter(t=>t.pending&&t.date<=todayStr());
    if(due.length===0) return;
    let eurAccs=[...data.eurAccounts],idrAccs=[...data.idrAccounts];
    let eurCash=data.eurCash||0,idrCash=data.idrCash||0;
    due.forEach(tx=>{
      const delta=tx.type==="income"?tx.amount:-tx.amount;
      if(tx.accountId==="cash_eur") eurCash+=delta;
      else if(tx.accountId==="cash_idr") idrCash+=delta;
      else if(tx.currency==="EUR") eurAccs=eurAccs.map(a=>a.id===tx.accountId?{...a,balance:a.balance+delta}:a);
      else idrAccs=idrAccs.map(a=>a.id===tx.accountId?{...a,balance:a.balance+delta}:a);
    });
    upd("eurAccounts",eurAccs); upd("idrAccounts",idrAccs);
    upd("eurCash",eurCash); upd("idrCash",idrCash);
    upd("transactions",data.transactions.map(t=>due.find(d=>d.id===t.id)?{...t,pending:false}:t));
  },[]);

  const recentTx=[...data.transactions].filter(t=>!t.pending).sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,10);
  const upcomingTx=[...data.transactions].filter(t=>t.pending).sort((a,b)=>new Date(a.date)-new Date(b.date));
  const [editTx,setEditTx]=useState(null);
  const [showEditTx,setShowEditTx]=useState(false);

  const openEdit=(t)=>{ setEditTx(t); setShowEditTx(true); };
  const closeEdit=()=>{ setShowEditTx(false); setEditTx(null); };

  const saveEditTx=(form)=>{
    upd("transactions",data.transactions.map(t=>
      t.id===editTx.id?{...t,amount:parseFloat(form.amount)||t.amount,date:form.date,note:form.note,category:form.category}:t
    ));
    closeEdit();
  };

  const delPending=(id)=>{
    upd("transactions",data.transactions.filter(t=>t.id!==id));
    closeEdit();
  };

  const modeColor={expense:"var(--red)",income:"var(--green)",transfer:"var(--blue)"};
  const isValid=amount&&accountId&&(mode!=="transfer"||toAccountId);

  return (
    <div>
      <FormCard>
        {/* Mode tabs */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:16}}>
          {[["expense","↓ OUT"],["income","↑ IN"],["transfer","⇄ MOVE"]].map(([m,l])=>(
            <button key={m} onClick={()=>{setMode(m);if(m!=="transfer")setCategory(m==="income"?incCats[0]:expCats[0]);}} style={{
              padding:"10px 0",borderRadius:10,
              border:`1.5px solid ${mode===m?modeColor[m]:"var(--b2)"}`,
              background:mode===m?`${modeColor[m]}12`:"transparent",
              color:mode===m?modeColor[m]:"var(--muted)",
              fontSize:11,fontFamily:"var(--font)",cursor:"pointer",fontWeight:700,letterSpacing:"0.04em",
            }}>{l}</button>
          ))}
        </div>

        {/* Currency + Account */}
        <div style={{display:"flex",gap:8,marginBottom:12}}>
          <div style={{display:"flex",gap:4}}>
            {["EUR","IDR"].map(c=>(
              <button key={c} onClick={()=>handleCurrencyChange(c)} style={{
                padding:"9px 12px",borderRadius:10,
                border:`1.5px solid ${currency===c?"var(--amber)":"var(--b2)"}`,
                background:currency===c?"rgba(251,191,36,0.1)":"transparent",
                color:currency===c?"var(--amber)":"var(--muted)",
                fontSize:12,fontFamily:"var(--font)",cursor:"pointer",fontWeight:currency===c?700:400,
              }}>{c}</button>
            ))}
          </div>
          {mode!=="transfer"&&accsForCurrency.length>0&&(
            <select value={accountId} onChange={e=>setAccountId(e.target.value)} style={{...IS,flex:1,padding:"9px 12px"}}>
              {accsForCurrency.map(a=><option key={a.id} value={a.id}>{a.name}</option>)}
            </select>
          )}
        </div>

        {/* Transfer from/to */}
        {mode==="transfer"&&(
          <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",gap:8,alignItems:"center",marginBottom:12}}>
            <select value={accountId} onChange={e=>setAccountId(e.target.value)} style={{...IS,padding:"10px 12px"}}>
              <option value="">From...</option>
              {allAccounts.map(a=><option key={a.id} value={a.id}>{a.name} ({a.currency})</option>)}
            </select>
            <span style={{color:"var(--dim)",fontSize:14}}>→</span>
            <select value={toAccountId} onChange={e=>setToAccountId(e.target.value)} style={{...IS,padding:"10px 12px"}}>
              <option value="">To...</option>
              {allAccounts.filter(a=>a.id!==accountId).map(a=><option key={a.id} value={a.id}>{a.name} ({a.currency})</option>)}
            </select>
          </div>
        )}

        {/* Amount + Category */}
        <div style={{display:"grid",gridTemplateColumns:mode==="transfer"?"1fr":"1fr 1fr",gap:8,marginBottom:12}}>
          <NumInput placeholder="0.00" value={amount} onChange={v=>setAmount(v)} style={{...IS,fontSize:18,fontWeight:700,letterSpacing:"-0.5px"}}/>
          {mode!=="transfer"&&(
            <select value={category} onChange={e=>setCategory(e.target.value)} style={{...IS}}>
              {cats.map(c=><option key={c} value={c}>{c}</option>)}
            </select>
          )}
        </div>

        {/* Add button */}
        <ActionBtn onClick={add} color={modeColor[mode]} disabled={!isValid}>
          ADD {mode.toUpperCase()}
        </ActionBtn>

        {/* More options */}
        {mode!=="transfer"&&(
          <button onClick={()=>setShowMore(s=>!s)} style={{
            background:"none",border:"none",color:"var(--muted)",
            fontSize:11,cursor:"pointer",fontFamily:"var(--font)",
            padding:"10px 0 2px",display:"flex",alignItems:"center",gap:4,
            letterSpacing:"0.04em",
          }}>
            <span style={{transition:"transform 0.2s",display:"inline-block",transform:showMore?"rotate(90deg)":"rotate(0)"}}>{showMore?"▾":"▸"}</span>
            {showMore?"Less":"Date, note, pocket"}
          </button>
        )}

        {showMore&&mode!=="transfer"&&(
          <div style={{marginTop:14,paddingTop:14,borderTop:"1px solid var(--b1)",display:"flex",flexDirection:"column",gap:12}}>
            <DatePicker label="DATE" value={date} onChange={v=>setDate(v)}/>
            {date>todayStr()&&<div style={{fontSize:11,color:"var(--amber)",display:"flex",alignItems:"center",gap:6}}>⏳ Will appear as upcoming</div>}

            <Field label="NOTE">
              <input placeholder="optional" value={note} onChange={e=>setNote(e.target.value)} style={IS}/>
            </Field>

            {mode==="expense"&&accountId&&(()=>{
              const accPockets=(data.goals||[]).filter(g=>g.accountId===accountId||g.accountId===parseInt(accountId));
              if(!accPockets.length) return null;
              return (
                <div>
                  <Lbl>DEDUCT FROM POCKET</Lbl>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                    <PillBtn small active={!pocketId} onClick={()=>setPocketId("")}>None</PillBtn>
                    {accPockets.map(g=>(
                      <PillBtn small key={g.id} active={pocketId===g.id} onClick={()=>setPocketId(g.id)} color="var(--green)">{g.emoji} {g.name}</PillBtn>
                    ))}
                  </div>
                </div>
              );
            })()}

            {mode==="expense"&&category==="Debt"&&(()=>{
              const debts=(data.debts||[]).filter(d=>d.currency===currency&&d.remaining>0);
              if(!debts.length) return null;
              return (
                <div>
                  <Lbl>APPLY TO DEBT</Lbl>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                    <PillBtn small active={!debtId} onClick={()=>setDebtId("")}>None</PillBtn>
                    {debts.map(d=>(
                      <PillBtn small key={d.id} active={String(debtId)===String(d.id)} onClick={()=>setDebtId(d.id)} color="var(--red)">💳 {d.name}</PillBtn>
                    ))}
                  </div>
                </div>
              );
            })()}
          </div>
        )}
      </FormCard>

      {/* No accounts warning */}
      {!hasAccounts&&(
        <div style={{background:"rgba(251,191,36,0.06)",border:"1px solid rgba(251,191,36,0.25)",borderRadius:14,padding:"14px 16px",marginBottom:18}}>
          <div style={{fontSize:12,color:"var(--amber)"}}>No accounts yet. Add one in <span style={{color:"var(--acc)",fontWeight:600}}>Vault → Accounts</span> to start tracking.</div>
        </div>
      )}

      {/* Edit pending modal */}
      <EditPendingModal
        show={showEditTx}
        tx={editTx}
        onClose={closeEdit}
        onSave={saveEditTx}
        onDelete={delPending}
        categories={data.categories}
      />

      {/* Upcoming */}
      {upcomingTx.length>0&&(
        <Section title="UPCOMING" subtitle={`${upcomingTx.length} scheduled`}>
          <div style={{background:"var(--s1)",borderRadius:16,padding:"2px 16px",border:"1px solid rgba(251,191,36,0.15)"}}>
            {upcomingTx.map(t=><TxRow key={t.id} t={t} onDelete={del} onEdit={openEdit} compact/>)}
          </div>
        </Section>
      )}

      {/* Recent settled */}
      <Section title="RECENT" subtitle={recentTx.length>0?"last 10":""}>
        {recentTx.length===0
          ? <div style={{color:"var(--muted)",fontSize:13,padding:"24px 0",textAlign:"center",lineHeight:1.7}}>
              No transactions yet.<br/>
              <span style={{fontSize:12,opacity:0.6}}>Track your first expense above.</span>
            </div>
          : <div style={{background:"var(--s1)",borderRadius:16,padding:"2px 16px",border:"1px solid var(--b1)"}}>
              {recentTx.map(t=><TxRow key={t.id} t={t} onDelete={del} compact/>)}
            </div>
        }
      </Section>
    </div>
  );
}

// ═══════════════════════════════════════
// HOME
// ═══════════════════════════════════════
function Home({data,upd,eurAccTotal,idrAccTotal,eurNetWorth,idrNetWorth,eurInvTotal,idrInvTotal,eurDebtTotal,idrDebtTotal}) {
  const [period,setPeriod]=useState("month");
  const [cur,setCur]=useState("EUR");
  const fmt=cur==="EUR"?fmtEUR:fmtIDR;

  const goals=data.goals||[];
  const debts=data.debts||[];
  const eurTrueNetWorth=eurNetWorth-eurDebtTotal;
  const idrTrueNetWorth=idrNetWorth-idrDebtTotal;

  const ftx=data.transactions.filter(t=>{
    if(t.currency!==cur||t.pending) return false;
    if(period==="month") return t.date?.startsWith(thisMonthStr());
    if(period==="week") return t.date>=thisWeekStr();
    return true;
  });
  const inc=ftx.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
  const exp=ftx.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
  const savRate=inc>0?((inc-exp)/inc)*100:exp>0?-100:0;

  const byCat=ftx.filter(t=>t.type==="expense").reduce((a,t)=>{a[t.category]=(a[t.category]||0)+t.amount;return a;},{});
  const catList=Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
  const catTotal=catList.reduce((s,[,v])=>s+v,0)||1;

  const weekEnd=new Date(); weekEnd.setDate(weekEnd.getDate()+7);
  const weekEndStr=weekEnd.toISOString().split("T")[0];
  const upcomingThisWeek=data.transactions.filter(t=>t.pending&&t.date>=todayStr()&&t.date<=weekEndStr).sort((a,b)=>new Date(a.date)-new Date(b.date));
  const negativePockets=goals.filter(g=>g.saved<0);

  return (
    <div>
      {negativePockets.length>0&&(
        <div style={{background:"rgba(248,113,113,0.06)",border:"1px solid rgba(248,113,113,0.2)",borderRadius:14,padding:"12px 16px",marginBottom:18}}>
          <div style={{fontSize:11,color:"var(--red)",fontWeight:700,marginBottom:6,letterSpacing:"0.06em"}}>⚠ POCKETS NEED ATTENTION</div>
          {negativePockets.map(g=>(
            <div key={g.id} style={{fontSize:12,color:"var(--red)",marginBottom:2}}>{g.emoji} {g.name}: {g.currency==="IDR"?fmtIDR(g.saved):fmtEUR(g.saved)}</div>
          ))}
        </div>
      )}

      {/* Balance */}
      <Section title="BALANCE">
        <div style={{background:"var(--s1)",borderRadius:20,padding:20,border:"1px solid var(--b1)"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:18}}>
            <div>
              <Lbl>EUR</Lbl>
              <div style={{fontSize:24,fontWeight:700,color:eurAccTotal>=0?"var(--green)":"var(--red)",letterSpacing:"-1.5px",lineHeight:1}}>{fmtEUR(eurAccTotal)}</div>
            </div>
            <div>
              <Lbl>IDR</Lbl>
              <div style={{fontSize:20,fontWeight:700,color:idrAccTotal>=0?"var(--blue)":"var(--red)",letterSpacing:"-1px",lineHeight:1}}>{fmtIDR(idrAccTotal)}</div>
            </div>
          </div>
          <div style={{paddingTop:14,borderTop:"1px solid var(--b1)",display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
            {[
              {label:"NET WORTH",val:fmtEUR(eurTrueNetWorth),color:"var(--green)",sub:idrTrueNetWorth!==0?fmtIDR(idrTrueNetWorth):null},
              {label:"INVESTED",val:fmtEUR(eurInvTotal),color:"var(--fg)",sub:idrInvTotal!==0?fmtIDR(idrInvTotal):null},
              {label:"DEBTS",val:(eurDebtTotal>0?"-":"")+fmtEUR(eurDebtTotal),color:eurDebtTotal>0?"var(--red)":"var(--fg)",sub:idrDebtTotal!==0?"-"+fmtIDR(idrDebtTotal):null},
            ].map(({label,val,color,sub})=>(
              <div key={label}>
                <div style={{fontSize:9,color:"var(--muted)",marginBottom:4,letterSpacing:"0.1em"}}>{label}</div>
                <div style={{fontSize:13,fontWeight:700,color}}>{val}</div>
                {sub&&<div style={{fontSize:11,fontWeight:600,color:"var(--blue)",marginTop:1}}>{sub}</div>}
              </div>
            ))}
          </div>
        </div>
      </Section>

      {/* Pockets */}
      {goals.length>0&&(
        <Section title="POCKETS">
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {goals.slice(0,5).map(g=>{
              const pFmt=g.currency==="IDR"?fmtIDR:fmtEUR;
              const isSaving=g.type==="saving";
              const pct=isSaving&&g.target>0?(g.saved/g.target)*100:0;
              return (
                <div key={g.id} style={{background:"var(--s1)",borderRadius:14,padding:"13px 16px",border:`1px solid ${g.saved<0?"rgba(248,113,113,0.25)":"var(--b1)"}`}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:isSaving&&g.target>0?10:0}}>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <span style={{fontSize:18}}>{g.emoji}</span>
                      <div>
                        <span style={{fontSize:13,fontWeight:600,color:"var(--fg)"}}>{g.name}</span>
                        <div style={{fontSize:10,color:isSaving?"var(--blue)":"var(--green)",marginTop:1,letterSpacing:"0.04em",fontWeight:600}}>{isSaving?"SAVING":"SPENDING"}</div>
                      </div>
                    </div>
                    <span style={{fontSize:15,fontWeight:700,color:g.saved<0?"var(--red)":"var(--green)"}}>{pFmt(g.saved)}</span>
                  </div>
                  {isSaving&&g.target>0&&<ProgressBar pct={Math.min(pct,100)} color={pct>=100?"var(--acc)":"var(--green)"}/>}
                </div>
              );
            })}
          </div>
        </Section>
      )}

      {/* Upcoming */}
      {upcomingThisWeek.length>0&&(
        <Section title="UPCOMING THIS WEEK">
          <div style={{background:"var(--s1)",borderRadius:16,border:"1px solid var(--b1)",overflow:"hidden"}}>
            {upcomingThisWeek.slice(0,5).map((t,i)=>{
              const tfmt=t.currency==="IDR"?fmtIDR:fmtEUR;
              const daysLeft=Math.ceil((new Date(t.date)-new Date())/86400000);
              return (
                <div key={t.id} style={{display:"flex",alignItems:"center",gap:12,padding:"13px 16px",borderBottom:i<Math.min(upcomingThisWeek.length,5)-1?"1px solid var(--b1)":"none"}}>
                  <div style={{width:34,height:34,borderRadius:10,background:"rgba(251,191,36,0.1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:"var(--amber)",flexShrink:0}}>⏳</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:600,color:"var(--fg)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.note||t.category}</div>
                    <div style={{fontSize:11,color:"var(--muted)",marginTop:1}}>{daysLeft===0?"Today":daysLeft===1?"Tomorrow":`in ${daysLeft}d`}</div>
                  </div>
                  <div style={{fontSize:14,fontWeight:700,color:t.type==="income"?"var(--green)":"var(--red)"}}>{t.type==="income"?"+":"−"}{tfmt(t.amount)}</div>
                </div>
              );
            })}
          </div>
        </Section>
      )}

      {/* Spending Summary */}
      <Section title="SPENDING" action={
        <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
          {[["week","W"],["month","M"],["all","ALL"]].map(([v,l])=>(
            <PillBtn key={v} small active={period===v} onClick={()=>setPeriod(v)}>{l}</PillBtn>
          ))}
          <PillBtn small active={cur==="EUR"} onClick={()=>setCur("EUR")} color="var(--acc)">€</PillBtn>
          <PillBtn small active={cur==="IDR"} onClick={()=>setCur("IDR")} color="var(--blue)">Rp</PillBtn>
        </div>
      }>
        <div style={{background:"var(--s1)",borderRadius:16,padding:18,border:"1px solid var(--b1)"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:18}}>
            {[{l:"INCOME",v:fmt(inc),c:"var(--green)"},{l:"SPENT",v:fmt(exp),c:"var(--red)"},{l:"SAVED",v:`${savRate.toFixed(0)}%`,c:savRate>=0?"var(--green)":"var(--red)"}].map(({l,v,c})=>(
              <div key={l}>
                <div style={{fontSize:9,color:"var(--muted)",marginBottom:4,letterSpacing:"0.1em"}}>{l}</div>
                <div style={{fontSize:14,fontWeight:700,color:c}}>{v}</div>
              </div>
            ))}
          </div>

          {catList.length>0&&(()=>{
            const size=130,cx=size/2,cy=size/2,r=46,inner=28;
            let cumAngle=-Math.PI/2;
            const slices=catList.slice(0,6).map(([cat,val])=>{
              const pct=val/catTotal;
              const angle=pct*2*Math.PI;
              const x1=cx+r*Math.cos(cumAngle),y1=cy+r*Math.sin(cumAngle);
              cumAngle+=angle;
              const x2=cx+r*Math.cos(cumAngle),y2=cy+r*Math.sin(cumAngle);
              const xi1=cx+inner*Math.cos(cumAngle-angle),yi1=cy+inner*Math.sin(cumAngle-angle);
              const xi2=cx+inner*Math.cos(cumAngle),yi2=cy+inner*Math.sin(cumAngle);
              const large=angle>Math.PI?1:0;
              const d=`M${xi1},${yi1} L${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} L${xi2},${yi2} A${inner},${inner} 0 ${large},0 ${xi1},${yi1} Z`;
              return {cat,val,pct,d,color:getCatColor(cat,data.categories)};
            });
            return (
              <div style={{display:"flex",gap:16,alignItems:"center"}}>
                <svg width={size} height={size} style={{flexShrink:0}}>
                  {slices.map((s,i)=><path key={i} d={s.d} fill={s.color} opacity={0.9}/>)}
                </svg>
                <div style={{flex:1,display:"flex",flexDirection:"column",gap:7}}>
                  {slices.map(({cat,val,pct,color})=>(
                    <div key={cat} style={{display:"flex",alignItems:"center",gap:8}}>
                      <div style={{width:7,height:7,borderRadius:2,background:color,flexShrink:0}}/>
                      <span style={{fontSize:12,color:"var(--muted)",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{cat}</span>
                      <span style={{fontSize:12,fontWeight:600,color:"var(--fg)"}}>{(pct*100).toFixed(0)}%</span>
                    </div>
                  ))}
                </div>
              </div>
            );
          })()}

          {catList.length===0&&(
            <div style={{textAlign:"center",padding:"16px 0",color:"var(--muted)",fontSize:13}}>No spending data for this period.</div>
          )}
        </div>
      </Section>

      {/* Monthly trend */}
      <Section title={`MONTHLY — ${cur}`}>
        <div style={{background:"var(--s1)",borderRadius:16,padding:"16px 18px",border:"1px solid var(--b1)"}}>
          {(()=>{
            const months=Array.from({length:6},(_,i)=>{
              const d=new Date(); d.setMonth(d.getMonth()-(5-i));
              const key=d.toISOString().slice(0,7);
              const label=d.toLocaleString("default",{month:"short"});
              const txs=data.transactions.filter(t=>t.currency===cur&&!t.pending&&t.date?.startsWith(key));
              const income=txs.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
              const expense=txs.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
              return {label,income,expense};
            });
            const maxVal=Math.max(...months.map(m=>Math.max(m.income,m.expense)),1);
            return (
              <>
                <div style={{display:"flex",gap:14,marginBottom:14}}>
                  {[["var(--acc)","IN"],["var(--red)","OUT"]].map(([c,l])=>(
                    <div key={l} style={{display:"flex",alignItems:"center",gap:5}}>
                      <div style={{width:7,height:7,borderRadius:2,background:c}}/>
                      <span style={{fontSize:10,color:"var(--muted)"}}>{l}</span>
                    </div>
                  ))}
                </div>
                <div style={{display:"flex",alignItems:"flex-end",gap:8,height:72}}>
                  {months.map((m,i)=>(
                    <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                      <div style={{width:"100%",height:54,display:"flex",alignItems:"flex-end",gap:2}}>
                        <div style={{flex:1,borderRadius:"3px 3px 0 0",background:"var(--acc)",opacity:0.8,height:`${Math.max(3,(m.income/maxVal)*100)}%`}}/>
                        <div style={{flex:1,borderRadius:"3px 3px 0 0",background:"var(--red)",opacity:0.8,height:`${Math.max(3,(m.expense/maxVal)*100)}%`}}/>
                      </div>
                      <div style={{fontSize:10,color:"var(--muted)"}}>{m.label}</div>
                    </div>
                  ))}
                </div>
              </>
            );
          })()}
        </div>
      </Section>
    </div>
  );
}

// ═══════════════════════════════════════
// VAULT TAB
// ═══════════════════════════════════════
function VaultTab({data,upd,eurAccTotal,idrAccTotal,eurNetWorth,idrNetWorth,eurInvTotal,idrInvTotal,eurDebtTotal,idrDebtTotal}) {
  const goals=data.goals||[];
  const debts=data.debts||[];
  const subs=data.subscriptions||[];
  const investments=data.investments||[];

  const [debtForm,setDebtForm]=useState({name:"",total:"",months:"",currency:"EUR",nextDate:"",accountId:"",accountName:""});
  const [subForm,setSubForm]=useState({name:"",amount:"",currency:"EUR",renewal:"Monthly",accountId:"",nextDate:todayStr()});
  const [goalForm,setGoalForm]=useState({name:"",target:"",saved:"",currency:"EUR",deadline:"",emoji:"🎯",accountId:"",type:"spending"});
  const [showAddAccount,setShowAddAccount]=useState(false);
  const [showAddDebt,setShowAddDebt]=useState(false);
  const [showAddSub,setShowAddSub]=useState(false);
  const [showAddInvest,setShowAddInvest]=useState(false);

  const allAccounts=[
    ...data.eurAccounts.map(a=>({...a,currency:"EUR"})),
    ...data.idrAccounts.map(a=>({...a,currency:"IDR"})),
  ];

  const addGoal=()=>{
    if(!goalForm.name) return;
    const isSpending=goalForm.type!=="saving";
    upd("goals",[...goals,{id:Date.now(),...goalForm,target:isSpending?0:parseFloat(goalForm.target)||0,saved:0}]);
    setGoalForm({name:"",target:"",saved:"",currency:"EUR",deadline:"",emoji:"🎯",accountId:"",type:"spending"});
  };
  const delGoal=(id)=>upd("goals",goals.filter(g=>g.id!==id));
  const updGoalSaved=(id,v)=>upd("goals",goals.map(g=>g.id===id?{...g,saved:v}:g));

  const addDebt=()=>{
    const totalAmt=parseFloat(debtForm.total)||0;
    const totalMonths=parseInt(debtForm.months)||0;
    if(!debtForm.name||!totalAmt) return;
    const monthlyAmt=totalMonths>0?totalAmt/totalMonths:0;
    const newDebt={id:Date.now(),...debtForm,total:totalAmt,remaining:totalAmt,monthly:monthlyAmt,totalMonths};
    upd("debts",[...debts,newDebt]);
    if(newDebt.nextDate&&newDebt.monthly>0){
      const pending=newDebt.nextDate>todayStr();
      const acc=allAccounts.find(a=>String(a.id)===String(debtForm.accountId));
      const tx={id:Date.now()+1,type:"expense",currency:newDebt.currency,amount:newDebt.monthly,category:"Debt",note:newDebt.name+" payment",date:newDebt.nextDate,accountId:newDebt.accountId,accountName:acc?.name||"",pending,debtId:newDebt.id};
      upd("transactions",[tx,...(data.transactions||[])]);
    }
    setDebtForm({name:"",total:"",months:"",currency:"EUR",nextDate:"",accountId:"",accountName:""});
    setShowAddDebt(false);
  };
  const delDebt=(id)=>{
    upd("debts",debts.filter(d=>d.id!==id));
    upd("transactions",(data.transactions||[]).filter(t=>t.debtId!==id));
  };

  const addSub=()=>{
    if(!subForm.name||!subForm.amount||!subForm.accountId) return;
    const acc=allAccounts.find(a=>String(a.id)===String(subForm.accountId));
    upd("subscriptions",[...subs,{id:Date.now(),...subForm,amount:parseFloat(subForm.amount),accountName:acc?.name||""}]);
    setSubForm({name:"",amount:"",currency:"EUR",renewal:"Monthly",accountId:"",nextDate:todayStr()});
    setShowAddSub(false);
  };
  const delSub=(id)=>{
    upd("subscriptions",subs.filter(s=>s.id!==id));
    upd("transactions",(data.transactions||[]).filter(t=>t.subId!==id));
  };

  const subMonthlyEUR=subs.filter(s=>s.currency==="EUR").reduce((s,sub)=>{
    if(sub.renewal==="Monthly") return s+sub.amount;
    if(sub.renewal==="Yearly") return s+sub.amount/12;
    if(sub.renewal==="Weekly") return s+sub.amount*4.33;
    if(sub.renewal==="Quarterly") return s+sub.amount/3;
    return s;
  },0);

  const eurTrueNetWorth=eurNetWorth-eurDebtTotal;
  const idrTrueNetWorth=idrNetWorth-idrDebtTotal;

  // Section add button style
  const AddBtn=({onClick})=>(
    <button onClick={onClick} style={{background:"none",border:"none",color:"var(--acc)",fontSize:12,fontWeight:600,cursor:"pointer",padding:"4px 0",letterSpacing:"0.04em"}}>+ Add</button>
  );

  return (
    <div>
      {/* Net Worth Hero */}
      <div style={{background:"linear-gradient(160deg,var(--s1) 0%,var(--s2) 100%)",borderRadius:22,padding:"26px 22px",marginBottom:24,border:"1px solid var(--b1)",boxShadow:"0 8px 32px rgba(0,0,0,0.2)",textAlign:"center",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",bottom:"-50%",left:"50%",transform:"translateX(-50%)",width:"70%",height:"100%",background:"radial-gradient(ellipse,rgba(16,185,129,0.1) 0%,transparent 70%)",pointerEvents:"none"}}/>
        <div style={{fontSize:10,color:"var(--muted)",letterSpacing:"0.14em",marginBottom:10,fontWeight:700}}>NET WORTH</div>
        <div style={{fontSize:34,fontWeight:800,color:"var(--green)",letterSpacing:"-1.5px",lineHeight:1}}>{fmtEUR(eurTrueNetWorth)}</div>
        {idrTrueNetWorth!==0&&<div style={{fontSize:15,color:"var(--blue)",marginTop:8,fontWeight:600}}>{fmtIDR(idrTrueNetWorth)}</div>}
        <div style={{display:"flex",justifyContent:"center",gap:24,marginTop:18,paddingTop:16,borderTop:"1px solid var(--b1)"}}>
          <div>
            <div style={{fontSize:9,color:"var(--muted)",letterSpacing:"0.1em",marginBottom:4}}>ASSETS</div>
            <div style={{fontSize:14,fontWeight:700,color:"var(--fg)"}}>{fmtEUR(eurNetWorth)}</div>
          </div>
          <div style={{width:1,background:"var(--b1)"}}/>
          <div>
            <div style={{fontSize:9,color:"var(--muted)",letterSpacing:"0.1em",marginBottom:4}}>DEBTS</div>
            <div style={{fontSize:14,fontWeight:700,color:eurDebtTotal>0?"var(--red)":"var(--fg)"}}>{eurDebtTotal>0?"-":""}{fmtEUR(eurDebtTotal)}</div>
          </div>
        </div>
      </div>

      {/* ACCOUNTS */}
      <Section title="ACCOUNTS" subtitle={`${allAccounts.length} account${allAccounts.length!==1?"s":""}`} action={<AddBtn onClick={()=>setShowAddAccount(true)}/>}>
        {allAccounts.length===0?(
          <div style={{background:"var(--s1)",borderRadius:16,padding:32,textAlign:"center",border:"1px solid var(--b1)"}}>
            <div style={{fontSize:28,marginBottom:10}}>💳</div>
            <div style={{fontSize:13,color:"var(--muted)",marginBottom:16}}>No accounts yet</div>
            <button onClick={()=>setShowAddAccount(true)} style={{background:"var(--acc)",border:"none",borderRadius:10,padding:"11px 22px",color:"#000",fontWeight:700,fontSize:12,cursor:"pointer"}}>Add First Account</button>
          </div>
        ):(
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {allAccounts.map(acc=>(
              <AccountCard key={acc.id} acc={acc} fmt={acc.currency==="EUR"?fmtEUR:fmtIDR} freeToSpend={acc.balance-(goals.filter(g=>g.accountId===acc.id).reduce((s,g)=>s+Math.max(0,g.saved),0))} accGoals={goals.filter(g=>g.accountId===acc.id)} upd={upd} data={data} updGoalSaved={updGoalSaved} delGoal={delGoal} goalForm={goalForm} setGoalForm={setGoalForm} addGoal={addGoal}/>
            ))}
          </div>
        )}
      </Section>

      {/* DEBTS */}
      <Section title="DEBTS" subtitle={debts.length>0?`${debts.length} active`:"debt-free 🎉"} action={<AddBtn onClick={()=>setShowAddDebt(true)}/>}>
        {debts.length===0?(
          <div style={{background:"var(--s1)",borderRadius:16,padding:20,textAlign:"center",border:"1px solid var(--b1)"}}>
            <div style={{fontSize:13,color:"var(--muted)"}}>No active debts</div>
          </div>
        ):(
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {debts.map(d=>{
              const fmt=d.currency==="IDR"?fmtIDR:fmtEUR;
              const pct=d.total>0?((d.total-d.remaining)/d.total)*100:0;
              const _tm=d.totalMonths||(d.total>0&&d.monthly>0?Math.round(d.total/d.monthly):0);
              const dynamicMonthly=_tm>0?d.remaining/_tm:d.monthly;
              return (
                <div key={d.id} style={{background:"linear-gradient(160deg,var(--s1),var(--s2))",borderRadius:16,padding:16,border:"1px solid var(--b1)"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                    <div>
                      <div style={{fontSize:14,fontWeight:600,color:"var(--fg)"}}>{d.name}</div>
                      <div style={{fontSize:11,color:"var(--muted)",marginTop:2}}>{pct.toFixed(0)}% paid · {d.currency}</div>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <div style={{fontSize:16,fontWeight:700,color:"var(--red)"}}>{fmt(d.remaining)}</div>
                      <MenuBtn items={[{label:"Delete",danger:true,action:()=>delDebt(d.id)}]}/>
                    </div>
                  </div>
                  <ProgressBar pct={pct} color="var(--green)"/>
                  {dynamicMonthly>0&&(
                    <div style={{display:"flex",justifyContent:"space-between",marginTop:10,fontSize:11,color:"var(--muted)"}}>
                      <span>{fmt(dynamicMonthly)}/mo</span>
                      <span>{_tm} months</span>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}
      </Section>

      {/* SUBSCRIPTIONS */}
      <Section title="SUBSCRIPTIONS" subtitle={subs.length>0?`${fmtEUR(subMonthlyEUR)}/mo`:"none active"} action={<AddBtn onClick={()=>setShowAddSub(true)}/>}>
        {subs.length===0?(
          <div style={{background:"var(--s1)",borderRadius:16,padding:20,textAlign:"center",border:"1px solid var(--b1)"}}>
            <div style={{fontSize:13,color:"var(--muted)"}}>No subscriptions tracked</div>
          </div>
        ):(
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {subs.map(s=>{
              const fmt=s.currency==="IDR"?fmtIDR:fmtEUR;
              return (
                <div key={s.id} style={{background:"linear-gradient(160deg,var(--s1),var(--s2))",borderRadius:14,padding:"14px 16px",border:"1px solid var(--b1)",display:"flex",alignItems:"center",gap:12}}>
                  <div style={{width:38,height:38,borderRadius:11,background:"rgba(251,146,60,0.1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>🔄</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:600,color:"var(--fg)"}}>{s.name}</div>
                    <div style={{fontSize:11,color:"var(--muted)",marginTop:1}}>{s.renewal} · {s.accountName}</div>
                  </div>
                  <div style={{fontSize:15,fontWeight:700,color:"var(--orange)"}}>{fmt(s.amount)}</div>
                  <MenuBtn items={[{label:"Delete",danger:true,action:()=>delSub(s.id)}]}/>
                </div>
              );
            })}
          </div>
        )}
      </Section>

      {/* INVESTMENTS */}
      <Section title="INVESTMENTS" subtitle={investments.length>0?`${investments.length} holding${investments.length!==1?"s":""}`:"none yet"} action={<AddBtn onClick={()=>setShowAddInvest(true)}/>}>
        {investments.length===0?(
          <div style={{background:"var(--s1)",borderRadius:16,padding:20,textAlign:"center",border:"1px solid var(--b1)"}}>
            <div style={{fontSize:13,color:"var(--muted)"}}>No investments tracked yet</div>
          </div>
        ):(
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {investments.map(inv=><InvestCard key={inv.id} inv={inv} upd={upd} investments={investments}/>)}
          </div>
        )}
      </Section>

      {/* MODALS */}
      <AddAccountModal show={showAddAccount} onClose={()=>setShowAddAccount(false)} data={data} upd={upd}/>

      <Modal show={showAddDebt} onClose={()=>setShowAddDebt(false)} title="Add Debt">
        <div style={{display:"flex",gap:8,marginBottom:16}}>
          {["EUR","IDR"].map(c=><PillBtn key={c} active={debtForm.currency===c} onClick={()=>setDebtForm(f=>({...f,currency:c}))} color="var(--red)">{c}</PillBtn>)}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:20}}>
          <Field label="NAME"><input placeholder="e.g. Car loan" value={debtForm.name} onChange={e=>setDebtForm(f=>({...f,name:e.target.value}))} style={IS}/></Field>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <Field label="TOTAL AMOUNT"><NumInput placeholder="0" value={debtForm.total} onChange={v=>setDebtForm(f=>({...f,total:v}))} style={IS}/></Field>
            <Field label="MONTHS"><input type="number" placeholder="12" value={debtForm.months} onChange={e=>setDebtForm(f=>({...f,months:e.target.value}))} style={IS}/></Field>
          </div>
          {parseFloat(debtForm.total)>0&&parseInt(debtForm.months)>0&&(
            <div style={{fontSize:12,color:"var(--acc)",padding:"8px 12px",background:"rgba(196,181,253,0.06)",borderRadius:8}}>
              = {debtForm.currency==="IDR"?fmtIDR(parseFloat(debtForm.total)/parseInt(debtForm.months)):fmtEUR(parseFloat(debtForm.total)/parseInt(debtForm.months))}/mo
            </div>
          )}
          <DatePicker label="NEXT PAYMENT" value={debtForm.nextDate} onChange={v=>setDebtForm(f=>({...f,nextDate:v}))}/>
          <Field label="DEBIT FROM">
            <select value={debtForm.accountId} onChange={e=>setDebtForm(f=>({...f,accountId:e.target.value}))} style={IS}>
              <option value="">Select account…</option>
              {allAccounts.filter(a=>a.currency===debtForm.currency).map(a=><option key={a.id} value={a.id}>{a.name}</option>)}
            </select>
          </Field>
        </div>
        <ActionBtn onClick={addDebt} color="var(--red)" disabled={!debtForm.name||!debtForm.total}>ADD DEBT</ActionBtn>
      </Modal>

      <Modal show={showAddSub} onClose={()=>setShowAddSub(false)} title="Add Subscription">
        <div style={{display:"flex",gap:8,marginBottom:16}}>
          {["EUR","IDR"].map(c=><PillBtn key={c} active={subForm.currency===c} onClick={()=>setSubForm(f=>({...f,currency:c,accountId:""}))}>{c}</PillBtn>)}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:20}}>
          <Field label="NAME"><input placeholder="e.g. Netflix" value={subForm.name} onChange={e=>setSubForm(f=>({...f,name:e.target.value}))} style={IS}/></Field>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <Field label="AMOUNT"><NumInput placeholder="9.99" value={subForm.amount} onChange={v=>setSubForm(f=>({...f,amount:v}))} style={IS}/></Field>
            <Field label="RENEWAL">
              <select value={subForm.renewal} onChange={e=>setSubForm(f=>({...f,renewal:e.target.value}))} style={IS}>
                {RENEWAL.map(r=><option key={r}>{r}</option>)}
              </select>
            </Field>
          </div>
          <Field label="ACCOUNT">
            <select value={subForm.accountId} onChange={e=>setSubForm(f=>({...f,accountId:e.target.value}))} style={IS}>
              <option value="">Select account…</option>
              {allAccounts.filter(a=>a.currency===subForm.currency).map(a=><option key={a.id} value={a.id}>{a.name}</option>)}
            </select>
          </Field>
          <DatePicker label="NEXT RENEWAL" value={subForm.nextDate} onChange={v=>setSubForm(f=>({...f,nextDate:v}))}/>
        </div>
        <ActionBtn onClick={addSub} color="var(--orange)" disabled={!subForm.name||!subForm.amount||!subForm.accountId}>ADD SUBSCRIPTION</ActionBtn>
      </Modal>

      <AddInvestModal show={showAddInvest} onClose={()=>setShowAddInvest(false)} data={data} upd={upd}/>
    </div>
  );
}

// ── AccountCard ───────────────────────────────────────────────────────────────
function AccountCard({acc,fmt,freeToSpend,accGoals,upd,data,updGoalSaved,delGoal,goalForm,setGoalForm,addGoal}) {

  const delAcc=()=>{
    if(isEUR) upd("eurAccounts",data.eurAccounts.filter(a=>a.id!==acc.id));
    else upd("idrAccounts",data.idrAccounts.filter(a=>a.id!==acc.id));
  };

  const saveEdit=()=>{
    const updated={...acc,name:editForm.name,balance:parseFloat(editForm.balance)||0,rate:parseFloat(editForm.rate)||0,note:editForm.note};
    if(isEUR) upd("eurAccounts",data.eurAccounts.map(a=>a.id===acc.id?updated:a));
    else upd("idrAccounts",data.idrAccounts.map(a=>a.id===acc.id?updated:a));

          <Field label="NOTE"><input placeholder="optional" value={editForm.note} onChange={e=>setEditForm(f=>({...f,note:e.target.value}))} style={IS}/></Field>

      <div style={{padding:"14px 16px",borderBottom:accGoals.length>0||showPocketForm?"1px solid var(--b1)":"none"}}>

          </div>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontSize:17,fontWeight:700,color:"var(--fg)"}}>{fmt(acc.balance)}</span>
            <MenuBtn items={[
              {label:"Edit",action:()=>{setEditForm({name:acc.name,balance:acc.balance,rate:acc.rate||"",note:acc.note||""});setShowEdit(true);}},

  );

// ── PocketRow ─────────────────────────────────────────────────────────────────
function PocketRow({g,fmt,updGoalSaved,delGoal,allPockets}) {
  const [mode,setMode]=useState(null);
  const [val,setVal]=useState("");
  const [moveTo,setMoveTo]=useState("free");
  const isSaving=g.type==="saving";
  const pct=isSaving&&g.target>0?(g.saved/g.target)*100:0;

  const confirm=()=>{
    const v=parseFloat(val);
    if(!isNaN(v)&&v>0){
      if(mode==="topup") updGoalSaved(g.id,g.saved+v);
      else if(mode==="move"){
        updGoalSaved(g.id,g.saved-v);
        if(moveTo!=="free"){
          const dest=allPockets.find(p=>String(p.id)===String(moveTo));
          if(dest) updGoalSaved(dest.id,dest.saved+v);
        }
      }
    }
    setVal(""); setMode(null); setMoveTo("free");
  };

  return (
    <div style={{borderBottom:"1px solid var(--b1)",background:g.saved<0?"rgba(248,113,113,0.03)":"transparent"}}>
      <div style={{padding:"12px 16px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:isSaving&&g.target>0?8:0}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:16}}>{g.emoji}</span>
            <span style={{fontSize:13,fontWeight:600,color:"var(--fg)"}}>{g.name}</span>
            <span style={{fontSize:9,padding:"2px 6px",borderRadius:4,background:isSaving?"rgba(96,165,250,0.1)":"rgba(16,185,129,0.1)",color:isSaving?"var(--blue)":"var(--green)",fontWeight:600}}>{isSaving?"SAVE":"SPEND"}</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontSize:14,fontWeight:700,color:g.saved<0?"var(--red)":isSaving?"var(--green)":"var(--green)"}}>{fmt(g.saved)}</span>
            <MenuBtn items={[
              {label:"Top up",action:()=>setMode("topup")},
              {label:"Move",action:()=>setMode("move")},
              {label:"Delete",danger:true,action:()=>delGoal(g.id)},
            ]}/>
          </div>
        </div>
        {isSaving&&g.target>0&&(
          <>
            <ProgressBar pct={Math.min(pct,100)} color={pct>=100?"var(--acc)":"var(--green)"}/>
            <div style={{display:"flex",justifyContent:"space-between",marginTop:5}}>
              <span style={{fontSize:10,color:"var(--muted)"}}>{pct.toFixed(0)}%</span>
              <span style={{fontSize:10,color:"var(--muted)"}}>goal: {fmt(g.target)}</span>
            </div>
          </>
        )}
        {g.saved<0&&!mode&&(
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:8,padding:"7px 10px",borderRadius:8,background:"rgba(248,113,113,0.08)"}}>
            <span style={{fontSize:11,color:"var(--red)"}}>Cover this?</span>
            <button onClick={()=>setMode("topup")} style={{fontSize:11,color:"var(--acc)",background:"none",border:"1px solid var(--acc)",borderRadius:6,padding:"3px 10px",cursor:"pointer",fontFamily:"var(--font)"}}>+ Add</button>
          </div>
        )}
      </div>
      {mode&&(
        <div style={{padding:"0 16px 12px",display:"flex",flexDirection:"column",gap:8}}>
          {mode==="move"&&(
            <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
              <PillBtn small active={moveTo==="free"} onClick={()=>setMoveTo("free")}>🆓 Free</PillBtn>
              {allPockets.filter(p=>p.id!==g.id).map(p=>(
                <PillBtn small key={p.id} active={String(moveTo)===String(p.id)} onClick={()=>setMoveTo(String(p.id))} color="var(--green)">{p.emoji} {p.name}</PillBtn>
              ))}
            </div>
          )}
          <div style={{display:"flex",gap:6}}>
            <NumInput value={val} onChange={v=>setVal(v)} placeholder="Amount" style={{...IS,flex:1,padding:"9px 12px"}}/>
            <button onClick={confirm} style={{padding:"0 16px",borderRadius:10,border:"none",background:mode==="topup"?"var(--acc)":"var(--green)",color:"#000",fontSize:12,fontWeight:700,cursor:"pointer"}}>OK</button>
            <button onClick={()=>{setVal("");setMode(null);}} style={{padding:"0 12px",borderRadius:10,border:"1px solid var(--b2)",background:"transparent",color:"var(--muted)",fontSize:12,cursor:"pointer"}}>×</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── InvestCard ────────────────────────────────────────────────────────────────
function InvestCard({inv,upd,investments}) {
  const [showEdit,setShowEdit]=useState(false);

  const g=(parseFloat(inv.currentValue)||0)-(parseFloat(inv.totalInvested)||0);
  const p=(parseFloat(inv.totalInvested)||0)>0?(g/(parseFloat(inv.totalInvested)||1))*100:0;

  const saveEdit=()=>{
    upd("investments",investments.map(i=>i.id===inv.id?{...inv,name:editForm.name,type:editForm.type,totalInvested:parseFloat(editForm.totalInvested)||0,currentValue:parseFloat(editForm.currentValue)||0,notes:editForm.notes,lastUpdated:todayStr()}:i));
    setShowEdit(false);
  };

  return (
    <div style={{background:"var(--s1)",borderRadius:14,padding:"14px 16px",border:"1px solid var(--b1)"}}>
      <Modal show={showEdit} onClose={()=>setShowEdit(false)} title="Edit Investment">
        <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:20}}>
          <Field label="NAME"><input value={editForm.name} onChange={e=>setEditForm(f=>({...f,name:e.target.value}))} style={IS}/></Field>
          <Field label="TYPE">
            <select value={editForm.type} onChange={e=>setEditForm(f=>({...f,type:e.target.value}))} style={IS}>

          </Field>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <Field label="INVESTED"><NumInput value={editForm.totalInvested} onChange={v=>setEditForm(f=>({...f,totalInvested:v}))} style={IS}/></Field>
            <Field label="CURRENT VALUE"><NumInput value={editForm.currentValue} onChange={v=>setEditForm(f=>({...f,currentValue:v}))} style={IS}/></Field>
          </div>
          <Field label="NOTES"><input placeholder="optional" value={editForm.notes} onChange={e=>setEditForm(f=>({...f,notes:e.target.value}))} style={IS}/></Field>
        </div>
        <ActionBtn onClick={saveEdit}>SAVE CHANGES</ActionBtn>
      </Modal>

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div style={{flex:1}}>
          <div style={{fontSize:14,fontWeight:600,color:"var(--fg)"}}>{inv.name}</div>
          <div style={{fontSize:11,color:"var(--muted)",marginTop:2}}>{inv.type} · {inv.currency}</div>
        </div>
        <div style={{textAlign:"right",marginRight:4}}>
          <div style={{fontSize:16,fontWeight:700,color:"var(--green)"}}>{fmt(parseFloat(inv.currentValue)||0)}</div>
          <div style={{fontSize:11,color:g>=0?"var(--green)":"var(--red)",marginTop:2}}>{g>=0?"+":""}{fmt(g)} ({p>=0?"+":""}{p.toFixed(1)}%)</div>
        </div>
        <MenuBtn items={[
          {label:"Edit",action:()=>{setEditForm({name:inv.name,type:inv.type,totalInvested:inv.totalInvested,currentValue:inv.currentValue,notes:inv.notes||""});setShowEdit(true);}},
          {label:"Delete",danger:true,action:()=>upd("investments",investments.filter(i=>i.id!==inv.id))},
        ]}/>
      </div>
    </div>
  );
}

// ── Settings ──────────────────────────────────────────────────────────────────

  const [show,setShow]=useState(false);
  const [confirmReset,setConfirmReset]=useState(false);
  const [showCategories,setShowCategories]=useState(false);

  const exportData=()=>{
    const json=JSON.stringify(data,null,2);
    navigator.clipboard.writeText(json).then(()=>{alert("Data copied to clipboard!");}).catch(()=>{const w=window.open("","_blank");w.document.write("<pre>"+json+"</pre>");});
    setShow(false);
  };

  return (
    <div style={{position:"relative"}}>
      <button onClick={()=>setShow(s=>!s)} style={{background:"none",border:"none",color:"var(--muted)",fontSize:18,cursor:"pointer",padding:"4px",lineHeight:1}}>☰</button>
