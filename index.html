<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0A0A0A">
  <title>vault.</title>
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">
  
  <!-- Apple Touch Icon -->
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  
  <!-- React & Babel -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body, #root { height: 100%; width: 100%; background: #0A0A0A; }
    body { font-family: 'Geist Mono', ui-monospace, monospace; -webkit-font-smoothing: antialiased; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useEffect } = React;

// ── Formatters ──────────────────────────────────────────────────────────────
const fmtEUR = (n) => `€${(n ?? 0).toLocaleString("de-DE", { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
const fmtIDR = (n) => `Rp${Math.round(n ?? 0).toLocaleString("id-ID")}`;
const fmtPct = (n) => `${(n ?? 0) >= 0 ? "+" : ""}${(n ?? 0).toFixed(2)}%`;
const fmtDate = (d) => d ? new Date(d).toLocaleDateString("en-GB", { day: "2-digit", month: "short" }) : "";
const todayStr = () => new Date().toISOString().split("T")[0];
const thisMonthStr = () => new Date().toISOString().slice(0, 7);
const thisWeekStr = () => { const d = new Date(); d.setDate(d.getDate() - d.getDay()); return d.toISOString().split("T")[0]; };

const CAT_FALLBACKS=["#FF6B6B","#FF9F43","#FFC048","#A29BFE","#74B9FF","#FD79A8","#55EFC4","#E17055","#6C5CE7","#00CEC9","#00B894","#FDCB6E"];
const getCatColor=(cat,categories=[])=>{
  const found=categories.find(c=>c.name===cat);
  if(found?.color) return found.color;
  let hash=0; for(let i=0;i<(cat||"").length;i++) hash=cat.charCodeAt(i)+((hash<<5)-hash);
  return CAT_FALLBACKS[Math.abs(hash)%CAT_FALLBACKS.length];
};
const RENEWAL = ["Monthly","Yearly","Weekly","Quarterly"];

// 3 tabs: Track | Home | Vault
const TABS = [
  {id:"track",  icon:"±", label:"Track"},
  {id:"home",   icon:"⌂", label:"Home"},
  {id:"vault",  icon:"◇", label:"Vault"},
];

// Default categories (used on first launch) - all editable/deletable
const DEFAULT_EXP_CATS = [
  {name:"Food",color:"#FF6B6B",type:"expense"},
  {name:"Groceries",color:"#FF8C42",type:"expense"},
  {name:"Rent",color:"#FF9F43",type:"expense"},
  {name:"Transport",color:"#FFC048",type:"expense"},
  {name:"Shopping",color:"#FD79A8",type:"expense"},
  {name:"Utilities",color:"#55EFC4",type:"expense"},
  {name:"Other",color:"#B2BEC3",type:"expense"},
];
const DEFAULT_INC_CATS = [
  {name:"Salary",color:"#00B894",type:"income"},
  {name:"Freelance",color:"#00CEC9",type:"income"},
  {name:"Other Income",color:"#FDCB6E",type:"income"},
];
const DEFAULT_SYS_CATS = [
  {name:"Subscription",color:"#A29BFE",type:"system"},
  {name:"Debt",color:"#D63031",type:"system"},
];

const SEED = {
  transactions:[], investments:[], subscriptions:[],
  transfers:[], goals:[], debts:[],
  categories:[...DEFAULT_EXP_CATS,...DEFAULT_INC_CATS,...DEFAULT_SYS_CATS],
  eurAccounts:[],
  idrAccounts:[],
  eurCash:0, idrCash:0,
  lastCurrency: "EUR",
  lastAccountId: null,
  lastCategory: "Food",
};

const IS = {
  width:"100%", padding:"12px 14px", borderRadius:10,
  border:"1px solid var(--b2)", background:"var(--s2)",
  color:"var(--fg)", fontSize:14, fontFamily:"var(--font)", outline:"none",
  transition:"all 0.2s ease",
};

// ── Atoms ────────────────────────────────────────────────────────────────────
const Lbl = ({c,children}) => <div style={{fontSize:11,letterSpacing:"0.1em",color:c||"var(--muted)",marginBottom:6,fontWeight:500}}>{children}</div>;

function Field({label,col,children}) {
  return <div style={{minWidth:0,...(col?{gridColumn:col}:{})}}><Lbl>{label}</Lbl>{children}</div>;
}

function NumInput({value, onChange, placeholder, style, onBlur, autoFocus}) {
  const fmt = (v) => {
    if(v===""||v===undefined||v===null) return "";
    const parts = String(v).split(".");
    parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ".");
    return parts.join(",");
  };
  const parse = (s) => s.replace(/\./g,"").replace(",",".");
  const [display, setDisplay] = useState(fmt(value));

  useEffect(()=>{
    const raw = parseFloat(String(value));
    if(!isNaN(raw)) setDisplay(fmt(raw));
    else setDisplay("");
  },[value]);

  const handleChange = (e) => {
    const raw = e.target.value.replace(/[^0-9,]/g,"");
    setDisplay(raw);
    const num = parseFloat(parse(raw));
    if(!isNaN(num)) onChange(num);
    else if(raw==="") onChange("");
  };

  return (
    <input
      autoFocus={autoFocus}
      type="text"
      inputMode="decimal"
      value={display}
      onChange={handleChange}
      onBlur={()=>{
        const num=parseFloat(parse(display));
        if(!isNaN(num)){setDisplay(fmt(num));if(onBlur)onBlur(num);}
        else{setDisplay("");if(onBlur)onBlur("");}
      }}
      placeholder={placeholder}
      style={style||IS}
    />
  );
}

function PillBtn({active,onClick,children,color,small}) {
  const ac = color||"var(--acc)";
  return (
    <button onClick={onClick} style={{
      padding:small?"6px 11px":"8px 14px",borderRadius:20,border:`1.5px solid ${active?ac:"var(--b2)"}`,
      background:active?`${ac}15`:"transparent",color:active?ac:"var(--muted)",
      fontSize:small?11:12,fontFamily:"var(--font)",cursor:"pointer",letterSpacing:"0.04em",
      transition:"all 0.2s ease",whiteSpace:"nowrap",fontWeight:active?600:500,
    }}>{children}</button>
  );
}

function ActionBtn({onClick,children,color,small}) {
  const c = color||"var(--acc)";
  return (
    <button onClick={onClick}
      onMouseEnter={e=>{e.currentTarget.style.opacity="0.9";}}
      onMouseLeave={e=>{e.currentTarget.style.opacity="1";}}
      style={{width:"100%",padding:small?"11px":"13px",borderRadius:12,border:"none",background:c,
        color:"#000",fontSize:small?11:12,fontWeight:700,fontFamily:"var(--font)",cursor:"pointer",
        letterSpacing:"0.06em",transition:"all 0.2s ease",
      }}>{children}</button>
  );
}

function HeroNum({label,value,sub,color,size=32}) {
  return (
    <div>
      {label && <Lbl>{label}</Lbl>}
      <div style={{fontSize:size,fontWeight:700,color:color||"var(--fg)",letterSpacing:"-1.5px",lineHeight:1.1}}>{value}</div>
      {sub && <div style={{fontSize:12,color:"var(--muted)",marginTop:4}}>{sub}</div>}
    </div>
  );
}

function StatCard({label,value,sub,color,accent}) {
  return (
    <div style={{background:"linear-gradient(145deg, var(--s1) 0%, var(--s2) 100%)",borderRadius:16,padding:"16px 18px",border:`1px solid ${accent||"var(--b1)"}`,boxShadow:"0 4px 16px rgba(0,0,0,0.12)"}}>
      <Lbl>{label}</Lbl>
      <div style={{fontSize:18,fontWeight:700,color:color||"var(--fg)",letterSpacing:"-0.5px"}}>{value}</div>
      {sub && <div style={{fontSize:12,color:"var(--muted)",marginTop:4}}>{sub}</div>}
    </div>
  );
}

function Section({title,subtitle,children,action}) {
  return (
    <div style={{marginBottom:26}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
        <div>
          <div style={{fontSize:11,fontWeight:700,letterSpacing:"0.12em",color:"var(--muted)"}}>{title}</div>
          {subtitle&&<div style={{fontSize:11,color:"var(--dim)",marginTop:3}}>{subtitle}</div>}
        </div>
        {action}
      </div>
      {children}
    </div>
  );
}

function FormCard({children}) {
  return <div style={{background:"linear-gradient(145deg, var(--s1) 0%, var(--s2) 100%)",borderRadius:18,padding:20,border:"1px solid var(--b1)",marginBottom:18,minWidth:0,boxSizing:"border-box",boxShadow:"0 4px 20px rgba(0,0,0,0.15)"}}>{children}</div>;
}

function ProgressBar({pct,color}) {
  return (
    <div style={{background:"var(--b2)",borderRadius:5,height:5,overflow:"hidden"}}>
      <div style={{width:`${Math.min(pct,100)}%`,height:"100%",borderRadius:5,background:color,transition:"width 0.5s cubic-bezier(0.4,0,0.2,1)"}}/>
    </div>
  );
}

function DatePicker({value,onChange,label}) {
  return (
    <div>
      {label&&<Lbl>{label}</Lbl>}
      <div style={{position:"relative",borderRadius:10,border:"1px solid var(--b2)",background:"var(--s2)",height:46,display:"flex",alignItems:"center",paddingLeft:14,transition:"all 0.2s ease"}}>
        <span style={{fontSize:14,color:"var(--fg)",fontFamily:"var(--font)",pointerEvents:"none"}}>
          {value?new Date(value+"T00:00:00").toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"}):"Select date"}
        </span>
        <span style={{marginLeft:"auto",paddingRight:14,fontSize:14,color:"var(--muted)",pointerEvents:"none"}}>📅</span>
        <input type="date" value={value||""} onChange={e=>onChange(e.target.value)}
          style={{position:"absolute",inset:0,width:"100%",height:"100%",opacity:0,cursor:"pointer",border:"none",background:"none"}}/>
      </div>
    </div>
  );
}

function TxRow({t,onDelete,compact}) {
  const isInc = t.type==="income";
  const fmt = t.currency==="IDR"?fmtIDR:fmtEUR;
  const color = t.pending?"var(--amber)":isInc?"var(--green)":"var(--red)";
  const bgColor = t.pending?"rgba(251,191,36,0.1)":isInc?"rgba(16,185,129,0.1)":"rgba(248,113,113,0.1)";
  return (
    <div className="txrow" style={{display:"flex",alignItems:"center",gap:12,padding:compact?"11px 0":"13px 0",borderBottom:"1px solid var(--b1)",opacity:t.pending?0.8:1,transition:"opacity 0.2s"}}>
      <div style={{width:compact?34:38,height:compact?34:38,borderRadius:11,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",
        background:bgColor,fontSize:compact?13:15,color}}>
        {t.pending?"◌":isInc?"↗":"↘"}
      </div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
          <div style={{fontSize:compact?13:14,fontWeight:600,color:"var(--fg)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
            {t.note||t.category}
          </div>
          {t.pending&&<span style={{fontSize:9,padding:"2px 7px",borderRadius:5,background:"rgba(251,191,36,0.12)",color:"var(--amber)",flexShrink:0,letterSpacing:"0.06em",fontWeight:600}}>UPCOMING</span>}
        </div>
        <div style={{fontSize:11,color:"var(--muted)",fontWeight:500}}>{t.category} · {fmtDate(t.date)} · {t.accountName||t.currency}</div>
      </div>
      <div style={{fontSize:compact?14:15,fontWeight:700,color,whiteSpace:"nowrap"}}>
        {isInc?"+":"−"}{fmt(t.amount)}
      </div>
      {onDelete && <button className="del" onClick={()=>onDelete(t.id)} style={{background:"none",border:"none",color:"var(--dim)",fontSize:20,cursor:"pointer",lineHeight:1,padding:"0 4px",flexShrink:0,transition:"color 0.15s"}}>×</button>}
    </div>
  );
}

// ── Menu Component (consistent) ──────────────────────────────────────────────
function Menu({show,onClose,items,openUp}) {
  if(!show) return null;
  const posStyle = openUp 
    ? {bottom:"calc(100% + 8px)",top:"auto"} 
    : {top:"calc(100% + 8px)",bottom:"auto"};
  return (
    <>
      <div onClick={onClose} style={{position:"fixed",inset:0,zIndex:40}}/>
      <div style={{position:"absolute",right:0,...posStyle,background:"linear-gradient(145deg, var(--s2) 0%, var(--s1) 100%)",border:"1px solid var(--b2)",borderRadius:14,zIndex:50,minWidth:150,boxShadow:"0 8px 28px rgba(0,0,0,0.5)",overflow:"hidden",backdropFilter:"blur(12px)"}}>
        {items.map((item,i)=>(
          <button key={i} onClick={()=>{item.action();onClose();}} style={{
            display:"block",width:"100%",padding:"14px 18px",border:"none",
            borderBottom:i<items.length-1?"1px solid var(--b1)":"none",
            background:"transparent",color:item.danger?"var(--red)":"var(--fg)",
            fontSize:13,fontFamily:"var(--font)",cursor:"pointer",textAlign:"left",fontWeight:500,
            transition:"background 0.15s",
          }}>
            {item.label}
          </button>
        ))}
      </div>
    </>
  );
}

function MenuBtn({items,openUp}) {
  const [show,setShow]=useState(false);
  return (
    <div style={{position:"relative"}}>
      <button onClick={()=>setShow(s=>!s)} style={{background:"none",border:"none",color:"var(--muted)",fontSize:18,cursor:"pointer",padding:"4px 8px",lineHeight:1,transition:"color 0.15s"}}>⋮</button>
      <Menu show={show} onClose={()=>setShow(false)} items={items} openUp={openUp}/>
    </div>
  );
}

// ── Main ─────────────────────────────────────────────────────────────────────
function Vault() {
  const [tab,setTab] = useState("track"); // Track is landing page
  const [data,setData] = useState(SEED);
  const [loaded,setLoaded] = useState(false);

  useEffect(()=>{
    (async()=>{
      try{ const r=localStorage.getItem("vault_v4"); if(r) setData(JSON.parse(r)); }catch{}
      setLoaded(true);
    })();
  },[]);
  useEffect(()=>{
    if(!loaded) return;
    try{ localStorage.setItem("vault_v4",JSON.stringify(data)); }catch{}
  },[data,loaded]);

  // Auto-apply monthly Sparplan
  useEffect(()=>{
    if(!loaded) return;
    const investments = data.investments||[];
    const sparplanInvs = investments.filter(i=>i.monthlyAmount>0);
    if(sparplanInvs.length===0) return;
    const today = new Date();
    const thisMonth = thisMonthStr();
    const todayDay = today.getDate();
    let updated = false;
    const newInvs = investments.map(inv=>{
      if(!inv.monthlyAmount||inv.monthlyAmount<=0) return inv;
      const lastMonth = inv.lastSparplanMonth||"";
      if(lastMonth===thisMonth) return inv;
      const execDay = inv.sparplanDay||1;
      if(todayDay < execDay) return inv;
      updated = true;
      return {
        ...inv,
        totalInvested: (inv.totalInvested||0) + inv.monthlyAmount,
        lastSparplanMonth: thisMonth,
        lastUpdated: todayStr(),
      };
    });
    if(updated) upd("investments", newInvs);
  },[loaded]);

  // Auto-create upcoming transactions for subscriptions
  useEffect(()=>{
    if(!loaded) return;
    const subs=data.subscriptions||[];
    const txs=data.transactions||[];
    const today=todayStr();
    const in30=new Date(); in30.setDate(in30.getDate()+30);
    const in30Str=in30.toISOString().split("T")[0];
    const newTxs=[];
    subs.forEach(sub=>{
      if(!sub.nextDate||sub.nextDate>in30Str) return;
      const exists=txs.find(t=>t.subId===sub.id&&t.pending);
      if(exists) return;
      newTxs.push({
        id:Date.now()+Math.random(),
        type:"expense",currency:sub.currency,
        amount:sub.amount,category:"Subscription",
        note:sub.name,date:sub.nextDate,
        accountId:sub.accountId,accountName:sub.accountName||"",
        pending:true,subId:sub.id,
      });
    });
    if(newTxs.length>0){
      upd("transactions",[...newTxs,...txs]);
    }
  },[loaded, data.subscriptions.length]);

  const upd = (key,val) => setData(d=>({...d,[key]:val}));

  const investments = data.investments||[];
  const eurInvTotal = investments.filter(i=>i.currency==="EUR").reduce((s,i)=>s+i.currentValue,0);
  const idrInvTotal = investments.filter(i=>i.currency==="IDR").reduce((s,i)=>s+i.currentValue,0);
  const eurAccTotal = data.eurAccounts.reduce((s,a)=>s+a.balance,0)+(data.eurCash||0);
  const idrAccTotal = data.idrAccounts.reduce((s,a)=>s+a.balance,0)+(data.idrCash||0);
  const eurNetWorth = eurAccTotal+eurInvTotal;
  const idrNetWorth = idrAccTotal+idrInvTotal;
  const debts=data.debts||[];
  const eurDebtTotal=debts.filter(d=>d.currency==="EUR").reduce((s,d)=>s+d.remaining,0);
  const idrDebtTotal=debts.filter(d=>d.currency==="IDR").reduce((s,d)=>s+d.remaining,0);

  const shared = {data,upd,eurAccTotal,idrAccTotal,eurNetWorth,idrNetWorth,eurInvTotal,idrInvTotal,eurDebtTotal,idrDebtTotal};

  return (
    <div style={{
      "--font":"'Outfit', sans-serif",
      "--bg":"#06060A","--s1":"#0C0C12","--s2":"#111118",
      "--b1":"#1A1A24","--b2":"#252530",
      "--fg":"#F4F4F6","--muted":"#6B6B78","--dim":"#3A3A45",
      "--acc":"#C4B5FD","--green":"#10B981","--red":"#F87171","--amber":"#FBBF24",
      "--blue":"#60A5FA","--purple":"#C4B5FD","--orange":"#FB923C","--pink":"#F9A8D4",
      fontFamily:"var(--font)",background:"var(--bg)",
      minHeight:"100vh",color:"var(--fg)",maxWidth:430,margin:"0 auto",paddingBottom:120,
    }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');
        *{box-sizing:border-box;margin:0;padding:0;}
        ::-webkit-scrollbar{width:0;}
        input,select{outline:none;color-scheme:dark;}
        input:focus,select:focus{border-color:var(--acc)!important;box-shadow:0 0 0 2px rgba(196,181,253,0.12)!important;}
        select option{background:var(--s2);padding:8px;}
        select{border-radius:10px;}
        .txrow .del{opacity:0;transition:opacity 0.15s;}
        .txrow:hover .del{opacity:1;}
        .txrow:last-child{border-bottom:none!important;}
        @keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
        .au{animation:fadeUp 0.28s cubic-bezier(0.4,0,0.2,1) forwards;}
        input[type=date]::-webkit-calendar-picker-indicator{filter:invert(0.5);}
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}
        input[type=number]{-moz-appearance:textfield;}
      `}</style>

      {/* Header */}
      <div style={{padding:"20px 24px 18px",paddingTop:"calc(16px + env(safe-area-inset-top))",borderBottom:"1px solid var(--b1)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <SettingsBtn data={data} upd={upd}/>
            <div style={{fontSize:30,fontWeight:800,letterSpacing:"-1.5px",color:"var(--fg)"}}>
              vault<span style={{color:"var(--acc)"}}>.</span>
            </div>
          </div>
          <div style={{textAlign:"right",padding:"10px 14px",borderRadius:12,background:"linear-gradient(135deg, var(--s1) 0%, var(--s2) 100%)",border:"1px solid var(--b1)",boxShadow:"0 4px 16px rgba(0,0,0,0.2)"}}>
            <div style={{fontSize:9,color:"var(--muted)",marginBottom:4,letterSpacing:"0.12em",fontWeight:600}}>NET WORTH</div>
            <div style={{fontSize:16,fontWeight:700,color:"var(--green)",letterSpacing:"-0.5px"}}>{fmtEUR(eurNetWorth-eurDebtTotal)}</div>
            <div style={{fontSize:11,color:"var(--blue)",marginTop:2,fontWeight:600}}>{fmtIDR(idrNetWorth-idrDebtTotal)}</div>
          </div>
        </div>
      </div>

      {/* Content */}
      <div style={{padding:"22px 22px 28px",boxSizing:"border-box",width:"100%"}} className="au" key={tab}>
        {tab==="track" && <Track {...shared}/>}
        {tab==="home"  && <Home  {...shared}/>}
        {tab==="vault" && <VaultTab {...shared}/>}
      </div>

      {/* Nav - Floating pill */}
      <div style={{
        position:"fixed",bottom:20,left:"50%",transform:"translateX(-50%)",
        background:"linear-gradient(135deg, var(--s2) 0%, var(--s1) 100%)",
        backdropFilter:"blur(20px)",
        border:"1px solid var(--b2)",
        borderRadius:24,
        display:"flex",
        padding:5,
        zIndex:100,
        boxShadow:"0 8px 32px rgba(0,0,0,0.4)",
      }}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{
            padding:"12px 22px",
            border:"none",
            borderRadius:20,
            background:tab===t.id?"rgba(196,181,253,0.1)":"transparent",
            cursor:"pointer",
            display:"flex",alignItems:"center",gap:6,
            transition:"all 0.2s ease",
          }}>
            <span style={{
              fontSize:15,
              color:tab===t.id?"var(--acc)":"var(--dim)",
              transition:"color 0.2s ease",
            }}>{t.icon}</span>
            <span style={{
              fontSize:11,fontWeight:600,letterSpacing:"0.04em",
              color:tab===t.id?"var(--acc)":"var(--muted)",
              transition:"color 0.2s ease",
            }}>{t.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════
// TRACK (Landing Page - Quick Add + Recent)
// ═══════════════════════════════════════
function Track({data,upd,eurAccTotal,idrAccTotal}) {
  const allAccounts=[
    ...data.eurAccounts.map(a=>({...a,currency:"EUR"})),
    ...data.idrAccounts.map(a=>({...a,currency:"IDR"})),
  ];
  const hasAccounts=allAccounts.length>0;
  
  // Smart defaults from last transaction
  const [currency,setCurrency]=useState(data.lastCurrency||"EUR");
  const [accountId,setAccountId]=useState(data.lastAccountId||allAccounts.find(a=>a.currency===(data.lastCurrency||"EUR"))?.id||"");
  const [amount,setAmount]=useState("");
  const [category,setCategory]=useState(data.lastCategory||"Food");
  const [note,setNote]=useState("");
  const [date,setDate]=useState(todayStr());
  const [showMore,setShowMore]=useState(false);
  const [mode,setMode]=useState("expense"); // expense | income | transfer
  const [toAccountId,setToAccountId]=useState("");
  const [pocketId,setPocketId]=useState("");
  const [debtId,setDebtId]=useState("");

  // Categories from data
  const allCats=data.categories||[];
  const expCats=allCats.filter(c=>c.type==="expense"||c.type==="system").map(c=>c.name);
  const incCats=allCats.filter(c=>c.type==="income").map(c=>c.name);
  const cats=mode==="income"?incCats:expCats;

  // Update account when currency changes
  const handleCurrencyChange=(cur)=>{
    setCurrency(cur);
    const first=allAccounts.find(a=>a.currency===cur);
    setAccountId(first?.id||"");
    setToAccountId("");
    setPocketId("");
    setDebtId("");
  };

  const accsForCurrency=allAccounts.filter(a=>a.currency===currency);

  const getAccName=(id)=>allAccounts.find(a=>a.id===id||a.id===parseInt(id))?.name||"";

  const updateAccBalance=(id,delta)=>{
    if(id==="cash_eur") upd("eurCash",(data.eurCash||0)+delta);
    else if(id==="cash_idr") upd("idrCash",(data.idrCash||0)+delta);
    else {
      const acc=allAccounts.find(a=>a.id===id||a.id===parseInt(id));
      if(!acc) return;
      if(acc.currency==="EUR") upd("eurAccounts",data.eurAccounts.map(a=>a.id==id?{...a,balance:a.balance+delta}:a));
      else upd("idrAccounts",data.idrAccounts.map(a=>a.id==id?{...a,balance:a.balance+delta}:a));
    }
  };

  const add=()=>{
    const amt=parseFloat(amount);
    if(!amt||amt<=0||!accountId||!hasAccounts) return;
    const future=date>todayStr();
    const accName=getAccName(accountId);

    if(mode==="transfer"){
      if(!toAccountId||toAccountId===accountId) return;
      const fromAcc=allAccounts.find(a=>a.id===accountId||a.id===parseInt(accountId));
      const toAcc=allAccounts.find(a=>a.id===toAccountId||a.id===parseInt(toAccountId));

      const newEurAccs=data.eurAccounts.map(a=>{
        if(a.id==accountId&&fromAcc?.currency==="EUR") return {...a,balance:a.balance-amt};
        if(a.id==toAccountId&&toAcc?.currency==="EUR") return {...a,balance:a.balance+amt};
        return a;
      });
      upd("eurAccounts",newEurAccs);

      const newIdrAccs=data.idrAccounts.map(a=>{
        if(a.id==accountId&&fromAcc?.currency==="IDR") return {...a,balance:a.balance-amt};
        if(a.id==toAccountId&&toAcc?.currency==="IDR") return {...a,balance:a.balance+amt};
        return a;
      });
      upd("idrAccounts",newIdrAccs);

      upd("transfers",[{id:Date.now(),fromId:accountId,toId:toAccountId,fromName:accName,toName:getAccName(toAccountId),amount:amt,currency,note,date},...(data.transfers||[])]);
    } else {
      if(!future){
        const delta=mode==="income"?amt:-amt;
        updateAccBalance(accountId,delta);
        
        if(pocketId&&mode==="expense"){
          const goals=data.goals||[];
          const pocket=goals.find(g=>g.id===parseInt(pocketId)||g.id===pocketId);
          if(pocket){
            upd("goals",goals.map(g=>g.id===pocket.id?{...g,saved:g.saved-amt}:g));
          }
        }
        
        if(debtId&&mode==="expense"){
          const debts=data.debts||[];
          const debt=debts.find(d=>String(d.id)===String(debtId));
          if(debt){
            const newRemaining=Math.max(0,debt.remaining-amt);
            const _tm=debt.totalMonths||(debt.total>0&&debt.monthly>0?Math.round(debt.total/debt.monthly):0);
            const newMonthly=_tm>0?newRemaining/_tm:debt.monthly;
            upd("debts",debts.map(d=>String(d.id)===String(debtId)?{...d,remaining:newRemaining}:d));
            const newTx={id:Date.now(),type:mode,currency,amount:amt,category,note,date,accountId,accountName:accName,pending:future,pocketId:pocketId||null,debtId:debtId||null};
            upd("transactions",[newTx,...(data.transactions||[]).map(t=>
              t.pending&&String(t.debtId)===String(debtId)?{...t,amount:newMonthly}:t
            )]);
            // Save last used
            upd("lastCurrency",currency);
            upd("lastAccountId",accountId);
            upd("lastCategory",category);
            setAmount(""); setNote(""); setPocketId(""); setDebtId(""); setShowMore(false);
            return;
          }
        }
      }
      upd("transactions",[{id:Date.now(),type:mode,currency,amount:amt,category,note,date,accountId,accountName:accName,pending:future,pocketId:pocketId||null,debtId:debtId||null},...data.transactions]);
    }
    // Save last used
    upd("lastCurrency",currency);
    upd("lastAccountId",accountId);
    upd("lastCategory",category);
    setAmount(""); setNote(""); setPocketId(""); setDebtId(""); setShowMore(false);
  };

  const del=(id)=>{
    const tx=data.transactions.find(t=>t.id===id);
    if(tx&&!tx.pending){
      const delta=tx.type==="income"?-tx.amount:tx.amount;
      updateAccBalance(tx.accountId,delta);
    }
    upd("transactions",data.transactions.filter(t=>t.id!==id));
  };

  // Process pending transactions
  useEffect(()=>{
    const due=data.transactions.filter(t=>t.pending&&t.date<=todayStr());
    if(due.length===0) return;
    let eurAccs=[...data.eurAccounts],idrAccs=[...data.idrAccounts];
    let eurCash=data.eurCash||0,idrCash=data.idrCash||0;
    due.forEach(tx=>{
      const delta=tx.type==="income"?tx.amount:-tx.amount;
      if(tx.accountId==="cash_eur") eurCash+=delta;
      else if(tx.accountId==="cash_idr") idrCash+=delta;
      else if(tx.currency==="EUR") eurAccs=eurAccs.map(a=>a.id===tx.accountId?{...a,balance:a.balance+delta}:a);
      else idrAccs=idrAccs.map(a=>a.id===tx.accountId?{...a,balance:a.balance+delta}:a);
    });
    upd("eurAccounts",eurAccs); upd("idrAccounts",idrAccs);
    upd("eurCash",eurCash); upd("idrCash",idrCash);
    upd("transactions",data.transactions.map(t=>due.find(d=>d.id===t.id)?{...t,pending:false}:t));
  },[]);

  const recentTx=data.transactions.filter(t=>!t.pending).slice(0,10);
  const modeColor={expense:"var(--red)",income:"var(--green)",transfer:"var(--green)"};

  return (
    <div>
      {/* Quick Add Card */}
      <FormCard>
        {/* Mode toggle */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:14}}>
          {[["expense","↓ OUT"],["income","↑ IN"],["transfer","⇄ MOVE"]].map(([m,l])=>(
            <button key={m} onClick={()=>{setMode(m);if(m!=="transfer")setCategory(m==="income"?incCats[0]:expCats[0]);}} style={{
              padding:"10px 0",borderRadius:8,
              border:`1.5px solid ${mode===m?modeColor[m]:"var(--b2)"}`,
              background:mode===m?`${modeColor[m]}12`:"transparent",
              color:mode===m?modeColor[m]:"var(--muted)",
              fontSize:11,fontFamily:"var(--font)",cursor:"pointer",fontWeight:600,
            }}>{l}</button>
          ))}
        </div>

        {/* Row 1: Currency + Account */}
        <div style={{display:"flex",gap:8,marginBottom:12}}>
          <div style={{display:"flex",gap:4}}>
            {["EUR","IDR"].map(c=>(
              <button key={c} onClick={()=>handleCurrencyChange(c)} style={{
                padding:"8px 12px",borderRadius:8,
                border:`1.5px solid ${currency===c?"var(--amber)":"var(--b2)"}`,
                background:currency===c?"rgba(249,202,36,0.1)":"transparent",
                color:currency===c?"var(--amber)":"var(--muted)",
                fontSize:12,fontFamily:"var(--font)",cursor:"pointer",fontWeight:currency===c?600:400,
              }}>{c}</button>
            ))}
          </div>
          {mode!=="transfer"&&accsForCurrency.length>0&&(
            <select value={accountId} onChange={e=>setAccountId(e.target.value)} style={{...IS,flex:1,padding:"8px 12px"}}>
              {accsForCurrency.map(a=><option key={a.id} value={a.id}>{a.name}</option>)}
            </select>
          )}
        </div>

        {/* Transfer: From/To */}
        {mode==="transfer"&&(
          <div style={{marginBottom:12}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",gap:8,alignItems:"center"}}>
              <select value={accountId} onChange={e=>setAccountId(e.target.value)} style={{...IS,padding:"10px 12px"}}>
                <option value="">From...</option>
                {allAccounts.map(a=><option key={a.id} value={a.id}>{a.name} ({a.currency})</option>)}
              </select>
              <span style={{color:"var(--muted)",fontSize:16}}>→</span>
              <select value={toAccountId} onChange={e=>setToAccountId(e.target.value)} style={{...IS,padding:"10px 12px"}}>
                <option value="">To...</option>
                {allAccounts.filter(a=>a.id!==accountId).map(a=><option key={a.id} value={a.id}>{a.name} ({a.currency})</option>)}
              </select>
            </div>
          </div>
        )}

        {/* Row 2: Amount + Category */}
        <div style={{display:"grid",gridTemplateColumns:mode==="transfer"?"1fr":"1fr 1fr",gap:8,marginBottom:8}}>
          <NumInput 
            placeholder="0.00" 
            value={amount} 
            onChange={v=>setAmount(v)} 
            style={{...IS,padding:"12px",fontSize:16,fontWeight:600}}
          />
          {mode!=="transfer"&&(
            <select value={category} onChange={e=>setCategory(e.target.value)} style={{...IS,padding:"12px",flex:1}}>
              {cats.map(c=><option key={c} value={c}>{c}</option>)}
            </select>
          )}
        </div>

        {/* Row 3: Add button */}
        <button onClick={add} style={{
          width:"100%",padding:"14px",borderRadius:8,border:"none",
          background:modeColor[mode],color:"#000",
          fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"var(--font)",
          opacity:(!amount||!accountId||(mode==="transfer"&&!toAccountId))?0.5:1,
          marginBottom:showMore?12:0,
        }}>ADD</button>

        {/* More options toggle */}
        {mode!=="transfer"&&(
          <button onClick={()=>setShowMore(s=>!s)} style={{
            background:"none",border:"none",color:"var(--muted)",
            fontSize:11,cursor:"pointer",fontFamily:"var(--font)",
            padding:"10px 0 0",display:"flex",alignItems:"center",gap:4,
          }}>
            {showMore?"▾ Less options":"▸ More options (date, note, pocket)"}
          </button>
        )}

        {/* Expanded options */}
        {showMore&&mode!=="transfer"&&(
          <div style={{marginTop:12,paddingTop:12,borderTop:"1px solid var(--b1)",display:"flex",flexDirection:"column",gap:10}}>
            <DatePicker label="DATE" value={date} onChange={v=>setDate(v)}/>
            {date>todayStr()&&<div style={{fontSize:11,color:"var(--amber)"}}>⏳ Future date — will appear as upcoming</div>}
            
            <Field label="NOTE">
              <input placeholder="optional" value={note} onChange={e=>setNote(e.target.value)} style={IS}/>
            </Field>

            {/* Pocket picker */}
            {mode==="expense"&&accountId&&(()=>{
              const accPockets=(data.goals||[]).filter(g=>g.accountId===accountId||g.accountId===parseInt(accountId));
              if(accPockets.length===0) return null;
              return (
                <div>
                  <Lbl>DEDUCT FROM POCKET</Lbl>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                    <PillBtn small active={!pocketId} onClick={()=>setPocketId("")}>None</PillBtn>
                    {accPockets.map(g=>(
                      <PillBtn small key={g.id} active={pocketId===g.id} onClick={()=>setPocketId(g.id)} color="var(--green)">
                        {g.emoji} {g.name}
                      </PillBtn>
                    ))}
                  </div>
                </div>
              );
            })()}

            {/* Debt picker */}
            {mode==="expense"&&category==="Debt"&&(()=>{
              const debts=(data.debts||[]).filter(d=>d.currency===currency&&d.remaining>0);
              if(debts.length===0) return null;
              return (
                <div>
                  <Lbl>APPLY TO DEBT</Lbl>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                    <PillBtn small active={!debtId} onClick={()=>setDebtId("")}>None</PillBtn>
                    {debts.map(d=>(
                      <PillBtn small key={d.id} active={String(debtId)===String(d.id)} onClick={()=>setDebtId(d.id)} color="var(--red)">
                        💳 {d.name}
                      </PillBtn>
                    ))}
                  </div>
                </div>
              );
            })()}
          </div>
        )}
      </FormCard>

      {/* No accounts warning */}
      {!hasAccounts&&(
        <div style={{background:"rgba(249,202,36,0.08)",border:"1px solid rgba(249,202,36,0.3)",borderRadius:12,padding:"14px 16px",marginBottom:16}}>
          <div style={{fontSize:12,color:"var(--amber)"}}>No accounts yet. Add one in <span style={{color:"var(--acc)",fontWeight:600}}>Vault → Accounts</span> to start tracking.</div>
        </div>
      )}

      {/* Recent Transactions */}
      <Section title="RECENT">
        {recentTx.length===0
          ? <div style={{color:"var(--muted)",fontSize:13,padding:"20px 0",textAlign:"center"}}>
              No transactions yet.<br/>
              <span style={{fontSize:12,opacity:0.7}}>Track your first expense to see where your money goes.</span>
            </div>
          : <div style={{background:"var(--s1)",borderRadius:16,padding:"4px 16px",border:"1px solid var(--b1)"}}>
              {recentTx.map(t=><TxRow key={t.id} t={t} onDelete={del} compact/>)}
            </div>
        }
      </Section>
    </div>
  );
}

// ═══════════════════════════════════════
// HOME (Balance + Overview + Summary)
// ═══════════════════════════════════════
function Home({data,upd,eurAccTotal,idrAccTotal,eurNetWorth,idrNetWorth,eurInvTotal,idrInvTotal,eurDebtTotal,idrDebtTotal}) {
  const [period,setPeriod]=useState("month");
  const [cur,setCur]=useState("EUR");
  const fmt=cur==="EUR"?fmtEUR:fmtIDR;

  const goals=data.goals||[];
  const debts=data.debts||[];
  const eurTrueNetWorth=eurNetWorth-eurDebtTotal;
  const idrTrueNetWorth=idrNetWorth-idrDebtTotal;

  // Spending data
  const ftx=data.transactions.filter(t=>{
    if(t.currency!==cur||t.pending) return false;
    if(period==="month") return t.date?.startsWith(thisMonthStr());
    if(period==="week") return t.date>=thisWeekStr();
    return true;
  });
  const inc=ftx.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
  const exp=ftx.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
  const savRate=inc>0?((inc-exp)/inc)*100:exp>0?-100:0;

  // Category breakdown
  const byCat=ftx.filter(t=>t.type==="expense").reduce((a,t)=>{a[t.category]=(a[t.category]||0)+t.amount;return a;},{});
  const catList=Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
  const catTotal=catList.reduce((s,[,v])=>s+v,0)||1;

  // Upcoming this week
  const weekEnd=new Date(); weekEnd.setDate(weekEnd.getDate()+7);
  const weekEndStr=weekEnd.toISOString().split("T")[0];
  const upcomingThisWeek=data.transactions.filter(t=>t.pending&&t.date>=todayStr()&&t.date<=weekEndStr)
    .sort((a,b)=>new Date(a.date)-new Date(b.date));

  // Negative pockets alert
  const negativePockets=goals.filter(g=>g.saved<0);

  return (
    <div>
      {/* Pocket alerts */}
      {negativePockets.length>0&&(
        <div style={{background:"rgba(255,107,107,0.08)",border:"1px solid rgba(255,107,107,0.3)",borderRadius:12,padding:"12px 14px",marginBottom:16}}>
          <div style={{fontSize:11,color:"var(--red)",fontWeight:700,marginBottom:6}}>⚠️ POCKETS NEED ATTENTION</div>
          {negativePockets.map(g=>(
            <div key={g.id} style={{fontSize:12,color:"var(--red)",marginBottom:2}}>{g.emoji} {g.name}: {g.currency==="IDR"?fmtIDR(g.saved):fmtEUR(g.saved)}</div>
          ))}
        </div>
      )}

      {/* Balance Card */}
      <Section title="BALANCE">
        <div style={{background:"var(--s1)",borderRadius:20,padding:"20px",border:"1px solid var(--b1)"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>
            <div>
              <Lbl>EUR</Lbl>
              <div style={{fontSize:26,fontWeight:700,color:eurAccTotal>=0?"var(--green)":"var(--red)",letterSpacing:"-1.5px",lineHeight:1}}>{fmtEUR(eurAccTotal)}</div>
            </div>
            <div>
              <Lbl>IDR</Lbl>
              <div style={{fontSize:20,fontWeight:700,color:idrAccTotal>=0?"var(--blue)":"var(--red)",letterSpacing:"-1px",lineHeight:1}}>{fmtIDR(idrAccTotal)}</div>
            </div>
          </div>
          <div style={{paddingTop:14,borderTop:"1px solid var(--b1)",display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
            <div>
              <div style={{fontSize:10,color:"var(--muted)",marginBottom:2}}>NET WORTH</div>
              <div style={{fontSize:13,fontWeight:700,color:"var(--green)"}}>{fmtEUR(eurTrueNetWorth)}</div>
              {(idrNetWorth-idrDebtTotal)!==0&&<div style={{fontSize:11,fontWeight:600,color:"var(--blue)",marginTop:1}}>{fmtIDR(idrNetWorth-idrDebtTotal)}</div>}
            </div>
            <div>
              <div style={{fontSize:10,color:"var(--muted)",marginBottom:2}}>INVESTED</div>
              <div style={{fontSize:13,fontWeight:600,color:"var(--fg)"}}>{fmtEUR(eurInvTotal)}</div>
              {idrInvTotal!==0&&<div style={{fontSize:11,fontWeight:600,color:"var(--blue)",marginTop:1}}>{fmtIDR(idrInvTotal)}</div>}
            </div>
            <div>
              <div style={{fontSize:10,color:"var(--muted)",marginBottom:2}}>DEBTS</div>
              <div style={{fontSize:13,fontWeight:600,color:eurDebtTotal>0?"var(--red)":"var(--fg)"}}>{eurDebtTotal>0?"-":""}{fmtEUR(eurDebtTotal)}</div>
              {idrDebtTotal!==0&&<div style={{fontSize:11,fontWeight:600,color:"var(--red)",marginTop:1}}>-{fmtIDR(idrDebtTotal)}</div>}
            </div>
          </div>
        </div>
      </Section>

      {/* Pockets Overview */}
      {goals.length>0&&(
        <Section title="POCKETS">
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {goals.slice(0,5).map(g=>{
              const pFmt=g.currency==="IDR"?fmtIDR:fmtEUR;
              const isSaving=g.type==="saving";
              const pct=isSaving&&g.target>0?(g.saved/g.target)*100:0;
              return (
                <div key={g.id} style={{background:"var(--s1)",borderRadius:12,padding:"12px 14px",border:`1px solid ${g.saved<0?"rgba(255,107,107,0.3)":"var(--b1)"}`}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:isSaving&&g.target>0?8:0}}>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <span style={{fontSize:16}}>{g.emoji}</span>
                      <span style={{fontSize:13,fontWeight:600,color:"var(--fg)"}}>{g.name}</span>
                      <span style={{fontSize:10,padding:"2px 6px",borderRadius:4,background:isSaving?"rgba(116,185,255,0.15)":"rgba(0,201,167,0.1)",color:isSaving?"var(--green)":"var(--green)"}}>{isSaving?"SAVING":"SPENDING"}</span>
                    </div>
                    <span style={{fontSize:14,fontWeight:700,color:g.saved<0?"var(--red)":isSaving?"var(--green)":"var(--green)"}}>{pFmt(g.saved)}</span>
                  </div>
                  {isSaving&&g.target>0&&<ProgressBar pct={Math.min(pct,100)} color={pct>=100?"var(--acc)":"var(--green)"}/>}
                </div>
              );
            })}
          </div>
        </Section>
      )}

      {/* Upcoming */}
      {upcomingThisWeek.length>0&&(
        <Section title="UPCOMING THIS WEEK">
          <div style={{background:"var(--s1)",borderRadius:16,border:"1px solid var(--b1)",overflow:"hidden"}}>
            {upcomingThisWeek.slice(0,5).map((t,i)=>{
              const tfmt=t.currency==="IDR"?fmtIDR:fmtEUR;
              const daysLeft=Math.ceil((new Date(t.date)-new Date())/86400000);
              return (
                <div key={t.id} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",borderBottom:i<Math.min(upcomingThisWeek.length,5)-1?"1px solid var(--b1)":"none"}}>
                  <div style={{width:32,height:32,borderRadius:8,background:"rgba(249,202,36,0.1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:"var(--amber)",flexShrink:0}}>⏳</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:600,color:"var(--fg)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.note||t.category}</div>
                    <div style={{fontSize:11,color:"var(--muted)",marginTop:1}}>{daysLeft===0?"Today":daysLeft===1?"Tomorrow":`in ${daysLeft}d`}</div>
                  </div>
                  <div style={{fontSize:14,fontWeight:700,color:t.type==="income"?"var(--green)":"var(--red)",whiteSpace:"nowrap"}}>{t.type==="income"?"+":"−"}{tfmt(t.amount)}</div>
                </div>
              );
            })}
          </div>
        </Section>
      )}

      {/* Spending Summary */}
      <Section title="SPENDING" action={
        <div style={{display:"flex",gap:4}}>
          {[["week","W"],["month","M"],["all","ALL"]].map(([v,l])=>(
            <PillBtn key={v} small active={period===v} onClick={()=>setPeriod(v)}>{l}</PillBtn>
          ))}
          <PillBtn small active={cur==="EUR"} onClick={()=>setCur("EUR")} color="var(--acc)">€</PillBtn>
          <PillBtn small active={cur==="IDR"} onClick={()=>setCur("IDR")} color="var(--blue)">Rp</PillBtn>
        </div>
      }>
        <div style={{background:"var(--s1)",borderRadius:16,padding:"18px",border:"1px solid var(--b1)"}}>
          {/* Income/Expense/Savings row */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:16}}>
            <div>
              <div style={{fontSize:10,color:"var(--muted)",marginBottom:3}}>INCOME</div>
              <div style={{fontSize:15,fontWeight:700,color:"var(--green)"}}>{fmt(inc)}</div>
            </div>
            <div>
              <div style={{fontSize:10,color:"var(--muted)",marginBottom:3}}>SPENT</div>
              <div style={{fontSize:15,fontWeight:700,color:"var(--red)"}}>{fmt(exp)}</div>
            </div>
            <div>
              <div style={{fontSize:10,color:"var(--muted)",marginBottom:3}}>SAVED</div>
              <div style={{fontSize:15,fontWeight:700,color:savRate>=0?"var(--green)":"var(--red)"}}>{savRate.toFixed(0)}%</div>
            </div>
          </div>

          {/* Category breakdown donut */}
          {catList.length>0&&(()=>{
            const size=140;
            const cx=size/2, cy=size/2, r=50, inner=30;
            let cumAngle=-Math.PI/2;
            const slices=catList.slice(0,6).map(([cat,val])=>{
              const pct=val/catTotal;
              const angle=pct*2*Math.PI;
              const x1=cx+r*Math.cos(cumAngle);
              const y1=cy+r*Math.sin(cumAngle);
              cumAngle+=angle;
              const x2=cx+r*Math.cos(cumAngle);
              const y2=cy+r*Math.sin(cumAngle);
              const xi1=cx+inner*Math.cos(cumAngle-angle);
              const yi1=cy+inner*Math.sin(cumAngle-angle);
              const xi2=cx+inner*Math.cos(cumAngle);
              const yi2=cy+inner*Math.sin(cumAngle);
              const large=angle>Math.PI?1:0;
              const d=`M${xi1},${yi1} L${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} L${xi2},${yi2} A${inner},${inner} 0 ${large},0 ${xi1},${yi1} Z`;
              return {cat,val,pct,d,color:getCatColor(cat,data.categories)||"#555"};
            });
            return (
              <div style={{display:"flex",gap:16,alignItems:"center"}}>
                <svg width={size} height={size} style={{flexShrink:0}}>
                  {slices.map((s,i)=>(
                    <path key={i} d={s.d} fill={s.color} opacity={0.85}/>
                  ))}
                </svg>
                <div style={{flex:1,display:"flex",flexDirection:"column",gap:6}}>
                  {slices.map(({cat,val,pct,color})=>(
                    <div key={cat} style={{display:"flex",alignItems:"center",gap:8}}>
                      <div style={{width:8,height:8,borderRadius:2,background:color,flexShrink:0}}/>
                      <span style={{fontSize:12,color:"var(--muted)",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{cat}</span>
                      <span style={{fontSize:12,fontWeight:600,color:"var(--fg)",whiteSpace:"nowrap"}}>{(pct*100).toFixed(0)}%</span>
                    </div>
                  ))}
                </div>
              </div>
            );
          })()}

          {catList.length===0&&(
            <div style={{textAlign:"center",padding:"20px 0",color:"var(--muted)",fontSize:13}}>
              No spending data yet for this period.
            </div>
          )}
        </div>
      </Section>

      {/* Monthly trend */}
      <Section title={`MONTHLY TREND — ${cur}`}>
        <div style={{background:"var(--s1)",borderRadius:16,padding:"16px 18px",border:"1px solid var(--b1)"}}>
          {(()=>{
            const months=Array.from({length:6},(_,i)=>{
              const d=new Date(); d.setMonth(d.getMonth()-(5-i));
              const key=d.toISOString().slice(0,7);
              const label=d.toLocaleString("default",{month:"short"});
              const txs=data.transactions.filter(t=>t.currency===cur&&!t.pending&&t.date?.startsWith(key));
              const income=txs.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
              const expense=txs.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
              return {label,income,expense,key};
            });
            const maxVal=Math.max(...months.map(m=>Math.max(m.income,m.expense)),1);
            return (
              <>
                <div style={{display:"flex",gap:12,marginBottom:12}}>
                  <div style={{display:"flex",alignItems:"center",gap:4}}>
                    <div style={{width:8,height:8,borderRadius:2,background:"var(--acc)"}}/>
                    <span style={{fontSize:10,color:"var(--muted)"}}>IN</span>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:4}}>
                    <div style={{width:8,height:8,borderRadius:2,background:"var(--red)"}}/>
                    <span style={{fontSize:10,color:"var(--muted)"}}>OUT</span>
                  </div>
                </div>
                <div style={{display:"flex",alignItems:"flex-end",gap:8,height:70}}>
                  {months.map((m,i)=>(
                    <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                      <div style={{width:"100%",height:54,display:"flex",alignItems:"flex-end",gap:2}}>
                        <div style={{flex:1,borderRadius:"3px 3px 0 0",background:"var(--acc)",opacity:0.8,
                          height:`${Math.max(3,(m.income/maxVal)*100)}%`,transition:"height 0.5s ease"}}/>
                        <div style={{flex:1,borderRadius:"3px 3px 0 0",background:"var(--red)",opacity:0.8,
                          height:`${Math.max(3,(m.expense/maxVal)*100)}%`,transition:"height 0.5s ease"}}/>
                      </div>
                      <div style={{fontSize:10,color:"var(--muted)"}}>{m.label}</div>
                    </div>
                  ))}
                </div>
              </>
            );
          })()}
        </div>
      </Section>
    </div>
  );
}

// ═══════════════════════════════════════
// VAULT TAB (Redesigned - Elevated Finance)
// ═══════════════════════════════════════
function VaultTab({data,upd,eurAccTotal,idrAccTotal,eurNetWorth,idrNetWorth,eurInvTotal,idrInvTotal,eurDebtTotal,idrDebtTotal}) {
  const goals=data.goals||[];
  const debts=data.debts||[];
  const subs=data.subscriptions||[];
  const investments=data.investments||[];

  const [goalForm,setGoalForm]=useState({name:"",target:"",saved:"",currency:"EUR",deadline:"",emoji:"🎯",accountId:"",type:"spending"});
  const [debtForm,setDebtForm]=useState({name:"",total:"",months:"",currency:"EUR",nextDate:"",accountId:"",accountName:""});
  const [subForm,setSubForm]=useState({name:"",amount:"",currency:"EUR",renewal:"Monthly",accountId:"",nextDate:todayStr()});
  const [showAddAccount,setShowAddAccount]=useState(false);
  const [showAddDebt,setShowAddDebt]=useState(false);
  const [showAddSub,setShowAddSub]=useState(false);
  const [showAddInvest,setShowAddInvest]=useState(false);

  const allAccounts=[
    ...data.eurAccounts.map(a=>({...a,currency:"EUR"})),
    ...data.idrAccounts.map(a=>({...a,currency:"IDR"})),
  ];

  const addGoal=()=>{
    if(!goalForm.name) return;
    const isSpending=goalForm.type!=="saving";
    upd("goals",[...goals,{id:Date.now(),...goalForm,target:isSpending?0:parseFloat(goalForm.target)||0,saved:0}]);
    setGoalForm({name:"",target:"",saved:"",currency:"EUR",deadline:"",emoji:"🎯",accountId:"",type:"spending"});
  };
  const delGoal=(id)=>upd("goals",goals.filter(g=>g.id!==id));
  const updGoalSaved=(id,v)=>upd("goals",goals.map(g=>g.id===id?{...g,saved:v}:g));

  const addDebt=()=>{
    const totalAmt=parseFloat(debtForm.total)||0;
    const totalMonths=parseInt(debtForm.months)||0;
    if(!debtForm.name||!totalAmt) return;
    const monthlyAmt=totalMonths>0?totalAmt/totalMonths:0;
    if(monthlyAmt>0&&debtForm.nextDate&&!debtForm.accountId) return;
    const newDebt={id:Date.now(),...debtForm,total:totalAmt,remaining:totalAmt,monthly:monthlyAmt,totalMonths};
    upd("debts",[...debts,newDebt]);
    if(newDebt.nextDate&&newDebt.monthly>0){
      const pending=newDebt.nextDate>todayStr();
      const acc=allAccounts.find(a=>String(a.id)===String(debtForm.accountId));
      const tx={id:Date.now()+1,type:"expense",currency:newDebt.currency,amount:newDebt.monthly,category:"Debt",note:newDebt.name+" payment",date:newDebt.nextDate,accountId:newDebt.accountId,accountName:acc?.name||"",pending,debtId:newDebt.id};
      upd("transactions",[tx,...(data.transactions||[])]);
    }
    setDebtForm({name:"",total:"",months:"",currency:"EUR",nextDate:"",accountId:"",accountName:""});
    setShowAddDebt(false);
  };
  const delDebt=(id)=>{
    upd("debts",debts.filter(d=>d.id!==id));
    upd("transactions",(data.transactions||[]).filter(t=>t.debtId!==id));
  };

  const addSub=()=>{
    if(!subForm.name||!subForm.amount||!subForm.accountId) return;
    const acc=allAccounts.find(a=>String(a.id)===String(subForm.accountId));
    upd("subscriptions",[...subs,{id:Date.now(),...subForm,amount:parseFloat(subForm.amount),accountName:acc?.name||""}]);
    setSubForm({name:"",amount:"",currency:"EUR",renewal:"Monthly",accountId:"",nextDate:todayStr()});
    setShowAddSub(false);
  };
  const delSub=(id)=>{
    upd("subscriptions",subs.filter(s=>s.id!==id));
    upd("transactions",(data.transactions||[]).filter(t=>t.subId!==id));
  };

  // Summaries
  const subMonthlyEUR=subs.filter(s=>s.currency==="EUR").reduce((s,sub)=>{
    if(sub.renewal==="Monthly") return s+sub.amount;
    if(sub.renewal==="Yearly") return s+sub.amount/12;
    if(sub.renewal==="Weekly") return s+sub.amount*4.33;
    if(sub.renewal==="Quarterly") return s+sub.amount/3;
    return s;
  },0);

  const eurTrueNetWorth = eurNetWorth - eurDebtTotal;
  const idrTrueNetWorth = idrNetWorth - idrDebtTotal;

  return (
    <div>
      {/* ══════ HERO: NET WORTH ══════ */}
      <div style={{
        background:"linear-gradient(145deg, var(--s1) 0%, var(--s2) 100%)",
        borderRadius:22,padding:"28px 24px",marginBottom:20,
        border:"1px solid var(--b1)",
        boxShadow:"0 8px 32px rgba(0,0,0,0.2)",
        textAlign:"center",position:"relative",overflow:"hidden",
      }}>
        {/* Subtle glow underneath */}
        <div style={{position:"absolute",bottom:"-50%",left:"50%",transform:"translateX(-50%)",width:"80%",height:"100%",background:"radial-gradient(ellipse, rgba(16,185,129,0.12) 0%, transparent 70%)",pointerEvents:"none"}}/>
        
        <div style={{fontSize:10,color:"var(--muted)",letterSpacing:"0.14em",marginBottom:10,fontWeight:600}}>NET WORTH</div>
        <div style={{fontSize:36,fontWeight:800,color:"var(--green)",letterSpacing:"-1.5px",lineHeight:1}}>
          {fmtEUR(eurTrueNetWorth)}
        </div>
        {idrTrueNetWorth!==0&&(
          <div style={{fontSize:15,color:"var(--blue)",marginTop:8,fontWeight:600}}>{fmtIDR(idrTrueNetWorth)}</div>
        )}
        
        {/* Mini breakdown */}
        <div style={{display:"flex",justifyContent:"center",gap:24,marginTop:20,paddingTop:16,borderTop:"1px solid var(--b1)"}}>
          <div>
            <div style={{fontSize:9,color:"var(--muted)",letterSpacing:"0.1em",marginBottom:4}}>ASSETS</div>
            <div style={{fontSize:15,fontWeight:700,color:"var(--fg)"}}>{fmtEUR(eurNetWorth)}</div>
          </div>
          <div style={{width:1,background:"var(--b1)"}}/>
          <div>
            <div style={{fontSize:9,color:"var(--muted)",letterSpacing:"0.1em",marginBottom:4}}>DEBTS</div>
            <div style={{fontSize:15,fontWeight:700,color:eurDebtTotal>0?"var(--red)":"var(--fg)"}}>{eurDebtTotal>0?"-":""}{fmtEUR(eurDebtTotal)}</div>
          </div>
        </div>
      </div>

      {/* ══════ ACCOUNTS ══════ */}
      <Section title="ACCOUNTS" subtitle={`${allAccounts.length} account${allAccounts.length!==1?"s":""}`} action={
        <button onClick={()=>setShowAddAccount(true)} style={{background:"none",border:"none",color:"var(--acc)",fontSize:12,fontWeight:600,cursor:"pointer"}}>+ Add</button>
      }>
        {allAccounts.length===0?(
          <div style={{background:"var(--s1)",borderRadius:16,padding:32,textAlign:"center",border:"1px solid var(--b1)"}}>
            <div style={{fontSize:28,marginBottom:10}}>💳</div>
            <div style={{fontSize:13,color:"var(--muted)",marginBottom:14}}>No accounts yet</div>
            <button onClick={()=>setShowAddAccount(true)} style={{background:"var(--acc)",border:"none",borderRadius:10,padding:"10px 20px",color:"#000",fontWeight:600,fontSize:12,cursor:"pointer"}}>Add First Account</button>
          </div>
        ):(
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {allAccounts.map(acc=>{
              const isEUR=acc.currency==="EUR";
              const fmt=isEUR?fmtEUR:fmtIDR;
              const accGoals=goals.filter(g=>g.accountId===acc.id);
              const totalReserved=accGoals.reduce((s,g)=>s+Math.max(0,g.saved),0);
              const freeToSpend=acc.balance-totalReserved;
              return (
                <AccountCard 
                  key={acc.id} 
                  acc={acc} 
                  fmt={fmt} 
                  freeToSpend={freeToSpend}
                  accGoals={accGoals}
                  upd={upd}
                  data={data}
                  updGoalSaved={updGoalSaved}
                  delGoal={delGoal}
                  goalForm={goalForm}
                  setGoalForm={setGoalForm}
                  addGoal={addGoal}
                />
              );
            })}
          </div>
        )}
      </Section>

      {/* ══════ DEBTS ══════ */}
      <Section title="DEBTS" subtitle={debts.length>0?`${debts.length} active`:"No debts 🎉"} action={
        <button onClick={()=>setShowAddDebt(true)} style={{background:"none",border:"none",color:"var(--acc)",fontSize:12,fontWeight:600,cursor:"pointer"}}>+ Add</button>
      }>
        {debts.length===0?(
          <div style={{background:"var(--s1)",borderRadius:16,padding:24,textAlign:"center",border:"1px solid var(--b1)"}}>
            <div style={{fontSize:13,color:"var(--muted)"}}>You're debt-free!</div>
          </div>
        ):(
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {debts.map(d=>{
              const fmt=d.currency==="IDR"?fmtIDR:fmtEUR;
              const pct=d.total>0?((d.total-d.remaining)/d.total)*100:0;
              const _tm=d.totalMonths||(d.total>0&&d.monthly>0?Math.round(d.total/d.monthly):0);
              const dynamicMonthly=_tm>0?d.remaining/_tm:d.monthly;
              return (
                <div key={d.id} style={{background:"linear-gradient(145deg, var(--s1) 0%, var(--s2) 100%)",borderRadius:16,padding:16,border:"1px solid var(--b1)",boxShadow:"0 2px 12px rgba(0,0,0,0.1)"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                    <div>
                      <div style={{fontSize:14,fontWeight:600,color:"var(--fg)"}}>{d.name}</div>
                      <div style={{fontSize:11,color:"var(--muted)",marginTop:2}}>{pct.toFixed(0)}% paid off</div>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <div style={{fontSize:16,fontWeight:700,color:"var(--red)"}}>{fmt(d.remaining)}</div>
                      <MenuBtn items={[{label:"Delete",danger:true,action:()=>delDebt(d.id)}]}/>
                    </div>
                  </div>
                  <ProgressBar pct={pct} color="var(--green)"/>
                  {dynamicMonthly>0&&(
                    <div style={{display:"flex",justifyContent:"space-between",marginTop:10,fontSize:11,color:"var(--muted)"}}>
                      <span>Monthly: {fmt(dynamicMonthly)}</span>
                      <span>{_tm} months left</span>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}
      </Section>

      {/* ══════ SUBSCRIPTIONS ══════ */}
      <Section title="SUBSCRIPTIONS" subtitle={subs.length>0?`${fmtEUR(subMonthlyEUR)}/mo`:"None active"} action={
        <button onClick={()=>setShowAddSub(true)} style={{background:"none",border:"none",color:"var(--acc)",fontSize:12,fontWeight:600,cursor:"pointer"}}>+ Add</button>
      }>
        {subs.length===0?(
          <div style={{background:"var(--s1)",borderRadius:16,padding:24,textAlign:"center",border:"1px solid var(--b1)"}}>
            <div style={{fontSize:13,color:"var(--muted)"}}>No subscriptions tracked</div>
          </div>
        ):(
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {subs.map(s=>{
              const fmt=s.currency==="IDR"?fmtIDR:fmtEUR;
              return (
                <div key={s.id} style={{background:"linear-gradient(145deg, var(--s1) 0%, var(--s2) 100%)",borderRadius:14,padding:"14px 16px",border:"1px solid var(--b1)",display:"flex",alignItems:"center",gap:12}}>
                  <div style={{width:38,height:38,borderRadius:10,background:"rgba(251,146,60,0.1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>🔄</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:600,color:"var(--fg)"}}>{s.name}</div>
                    <div style={{fontSize:11,color:"var(--muted)"}}>{s.renewal} · {s.accountName}</div>
                  </div>
                  <div style={{fontSize:15,fontWeight:700,color:"var(--orange)"}}>{fmt(s.amount)}</div>
                  <MenuBtn items={[{label:"Delete",danger:true,action:()=>delSub(s.id)}]}/>
                </div>
              );
            })}
          </div>
        )}
      </Section>

      {/* ══════ INVESTMENTS ══════ */}
      <Section title="INVESTMENTS" subtitle={investments.length>0?`${investments.length} holding${investments.length!==1?"s":""}`:"None yet"} action={
        <button onClick={()=>setShowAddInvest(true)} style={{background:"none",border:"none",color:"var(--acc)",fontSize:12,fontWeight:600,cursor:"pointer"}}>+ Add</button>
      }>
        {investments.length===0?(
          <div style={{background:"var(--s1)",borderRadius:16,padding:24,textAlign:"center",border:"1px solid var(--b1)"}}>
            <div style={{fontSize:13,color:"var(--muted)"}}>Start tracking your investments</div>
          </div>
        ):(
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {investments.map(inv=><InvestCard key={inv.id} inv={inv} upd={upd} investments={investments}/>)}
          </div>
        )}
      </Section>

      {/* ══════ MODALS ══════ */}
      <AddAccountModal show={showAddAccount} onClose={()=>setShowAddAccount(false)} data={data} upd={upd}/>
      
      <Modal show={showAddDebt} onClose={()=>setShowAddDebt(false)} title="Add Debt">
        <div style={{display:"flex",gap:8,marginBottom:14}}>
          {["EUR","IDR"].map(c=><PillBtn key={c} active={debtForm.currency===c} onClick={()=>setDebtForm(f=>({...f,currency:c}))}>{c}</PillBtn>)}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:18}}>
          <Field label="NAME"><input placeholder="e.g. Car loan" value={debtForm.name} onChange={e=>setDebtForm(f=>({...f,name:e.target.value}))} style={IS}/></Field>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <Field label="TOTAL AMOUNT"><NumInput placeholder="0" value={debtForm.total} onChange={v=>setDebtForm(f=>({...f,total:v}))} style={IS}/></Field>
            <Field label="MONTHS"><input type="number" placeholder="12" value={debtForm.months} onChange={e=>setDebtForm(f=>({...f,months:e.target.value}))} style={IS}/></Field>
          </div>
          <Field label="NEXT PAYMENT DATE"><input type="date" value={debtForm.nextDate} onChange={e=>setDebtForm(f=>({...f,nextDate:e.target.value}))} style={IS}/></Field>
          <Field label="PAY FROM ACCOUNT">
            <select value={debtForm.accountId} onChange={e=>setDebtForm(f=>({...f,accountId:e.target.value}))} style={IS}>
              <option value="">Select account...</option>
              {allAccounts.filter(a=>a.currency===debtForm.currency).map(a=><option key={a.id} value={a.id}>{a.name}</option>)}
            </select>
          </Field>
        </div>
        <ActionBtn onClick={addDebt} color="var(--red)">ADD DEBT</ActionBtn>
      </Modal>

      <Modal show={showAddSub} onClose={()=>setShowAddSub(false)} title="Add Subscription">
        <div style={{display:"flex",gap:8,marginBottom:14}}>
          {["EUR","IDR"].map(c=><PillBtn key={c} active={subForm.currency===c} onClick={()=>setSubForm(f=>({...f,currency:c}))}>{c}</PillBtn>)}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:18}}>
          <Field label="NAME"><input placeholder="e.g. Netflix" value={subForm.name} onChange={e=>setSubForm(f=>({...f,name:e.target.value}))} style={IS}/></Field>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <Field label="AMOUNT"><NumInput placeholder="0" value={subForm.amount} onChange={v=>setSubForm(f=>({...f,amount:v}))} style={IS}/></Field>
            <Field label="RENEWAL">
              <select value={subForm.renewal} onChange={e=>setSubForm(f=>({...f,renewal:e.target.value}))} style={IS}>
                {RENEWAL.map(r=><option key={r} value={r}>{r}</option>)}
              </select>
            </Field>
          </div>
          <Field label="PAY FROM ACCOUNT">
            <select value={subForm.accountId} onChange={e=>setSubForm(f=>({...f,accountId:e.target.value}))} style={IS}>
              <option value="">Select account...</option>
              {allAccounts.filter(a=>a.currency===subForm.currency).map(a=><option key={a.id} value={a.id}>{a.name}</option>)}
            </select>
          </Field>
          <Field label="NEXT PAYMENT"><input type="date" value={subForm.nextDate} onChange={e=>setSubForm(f=>({...f,nextDate:e.target.value}))} style={IS}/></Field>
        </div>
        <ActionBtn onClick={addSub} color="var(--orange)">ADD SUBSCRIPTION</ActionBtn>
      </Modal>

      <AddInvestModal show={showAddInvest} onClose={()=>setShowAddInvest(false)} data={data} upd={upd}/>
    </div>
  );
}

function AddBtn({component}) {
  return component;
}

// Collapsible card for Vault sections
function CollapsibleCard({title,subtitle,amounts,icon,expanded,onToggle,action,children,empty,emptyText,color}) {
  const accentColor = color || "var(--acc)";
  return (
    <div style={{background:"linear-gradient(145deg, var(--s1) 0%, var(--s2) 100%)",borderRadius:18,border:`1px solid ${expanded?accentColor:"var(--b1)"}`,transition:"all 0.25s ease",boxShadow:expanded?`0 4px 20px rgba(0,0,0,0.2)`:"0 2px 12px rgba(0,0,0,0.1)"}}>
      {/* Header - always visible, tappable */}
      <div 
        onClick={onToggle}
        style={{
          padding:"18px",
          cursor:"pointer",
          display:"flex",alignItems:"center",gap:14,
        }}
      >
        <div style={{fontSize:22}}>{icon}</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:12,fontWeight:700,letterSpacing:"0.08em",color:"var(--fg)"}}>{title}</div>
          <div style={{fontSize:11,color:"var(--muted)",marginTop:3,fontWeight:500}}>{subtitle}</div>
          {amounts && (
            <div style={{fontSize:14,marginTop:5,display:"flex",gap:8,flexWrap:"wrap",fontWeight:600}}>
              {amounts}
            </div>
          )}
        </div>
        <div style={{

      {expanded && (
        <div style={{padding:"0 18px 18px",borderTop:"1px solid var(--b1)"}}>

            <div style={{paddingTop:14,textAlign:"center"}}>
              {emptyText && <div style={{fontSize:12,color:"var(--muted)",opacity:0.7,marginBottom:14}}>{emptyText}</div>}

            </div>
          ) : (
            <>
              <div style={{paddingTop:14}}>

  );
}
