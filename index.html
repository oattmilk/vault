          <button onClick={()=>{localStorage.clear();window.location.reload();}} style={{flex:1,padding:"13px",borderRadius:10,border:"none",background:"var(--red)",color:"#fff",fontSize:12,fontFamily:"var(--font)",cursor:"pointer",fontWeight:700}}>DELETE EVERYTHING</button>
          <button onClick={()=>setConfirmReset(false)} style={{flex:1,padding:"13px",borderRadius:10,border:"1px solid var(--b2)",background:"transparent",color:"var(--muted)",fontSize:12,fontFamily:"var(--font)",cursor:"pointer"}}>CANCEL</button>
        </div>
      </Modal>
    </div>
  );
}

function ManageCategoriesModal({show,onClose,data,upd}) {
  const [newCat,setNewCat]=useState("");
  const [newColor,setNewColor]=useState("#FF6B6B");
  const [newType,setNewType]=useState("expense");
  const [editId,setEditId]=useState(null);
  const [editName,setEditName]=useState("");
  const [editColor,setEditColor]=useState("");

  const categories=data.categories||[];
  const expCats=categories.filter(c=>c.type==="expense");
  const incCats=categories.filter(c=>c.type==="income");
  const sysCats=categories.filter(c=>c.type==="system");

  const addCat=()=>{
    if(!newCat.trim()) return;
    if(categories.find(c=>c.name.toLowerCase()===newCat.trim().toLowerCase())) return alert("Already exists");
    upd("categories",[...categories,{name:newCat.trim(),color:newColor,type:newType}]);
    setNewCat("");
  };

  const delCat=(name,type)=>{
    if(type==="system") return;
    const remaining=categories.filter(c=>c.name!==name);
    if(!remaining.some(c=>c.type==="expense")||!remaining.some(c=>c.type==="income")) return alert("Need at least one of each type");
    upd("categories",remaining);
  };

  const renderCatList=(cats,title,isSystem=false)=>(
    <div style={{marginBottom:18}}>
      <Lbl>{title}</Lbl>
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {cats.map(c=>(
          <div key={c.name} style={{display:"flex",alignItems:"center",gap:8,background:"var(--s2)",padding:"9px 12px",borderRadius:10}}>
            {editId===c.name?(
              <>
                <div style={{width:28,height:28,borderRadius:7,overflow:"hidden",background:editColor,position:"relative",flexShrink:0}}>
                  <input type="color" value={editColor} onChange={e=>setEditColor(e.target.value)} style={{position:"absolute",inset:0,width:"100%",height:"100%",opacity:0,cursor:"pointer"}}/>
                </div>
                <input value={editName} onChange={e=>setEditName(e.target.value)} style={{flex:1,padding:"6px 10px",borderRadius:8,border:"1px solid var(--b2)",background:"var(--s1)",color:"var(--fg)",fontSize:12,fontFamily:"var(--font)"}}/>
                <button onClick={()=>{upd("categories",categories.map(cc=>cc.name===c.name?{...cc,name:editName.trim(),color:editColor}:cc));setEditId(null);}} style={{background:"var(--acc)",border:"none",color:"#000",fontSize:11,padding:"6px 10px",borderRadius:7,cursor:"pointer",fontWeight:700}}>Save</button>
                <button onClick={()=>setEditId(null)} style={{background:"none",border:"none",color:"var(--muted)",fontSize:16,cursor:"pointer"}}>×</button>
              </>
            ):(
              <>
                <span style={{fontSize:12,padding:"3px 10px",borderRadius:6,background:c.color,color:"#fff",fontWeight:600}}>{c.name}</span>
                <div style={{flex:1}}/>
                <button onClick={()=>{setEditId(c.name);setEditName(c.name);setEditColor(c.color);}} style={{background:"none",border:"none",color:"var(--muted)",fontSize:11,cursor:"pointer",fontFamily:"var(--font)"}}>Edit</button>
                {!isSystem&&<button onClick={()=>delCat(c.name,c.type)} style={{background:"none",border:"none",color:"var(--red)",fontSize:16,cursor:"pointer",lineHeight:1}}>×</button>}
              </>
            )}
          </div>
        ))}
      </div>
    </div>
  );

  return (
    <Modal show={show} onClose={onClose} title="Categories">
      {expCats.length>0&&renderCatList(expCats,"EXPENSE")}
      {incCats.length>0&&renderCatList(incCats,"INCOME")}
      {sysCats.length>0&&renderCatList(sysCats,"SYSTEM",true)}

      <div style={{borderTop:"1px solid var(--b1)",paddingTop:18,marginTop:4}}>
        <Lbl>ADD NEW</Lbl>
        <div style={{display:"flex",gap:6,marginBottom:10}}>
          {["expense","income"].map(t=>(
            <button key={t} onClick={()=>setNewType(t)} style={{flex:1,padding:"8px",borderRadius:8,border:`1px solid ${newType===t?"var(--acc)":"var(--b2)"}`,background:newType===t?"rgba(196,181,253,0.08)":"transparent",color:newType===t?"var(--acc)":"var(--muted)",fontSize:11,fontFamily:"var(--font)",cursor:"pointer",fontWeight:600,textTransform:"capitalize"}}>{t}</button>
          ))}
        </div>
        <div style={{display:"flex",gap:8,marginBottom:12}}>
          <input value={newCat} onChange={e=>setNewCat(e.target.value)} placeholder="Category name" style={{flex:1,...IS,padding:"11px 14px"}}/>
          <div style={{width:46,height:46,borderRadius:10,overflow:"hidden",background:newColor,position:"relative",flexShrink:0}}>
            <input type="color" value={newColor} onChange={e=>setNewColor(e.target.value)} style={{position:"absolute",inset:0,width:"100%",height:"100%",opacity:0,cursor:"pointer"}}/>
          </div>
        </div>
        <ActionBtn onClick={addCat} disabled={!newCat.trim()}>+ ADD CATEGORY</ActionBtn>
      </div>
    </Modal>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Vault />);
</script>
</body>
</html>
