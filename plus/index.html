<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vault+</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; width: 100%; background: #050505; }
    body { font-family: 'Space Grotesk', sans-serif; -webkit-font-smoothing: antialiased; color: #F0F0F0; font-feature-settings: "ss01" on; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #444; }
    input, select, button { font-family: inherit; }
    input:focus, select:focus { outline: none; border-color: #00C9A7 !important; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useEffect } = React;

// ── Config & Defaults ───────────────────────────────────────────────────────
const STORAGE_KEY = "vault_v4";
const DEFAULT_CATS = [
  {name:"Food",color:"#FF6B6B",type:"expense"},
  {name:"Groceries",color:"#FF8C42",type:"expense"},
  {name:"Rent",color:"#FF9F43",type:"expense"},
  {name:"Transport",color:"#FFC048",type:"expense"},
  {name:"Shopping",color:"#FD79A8",type:"expense"},
  {name:"Utilities",color:"#55EFC4",type:"expense"},
  {name:"Other",color:"#B2BEC3",type:"expense"},
  {name:"Salary",color:"#00B894",type:"income"},
  {name:"Freelance",color:"#00CEC9",type:"income"},
  {name:"Other Income",color:"#FDCB6E",type:"income"},
  {name:"Subscription",color:"#A29BFE",type:"system"},
  {name:"Debt",color:"#D63031",type:"system"},
];

const SEED = {
  transactions:[], investments:[], subscriptions:[],
  transfers:[], goals:[], debts:[],
  categories: DEFAULT_CATS,
  eurAccounts:[], idrAccounts:[],
  eurCash:0, idrCash:0,
  lastCurrency:"EUR", lastAccountId:null, lastCategory:"Food",
};

// ── Formatters ──────────────────────────────────────────────────────────────
const fmtEUR = (n) => `€${(n ?? 0).toLocaleString("de-DE", { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
const fmtIDR = (n) => `Rp${Math.round(n ?? 0).toLocaleString("id-ID")}`;
const fmtAmt = (n, cur) => cur === "EUR" ? fmtEUR(n) : fmtIDR(n);
const fmtDate = (d) => d ? new Date(d).toLocaleDateString("en-GB", { day: "2-digit", month: "short" }) : "";
const fmtDateLong = (d) => d ? new Date(d).toLocaleDateString("en-GB", { day: "2-digit", month: "short", year: "numeric" }) : "";
const todayStr = () => new Date().toISOString().split("T")[0];
const thisMonthStr = () => new Date().toISOString().slice(0, 7);

const getCatColor = (cat, categories = []) => {
  const found = categories.find(c => c.name === cat);
  if (found?.color) return found.color;
  const fallbacks = ["#FF6B6B","#FF9F43","#FFC048","#A29BFE","#74B9FF","#FD79A8","#55EFC4","#E17055"];
  let hash = 0;
  for (let i = 0; i < (cat || "").length; i++) hash = cat.charCodeAt(i) + ((hash << 5) - hash);
  return fallbacks[Math.abs(hash) % fallbacks.length];
};

// ── Colors ──────────────────────────────────────────────────────────────────
const C = {
  bg: "#050505",
  surface: "#0A0A0A",
  card: "#101010",
  cardHover: "#141414",
  border: "#1a1a1a",
  borderLight: "#252525",
  fg: "#F0F0F0",
  muted: "#666",
  dim: "#444",
  acc: "#00C9A7",
  accDim: "rgba(0,201,167,0.15)",
  red: "#FF6B6B",
  redDim: "rgba(255,107,107,0.15)",
  blue: "#74B9FF",
  blueDim: "rgba(116,185,255,0.15)",
  amber: "#F9CA24",
  purple: "#A29BFE",
};

// ── Input Style ─────────────────────────────────────────────────────────────
const inputStyle = {
  width: "100%",
  padding: "10px 12px",
  borderRadius: 8,
  border: `1px solid ${C.borderLight}`,
  background: C.card,
  color: C.fg,
  fontSize: 14,
};

// ── Components ──────────────────────────────────────────────────────────────

function Card({ children, style }) {
  return (
    <div style={{
      background: C.card,
      border: `1px solid ${C.border}`,
      borderRadius: 16,
      padding: 24,
      ...style,
    }}>
      {children}
    </div>
  );
}

function Modal({ show, onClose, title, children, width = 480 }) {
  if (!show) return null;
  return (
    <>
      <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.7)", zIndex: 100 }} />
      <div style={{
        position: "fixed",
        top: "50%",
        left: "50%",
        transform: "translate(-50%, -50%)",
        background: C.surface,
        border: `1px solid ${C.border}`,
        borderRadius: 20,
        padding: 28,
        zIndex: 101,
        width,
        maxWidth: "90vw",
        maxHeight: "85vh",
        overflow: "auto",
      }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
          <div style={{ fontSize: 18, fontWeight: 600 }}>{title}</div>
          <button onClick={onClose} style={{ background: "none", border: "none", color: C.muted, fontSize: 24, cursor: "pointer" }}>×</button>
        </div>
        {children}
      </div>
    </>
  );
}

function Btn({ children, onClick, color = C.acc, disabled, style, secondary }) {
  return (
    <button
      onClick={onClick}
      disabled={disabled}
      style={{
        padding: "12px 20px",
        borderRadius: 8,
        border: secondary ? `1px solid ${C.borderLight}` : "none",
        background: secondary ? "transparent" : color,
        color: secondary ? C.muted : "#000",
        fontSize: 13,
        fontWeight: 600,
        cursor: disabled ? "default" : "pointer",
        opacity: disabled ? 0.5 : 1,
        ...style,
      }}
    >
      {children}
    </button>
  );
}

function StatCard({ label, value, subValue, color = C.acc }) {
  return (
    <Card style={{ flex: 1 }}>
      <div style={{ fontSize: 11, color: C.muted, letterSpacing: "0.1em", marginBottom: 8, textTransform: "uppercase" }}>{label}</div>
      <div style={{ fontSize: 28, fontWeight: 600, color, letterSpacing: "-1px" }}>{value}</div>
      {subValue && <div style={{ fontSize: 14, color: C.blue, marginTop: 4 }}>{subValue}</div>}
    </Card>
  );
}

function MiniAccounts({ accounts }) {
  if (accounts.length === 0) return null;
  return (
    <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
      {accounts.map((acc, i) => (
        <div key={i} style={{
          background: C.card,
          border: `1px solid ${C.border}`,
          borderRadius: 10,
          padding: "12px 18px",
          display: "flex",
          alignItems: "center",
          gap: 12,
        }}>
          <div style={{ width: 8, height: 8, borderRadius: "50%", background: acc.currency === "EUR" ? C.acc : C.blue }} />
          <span style={{ fontSize: 13, color: C.muted }}>{acc.name}</span>
          <span style={{ fontSize: 14, fontWeight: 600, color: C.fg }}>{fmtAmt(acc.balance, acc.currency)}</span>
        </div>
      ))}
    </div>
  );
}

function BudgetBar({ name, spent, budget, color }) {
  const pct = budget > 0 ? Math.min((spent / budget) * 100, 100) : 0;
  const over = spent > budget;
  return (
    <div style={{ marginBottom: 16 }}>
      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
        <span style={{ fontSize: 13, color: C.fg }}>{name}</span>
        <span style={{ fontSize: 12, color: over ? C.red : C.muted }}>{fmtEUR(spent)} / {fmtEUR(budget)}</span>
      </div>
      <div style={{ height: 6, background: C.border, borderRadius: 3, overflow: "hidden" }}>
        <div style={{ width: `${pct}%`, height: "100%", background: over ? C.red : color, borderRadius: 3, transition: "width 0.5s ease" }} />
      </div>
    </div>
  );
}

function DonutChart({ data, size = 180, categories }) {
  const total = data.reduce((s, d) => s + d.value, 0);
  if (total === 0) return <div style={{ color: C.muted, fontSize: 13 }}>No spending data</div>;

  const cx = size / 2, cy = size / 2, r = size * 0.38, inner = size * 0.26;
  let cumAngle = -Math.PI / 2;

  const slices = data.map(({ cat, value }) => {
    const angle = (value / total) * 2 * Math.PI;
    const x1 = cx + r * Math.cos(cumAngle);
    const y1 = cy + r * Math.sin(cumAngle);
    cumAngle += angle;
    const x2 = cx + r * Math.cos(cumAngle);
    const y2 = cy + r * Math.sin(cumAngle);
    const xi1 = cx + inner * Math.cos(cumAngle - angle);
    const yi1 = cy + inner * Math.sin(cumAngle - angle);
    const xi2 = cx + inner * Math.cos(cumAngle);
    const yi2 = cy + inner * Math.sin(cumAngle);
    const large = angle > Math.PI ? 1 : 0;
    const d = `M${xi1},${yi1} L${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} L${xi2},${yi2} A${inner},${inner} 0 ${large},0 ${xi1},${yi1} Z`;
    return { cat, value, pct: ((value / total) * 100).toFixed(0), d, color: getCatColor(cat, categories) };
  });

  return (
    <div style={{ display: "flex", gap: 24, alignItems: "center" }}>
      <svg width={size} height={size} style={{ flexShrink: 0 }}>
        {slices.map((s, i) => <path key={i} d={s.d} fill={s.color} opacity={0.85} />)}
      </svg>
      <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
        {slices.slice(0, 6).map((s, i) => (
          <div key={i} style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <div style={{ width: 10, height: 10, borderRadius: 2, background: s.color }} />
            <span style={{ fontSize: 12, color: C.muted }}>{s.cat}</span>
            <span style={{ fontSize: 12, color: C.fg, marginLeft: "auto" }}>{s.pct}%</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function TrendChart({ data }) {
  if (data.length === 0) return <div style={{ color: C.muted, fontSize: 13 }}>No trend data</div>;
  const maxVal = Math.max(...data.map(d => d.value), 1);

  return (
    <div>
      <div style={{ display: "flex", alignItems: "flex-end", height: 120, gap: 4, marginBottom: 8 }}>
        {data.map((d, i) => (
          <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center" }}>
            <div style={{
              width: "70%",
              height: `${(d.value / maxVal) * 100}%`,
              minHeight: 4,
              background: `linear-gradient(180deg, ${C.acc} 0%, ${C.accDim} 100%)`,
              borderRadius: 4,
            }} />
          </div>
        ))}
      </div>
      <div style={{ display: "flex", gap: 4 }}>
        {data.map((d, i) => <div key={i} style={{ flex: 1, textAlign: "center", fontSize: 10, color: C.muted }}>{d.label}</div>)}
      </div>
    </div>
  );
}

// ── Transaction Modal ───────────────────────────────────────────────────────
function TransactionModal({ show, onClose, data, upd, editTx }) {
  const [mode, setMode] = useState(editTx?.type || "expense");
  const [currency, setCurrency] = useState(editTx?.currency || data.lastCurrency || "EUR");
  const [amount, setAmount] = useState(editTx?.amount?.toString() || "");
  const [category, setCategory] = useState(editTx?.category || data.lastCategory || "Food");
  const [accountId, setAccountId] = useState(editTx?.accountId || data.lastAccountId || "");
  const [date, setDate] = useState(editTx?.date || todayStr());
  const [note, setNote] = useState(editTx?.note || "");

  const allAccounts = [
    ...(data.eurAccounts || []).map(a => ({ ...a, currency: "EUR" })),
    ...(data.idrAccounts || []).map(a => ({ ...a, currency: "IDR" })),
  ];
  const accsForCurrency = allAccounts.filter(a => a.currency === currency);
  const categories = data.categories || DEFAULT_CATS;
  const expCats = categories.filter(c => c.type === "expense" || c.type === "system").map(c => c.name);
  const incCats = categories.filter(c => c.type === "income").map(c => c.name);
  const cats = mode === "income" ? incCats : expCats;

  useEffect(() => {
    if (!editTx && accsForCurrency.length > 0 && !accsForCurrency.find(a => a.id === accountId)) {
      setAccountId(accsForCurrency[0]?.id || "");
    }
  }, [currency]);

  const save = () => {
    const amt = parseFloat(amount);
    if (!amt || amt <= 0 || !accountId) return;

    const acc = allAccounts.find(a => a.id === accountId || a.id === parseInt(accountId));
    const tx = {
      id: editTx?.id || Date.now(),
      type: mode,
      currency,
      amount: amt,
      category,
      accountId,
      accountName: acc?.name || "",
      date,
      note,
      pending: date > todayStr(),
    };

    let txs = data.transactions || [];
    if (editTx) {
      // Reverse old transaction effect
      const oldTx = txs.find(t => t.id === editTx.id);
      if (oldTx && !oldTx.pending) {
        const delta = oldTx.type === "income" ? -oldTx.amount : oldTx.amount;
        updateAccBalance(data, upd, oldTx.accountId, delta, oldTx.currency);
      }
      txs = txs.filter(t => t.id !== editTx.id);
    }

    // Apply new transaction
    if (!tx.pending) {
      const delta = tx.type === "income" ? tx.amount : -tx.amount;
      updateAccBalance(data, upd, tx.accountId, delta, tx.currency);
    }

    upd("transactions", [tx, ...txs]);
    upd("lastCurrency", currency);
    upd("lastAccountId", accountId);
    upd("lastCategory", category);
    onClose();
  };

  return (
    <Modal show={show} onClose={onClose} title={editTx ? "Edit Transaction" : "Add Transaction"}>
      <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
        {["expense", "income"].map(m => (
          <button key={m} onClick={() => { setMode(m); setCategory(m === "income" ? incCats[0] : expCats[0]); }} style={{
            flex: 1, padding: "10px", borderRadius: 8,
            border: `1px solid ${mode === m ? (m === "expense" ? C.red : C.acc) : C.borderLight}`,
            background: mode === m ? (m === "expense" ? C.redDim : C.accDim) : "transparent",
            color: mode === m ? (m === "expense" ? C.red : C.acc) : C.muted,
            fontSize: 12, fontWeight: 600, cursor: "pointer", textTransform: "uppercase",
          }}>{m === "expense" ? "↓ Out" : "↑ In"}</button>
        ))}
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 12 }}>
        <div>
          <div style={{ fontSize: 11, color: C.muted, marginBottom: 6 }}>CURRENCY</div>
          <div style={{ display: "flex", gap: 6 }}>
            {["EUR", "IDR"].map(c => (
              <button key={c} onClick={() => setCurrency(c)} style={{
                flex: 1, padding: "8px", borderRadius: 6,
                border: `1px solid ${currency === c ? C.amber : C.borderLight}`,
                background: currency === c ? "rgba(249,202,36,0.1)" : "transparent",
                color: currency === c ? C.amber : C.muted,
                fontSize: 12, fontWeight: 500, cursor: "pointer",
              }}>{c}</button>
            ))}
          </div>
        </div>
        <div>
          <div style={{ fontSize: 11, color: C.muted, marginBottom: 6 }}>ACCOUNT</div>
          <select value={accountId} onChange={e => setAccountId(e.target.value)} style={inputStyle}>
            {accsForCurrency.map(a => <option key={a.id} value={a.id}>{a.name}</option>)}
          </select>
        </div>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 12 }}>
        <div>
          <div style={{ fontSize: 11, color: C.muted, marginBottom: 6 }}>AMOUNT</div>
          <input type="number" value={amount} onChange={e => setAmount(e.target.value)} placeholder="0.00" style={{ ...inputStyle, fontSize: 18, fontWeight: 600 }} />
        </div>
        <div>
          <div style={{ fontSize: 11, color: C.muted, marginBottom: 6 }}>CATEGORY</div>
          <select value={category} onChange={e => setCategory(e.target.value)} style={inputStyle}>
            {cats.map(c => <option key={c} value={c}>{c}</option>)}
          </select>
        </div>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 16 }}>
        <div>
          <div style={{ fontSize: 11, color: C.muted, marginBottom: 6 }}>DATE</div>
          <input type="date" value={date} onChange={e => setDate(e.target.value)} style={inputStyle} />
        </div>
        <div>
          <div style={{ fontSize: 11, color: C.muted, marginBottom: 6 }}>NOTE</div>
          <input value={note} onChange={e => setNote(e.target.value)} placeholder="Optional" style={inputStyle} />
        </div>
      </div>

      <Btn onClick={save} disabled={!amount || !accountId} style={{ width: "100%" }}>
        {editTx ? "Save Changes" : "Add Transaction"}
      </Btn>
    </Modal>
  );
}

// ── Account Modal ───────────────────────────────────────────────────────────
function AccountModal({ show, onClose, data, upd, editAcc, currency: initCur }) {
  const [name, setName] = useState(editAcc?.name || "");
  const [balance, setBalance] = useState(editAcc?.balance?.toString() || "0");
  const [currency, setCurrency] = useState(editAcc?.currency || initCur || "EUR");

  const save = () => {
    if (!name.trim()) return;
    const acc = { id: editAcc?.id || Date.now(), name: name.trim(), balance: parseFloat(balance) || 0, currency };
    const key = currency === "EUR" ? "eurAccounts" : "idrAccounts";
    const accs = data[key] || [];

    if (editAcc) {
      // Check if currency changed
      if (editAcc.currency !== currency) {
        const oldKey = editAcc.currency === "EUR" ? "eurAccounts" : "idrAccounts";
        upd(oldKey, (data[oldKey] || []).filter(a => a.id !== editAcc.id));
        upd(key, [...accs, acc]);
      } else {
        upd(key, accs.map(a => a.id === editAcc.id ? acc : a));
      }
    } else {
      upd(key, [...accs, acc]);
    }
    onClose();
  };

  return (
    <Modal show={show} onClose={onClose} title={editAcc ? "Edit Account" : "Add Account"} width={400}>
      <div style={{ marginBottom: 12 }}>
        <div style={{ fontSize: 11, color: C.muted, marginBottom: 6 }}>CURRENCY</div>
        <div style={{ display: "flex", gap: 6 }}>
          {["EUR", "IDR"].map(c => (
            <button key={c} onClick={() => setCurrency(c)} style={{
              flex: 1, padding: "8px", borderRadius: 6,
              border: `1px solid ${currency === c ? C.amber : C.borderLight}`,
              background: currency === c ? "rgba(249,202,36,0.1)" : "transparent",
              color: currency === c ? C.amber : C.muted,
              fontSize: 12, fontWeight: 500, cursor: "pointer",
            }}>{c}</button>
          ))}
        </div>
      </div>
      <div style={{ marginBottom: 12 }}>
        <div style={{ fontSize: 11, color: C.muted, marginBottom: 6 }}>NAME</div>
        <input value={name} onChange={e => setName(e.target.value)} placeholder="Account name" style={inputStyle} />
      </div>
      <div style={{ marginBottom: 16 }}>
        <div style={{ fontSize: 11, color: C.muted, marginBottom: 6 }}>BALANCE</div>
        <input type="number" value={balance} onChange={e => setBalance(e.target.value)} placeholder="0" style={inputStyle} />
      </div>
      <Btn onClick={save} disabled={!name.trim()} style={{ width: "100%" }}>{editAcc ? "Save" : "Add Account"}</Btn>
    </Modal>
  );
}

// ── Debt Modal ──────────────────────────────────────────────────────────────
function DebtModal({ show, onClose, data, upd, editDebt }) {
  const [name, setName] = useState(editDebt?.name || "");
  const [total, setTotal] = useState(editDebt?.total?.toString() || "");
  const [remaining, setRemaining] = useState(editDebt?.remaining?.toString() || "");
  const [monthly, setMonthly] = useState(editDebt?.monthly?.toString() || "");
  const [currency, setCurrency] = useState(editDebt?.currency || "EUR");

  const save = () => {
    if (!name.trim() || !total) return;
    const debt = {
      id: editDebt?.id || Date.now(),
      name: name.trim(),
      total: parseFloat(total) || 0,
      remaining: parseFloat(remaining) || parseFloat(total) || 0,
      monthly: parseFloat(monthly) || 0,
      currency,
    };
    const debts = data.debts || [];
    if (editDebt) {
      upd("debts", debts.map(d => d.id === editDebt.id ? debt : d));
    } else {
      upd("debts", [...debts, debt]);
    }
    onClose();
  };

  return (
    <Modal show={show} onClose={onClose} title={editDebt ? "Edit Debt" : "Add Debt"} width={400}>
      <div style={{ marginBottom: 12 }}>
        <div style={{ fontSize: 11, color: C.muted, marginBottom: 6 }}>CURRENCY</div>
        <div style={{ display: "flex", gap: 6 }}>
          {["EUR", "IDR"].map(c => (
            <button key={c} onClick={() => setCurrency(c)} style={{
              flex: 1, padding: "8px", borderRadius: 6,
              border: `1px solid ${currency === c ? C.amber : C.borderLight}`,
              background: currency === c ? "rgba(249,202,36,0.1)" : "transparent",
              color: currency === c ? C.amber : C.muted,
              fontSize: 12, fontWeight: 500, cursor: "pointer",
            }}>{c}</button>
          ))}
        </div>
      </div>
      <div style={{ marginBottom: 12 }}>
        <div style={{ fontSize: 11, color: C.muted, marginBottom: 6 }}>NAME</div>
        <input value={name} onChange={e => setName(e.target.value)} placeholder="e.g. Car Loan" style={inputStyle} />
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 12 }}>
        <div>
          <div style={{ fontSize: 11, color: C.muted, marginBottom: 6 }}>TOTAL</div>
          <input type="number" value={total} onChange={e => setTotal(e.target.value)} placeholder="0" style={inputStyle} />
        </div>
        <div>
          <div style={{ fontSize: 11, color: C.muted, marginBottom: 6 }}>REMAINING</div>
          <input type="number" value={remaining} onChange={e => setRemaining(e.target.value)} placeholder="0" style={inputStyle} />
        </div>
      </div>
      <div style={{ marginBottom: 16 }}>

// ── Subscription Modal ──────────────────────────────────────────────────────
function SubModal({ show, onClose, data, upd, editSub }) {
  const [name, setName] = useState(editSub?.name || "");
  const [amount, setAmount] = useState(editSub?.amount?.toString() || "");
  const [currency, setCurrency] = useState(editSub?.currency || "EUR");
  const [renewal, setRenewal] = useState(editSub?.renewal || "Monthly");
  const [nextDate, setNextDate] = useState(editSub?.nextDate || todayStr());

  const save = () => {
    if (!name.trim() || !amount) return;
    const sub = {
      id: editSub?.id || Date.now(),
      name: name.trim(),
      amount: parseFloat(amount) || 0,
      currency,
      renewal,
      nextDate,
    };
    const subs = data.subscriptions || [];
    if (editSub) {
      upd("subscriptions", subs.map(s => s.id === editSub.id ? sub : s));
    } else {
      upd("subscriptions", [...subs, sub]);
    }
    onClose();
  };

  return (
    <Modal show={show} onClose={onClose} title={editSub ? "Edit Subscription" : "Add Subscription"} width={400}>
      <div style={{ marginBottom: 12 }}>
        <div style={{ fontSize: 11, color: C.muted, marginBottom: 6 }}>CURRENCY</div>
        <div style={{ display: "flex", gap: 6 }}>
          {["EUR", "IDR"].map(c => (
            <button key={c} onClick={() => setCurrency(c)} style={{
              flex: 1, padding: "8px", borderRadius: 6,
              border: `1px solid ${currency === c ? C.amber : C.borderLight}`,
              background: currency === c ? "rgba(249,202,36,0.1)" : "transparent",
              color: currency === c ? C.amber : C.muted,
              fontSize: 12, fontWeight: 500, cursor: "pointer",
            }}>{c}</button>
          ))}
        </div>
      </div>
      <div style={{ marginBottom: 12 }}>
        <div style={{ fontSize: 11, color: C.muted, marginBottom: 6 }}>NAME</div>
        <input value={name} onChange={e => setName(e.target.value)} placeholder="e.g. Netflix" style={inputStyle} />
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 12 }}>
        <div>
          <div style={{ fontSize: 11, color: C.muted, marginBottom: 6 }}>AMOUNT</div>
          <input type="number" value={amount} onChange={e => setAmount(e.target.value)} placeholder="0" style={inputStyle} />
        </div>
        <div>
          <div style={{ fontSize: 11, color: C.muted, marginBottom: 6 }}>RENEWAL</div>
          <select value={renewal} onChange={e => setRenewal(e.target.value)} style={inputStyle}>
            {["Monthly", "Yearly", "Weekly", "Quarterly"].map(r => <option key={r} value={r}>{r}</option>)}
          </select>
        </div>
      </div>
      <div style={{ marginBottom: 16 }}>
        <div style={{ fontSize: 11, color: C.muted, marginBottom: 6 }}>NEXT DATE</div>
        <input type="date" value={nextDate} onChange={e => setNextDate(e.target.value)} style={inputStyle} />
      </div>
      <Btn onClick={save} disabled={!name.trim() || !amount} style={{ width: "100%" }}>{editSub ? "Save" : "Add Subscription"}</Btn>
    </Modal>
  );
}

// ── Helper: Update Account Balance ──────────────────────────────────────────
function updateAccBalance(data, upd, accId, delta, currency) {
  const key = currency === "EUR" ? "eurAccounts" : "idrAccounts";
  const accs = data[key] || [];
  upd(key, accs.map(a => (a.id === accId || a.id === parseInt(accId)) ? { ...a, balance: (a.balance || 0) + delta } : a));
}

// ── Pages ───────────────────────────────────────────────────────────────────

function Overview({ data, upd, onAddTx }) {
  const allAccounts = [
    ...(data.eurAccounts || []).map(a => ({ ...a, currency: "EUR" })),
    ...(data.idrAccounts || []).map(a => ({ ...a, currency: "IDR" })),
  ];

  const eurTotal = (data.eurAccounts || []).reduce((s, a) => s + (a.balance || 0), 0);
  const idrTotal = (data.idrAccounts || []).reduce((s, a) => s + (a.balance || 0), 0);
  const eurDebt = (data.debts || []).filter(d => d.currency === "EUR").reduce((s, d) => s + (d.remaining || 0), 0);
  const idrDebt = (data.debts || []).filter(d => d.currency === "IDR").reduce((s, d) => s + (d.remaining || 0), 0);

  const thisMonth = thisMonthStr();
  const monthTx = (data.transactions || []).filter(t => t.date?.startsWith(thisMonth) && !t.pending);
  const income = monthTx.filter(t => t.type === "income" && t.currency === "EUR").reduce((s, t) => s + t.amount, 0);
  const expenses = monthTx.filter(t => t.type === "expense" && t.currency === "EUR").reduce((s, t) => s + t.amount, 0);

  const catSpend = {};
  monthTx.filter(t => t.type === "expense" && t.currency === "EUR").forEach(t => {
    catSpend[t.category] = (catSpend[t.category] || 0) + t.amount;
  });
  const donutData = Object.entries(catSpend).map(([cat, value]) => ({ cat, value })).sort((a, b) => b.value - a.value);

  const trendData = [];
  for (let i = 5; i >= 0; i--) {
    const d = new Date();
    d.setMonth(d.getMonth() - i);
    const m = d.toISOString().slice(0, 7);
    const label = d.toLocaleDateString("en-US", { month: "short" });
    const value = (data.transactions || []).filter(t => t.date?.startsWith(m) && t.type === "expense" && t.currency === "EUR" && !t.pending).reduce((s, t) => s + t.amount, 0);
    trendData.push({ label, value });
  }

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 24 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div style={{ fontSize: 11, color: C.muted, letterSpacing: "0.1em", textTransform: "uppercase" }}>Overview</div>
        <Btn onClick={onAddTx}>+ Add Transaction</Btn>
      </div>

      <div style={{ display: "flex", gap: 16 }}>
        <StatCard label="Net Worth" value={fmtEUR(eurTotal - eurDebt)} subValue={fmtIDR(idrTotal - idrDebt)} />
        <StatCard label="This Month" value={`+${fmtEUR(income)}`} subValue={`-${fmtEUR(expenses)}`} color={income >= expenses ? C.acc : C.red} />
      </div>

      <MiniAccounts accounts={allAccounts} />

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
        <Card>
          <div style={{ fontSize: 11, color: C.muted, letterSpacing: "0.1em", marginBottom: 16, textTransform: "uppercase" }}>Spending Breakdown</div>
          <DonutChart data={donutData} categories={data.categories} />
        </Card>
        <Card>
          <div style={{ fontSize: 11, color: C.muted, letterSpacing: "0.1em", marginBottom: 16, textTransform: "uppercase" }}>Spending Trend</div>
          <TrendChart data={trendData} />
        </Card>
      </div>
    </div>
  );
}

function Transactions({ data, upd }) {
  const [showModal, setShowModal] = useState(false);
  const [editTx, setEditTx] = useState(null);
  const [filter, setFilter] = useState("all");

  const txs = (data.transactions || []).filter(t => {
    if (filter === "all") return true;
    if (filter === "income") return t.type === "income";
    if (filter === "expense") return t.type === "expense";
    return true;
  }).sort((a, b) => (b.date || "").localeCompare(a.date || ""));

  const deleteTx = (tx) => {
    if (!confirm("Delete this transaction?")) return;
    if (!tx.pending) {
      const delta = tx.type === "income" ? -tx.amount : tx.amount;
      updateAccBalance(data, upd, tx.accountId, delta, tx.currency);
    }
    upd("transactions", (data.transactions || []).filter(t => t.id !== tx.id));
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 24 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>

            <button key={f} onClick={() => setFilter(f)} style={{
              padding: "8px 16px", borderRadius: 8, border: "none",
              background: filter === f ? C.accDim : C.card,
              color: filter === f ? C.acc : C.muted,
              fontSize: 12, cursor: "pointer", textTransform: "capitalize",
            }}>{f}</button>
          ))}
        </div>
        <Btn onClick={() => { setEditTx(null); setShowModal(true); }}>+ Add Transaction</Btn>
      </div>

      <Card style={{ padding: 0, overflow: "hidden" }}>
        <table style={{ width: "100%", borderCollapse: "collapse" }}>
          <thead>
            <tr style={{ borderBottom: `1px solid ${C.border}` }}>
              {["Date", "Type", "Category", "Amount", "Account", "Note", ""].map((h, i) => (
                <th key={i} style={{ padding: "14px 16px", textAlign: "left", fontSize: 11, color: C.muted, fontWeight: 500, textTransform: "uppercase" }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {txs.length === 0 ? (
              <tr><td colSpan={7} style={{ padding: 40, textAlign: "center", color: C.muted }}>No transactions</td></tr>
            ) : txs.map(tx => (
              <tr key={tx.id} style={{ borderBottom: `1px solid ${C.border}` }}>
                <td style={{ padding: "12px 16px", fontSize: 13 }}>{fmtDate(tx.date)}</td>
                <td style={{ padding: "12px 16px" }}>
                  <span style={{
                    fontSize: 11, padding: "4px 8px", borderRadius: 4,
                    background: tx.type === "income" ? C.accDim : C.redDim,
                    color: tx.type === "income" ? C.acc : C.red,
                  }}>{tx.type === "income" ? "IN" : "OUT"}</span>

                </td>
                <td style={{ padding: "12px 16px", fontSize: 14, fontWeight: 600, color: tx.type === "income" ? C.acc : C.fg }}>{fmtAmt(tx.amount, tx.currency)}</td>
                <td style={{ padding: "12px 16px", fontSize: 13, color: C.muted }}>{tx.accountName}</td>
                <td style={{ padding: "12px 16px", fontSize: 13, color: C.muted }}>{tx.note || "—"}</td>
                <td style={{ padding: "12px 16px" }}>
                  <button onClick={() => { setEditTx(tx); setShowModal(true); }} style={{ background: "none", border: "none", color: C.muted, cursor: "pointer", marginRight: 8 }}>Edit</button>
                  <button onClick={() => deleteTx(tx)} style={{ background: "none", border: "none", color: C.red, cursor: "pointer" }}>×</button>

  );

function Analytics({ data }) {

  const monthlyData = [];
  for (let i = 11; i >= 0; i--) {

    d.setMonth(d.getMonth() - i);
    const m = d.toISOString().slice(0, 7);
    const label = d.toLocaleDateString("en-US", { month: "short", year: "2-digit" });
    const expenses = transactions.filter(t => t.date?.startsWith(m) && t.type === "expense" && t.currency === "EUR" && !t.pending).reduce((s, t) => s + t.amount, 0);
    const income = transactions.filter(t => t.date?.startsWith(m) && t.type === "income" && t.currency === "EUR" && !t.pending).reduce((s, t) => s + t.amount, 0);
    monthlyData.push({ label, expenses, income });
  }

  const catTotals = {};
  transactions.filter(t => t.type === "expense" && t.currency === "EUR" && !t.pending).forEach(t => {
    catTotals[t.category] = (catTotals[t.category] || 0) + t.amount;
  });
  const topCats = Object.entries(catTotals).map(([cat, value]) => ({ cat, value, color: getCatColor(cat, categories) })).sort((a, b) => b.value - a.value).slice(0, 8);
  const maxCat = Math.max(...topCats.map(c => c.value), 1);

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 24 }}>
      <div style={{ fontSize: 11, color: C.muted, letterSpacing: "0.1em", textTransform: "uppercase" }}>Analytics</div>

      <Card>
        <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 16 }}>12 Month Overview</div>
        <div style={{ display: "flex", alignItems: "flex-end", height: 160, gap: 8, marginBottom: 12 }}>
          {monthlyData.map((d, i) => {
            const maxVal = Math.max(...monthlyData.map(m => Math.max(m.expenses, m.income)), 1);
            return (
              <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 2 }}>
                <div style={{ width: "40%", height: `${(d.income / maxVal) * 100}%`, minHeight: 2, background: C.acc, borderRadius: 2, opacity: 0.7 }} />
                <div style={{ width: "40%", height: `${(d.expenses / maxVal) * 100}%`, minHeight: 2, background: C.red, borderRadius: 2, opacity: 0.7 }} />
              </div>
            );
          })}
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          {monthlyData.map((d, i) => <div key={i} style={{ flex: 1, textAlign: "center", fontSize: 9, color: C.muted }}>{d.label}</div>)}
        </div>
        <div style={{ display: "flex", gap: 24, marginTop: 16, justifyContent: "center" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 6 }}><div style={{ width: 10, height: 10, borderRadius: 2, background: C.acc }} /><span style={{ fontSize: 11, color: C.muted }}>Income</span></div>
          <div style={{ display: "flex", alignItems: "center", gap: 6 }}><div style={{ width: 10, height: 10, borderRadius: 2, background: C.red }} /><span style={{ fontSize: 11, color: C.muted }}>Expenses</span></div>
        </div>
      </Card>

      <Card>
        <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 16 }}>Top Spending Categories</div>
        {topCats.length === 0 ? <div style={{ color: C.muted }}>No data</div> : topCats.map((c, i) => (
          <div key={i} style={{ marginBottom: 12 }}>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
              <span style={{ fontSize: 13 }}>{c.cat}</span>
              <span style={{ fontSize: 13, color: C.muted }}>{fmtEUR(c.value)}</span>
            </div>
            <div style={{ height: 6, background: C.border, borderRadius: 3 }}>
              <div style={{ width: `${(c.value / maxCat) * 100}%`, height: "100%", background: c.color, borderRadius: 3 }} />
            </div>
          </div>
        ))}
      </Card>
    </div>
  );
}

// ── Main App ────────────────────────────────────────────────────────────────
function VaultPlus() {
  const [page, setPage] = useState("overview");
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [showAddTx, setShowAddTx] = useState(false);

  useEffect(() => {
    const stored = localStorage.getItem(STORAGE_KEY);
    if (stored) {
      try {
        const parsed = JSON.parse(stored);
        // Ensure categories exist
        if (!parsed.categories) parsed.categories = DEFAULT_CATS;
        setData(parsed);
      } catch (e) {
        console.error("Failed to parse:", e);
        setData({ ...SEED });
      }
    } else {
      setData({ ...SEED });
    }
    setLoading(false);
  }, []);

  useEffect(() => {
    if (data) localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }, [data]);

  const upd = (key, val) => setData(d => ({ ...d, [key]: val }));

  if (loading) return <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100vh", color: C.muted }}>Loading...</div>;

  return (
    <div style={{ display: "flex", minHeight: "100vh", background: C.bg }}>
      <Sidebar page={page} setPage={setPage} />
      <div style={{ marginLeft: 220, flex: 1, padding: 32 }}>
        <div style={{ maxWidth: 1000 }}>
          {page === "overview" && <Overview data={data} upd={upd} onAddTx={() => setShowAddTx(true)} />}
          {page === "transactions" && <Transactions data={data} upd={upd} />}
          {page === "accounts" && <Accounts data={data} upd={upd} />}
          {page === "budgets" && <Budgets data={data} upd={upd} />}
          {page === "debts" && <Debts data={data} upd={upd} />}
          {page === "subscriptions" && <Subscriptions data={data} upd={upd} />}
          {page === "analytics" && <Analytics data={data} upd={upd} />}
        </div>
      </div>
      <TransactionModal show={showAddTx} onClose={() => setShowAddTx(false)} data={data} upd={upd} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<VaultPlus />);
  </script>
</body>
