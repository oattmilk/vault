<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vault+</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; width: 100%; background: #050505; }
    body { font-family: 'Space Grotesk', sans-serif; -webkit-font-smoothing: antialiased; color: #E8E8E8; font-size: 13px; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #0a0a0a; }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #3a3a3a; }
    input, select, button { font-family: inherit; font-size: 12px; }
    input:focus, select:focus { outline: none; border-color: #00C9A7 !important; }
    table { border-collapse: collapse; width: 100%; }
    th, td { text-align: left; padding: 8px 12px; border-bottom: 1px solid #1a1a1a; }
    th { font-size: 10px; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: 0.05em; position: sticky; top: 0; background: #0a0a0a; z-index: 1; }
    tr:hover { background: #111; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useEffect, useMemo } = React;

const STORAGE_KEY = "vault_v4";

// ── Formatters ──────────────────────────────────────────────────────────────
const fmtEUR = (n) => new Intl.NumberFormat("de-DE", { style: "currency", currency: "EUR" }).format(n ?? 0);
const fmtIDR = (n) => new Intl.NumberFormat("id-ID", { style: "currency", currency: "IDR", maximumFractionDigits: 0 }).format(n ?? 0);
const fmtAmt = (n, cur) => cur === "EUR" ? fmtEUR(n) : fmtIDR(n);
const fmtDate = (d) => {
  if (!d) return "—";
  const date = new Date(d);
  return date.toLocaleDateString("en-GB", { day: "2-digit", month: "2-digit", year: "numeric" });
};
const todayStr = () => new Date().toISOString().split("T")[0];
const getMonthKey = (d) => d?.slice(0, 7) || "";
const getMonthName = (key) => {
  if (!key) return "";
  const [y, m] = key.split("-");
  return new Date(y, m - 1).toLocaleDateString("en-US", { month: "short", year: "numeric" });
};

// ── Colors ──────────────────────────────────────────────────────────────────
const C = {
  bg: "#050505", surface: "#0a0a0a", border: "#1a1a1a",
  fg: "#E8E8E8", muted: "#666", dim: "#444",
  acc: "#00C9A7", red: "#FF6B6B", blue: "#74B9FF", amber: "#F9CA24", purple: "#A29BFE",
};

const getCatColor = (cat, categories = []) => {
  const found = categories.find(c => c.name === cat);
  return found?.color || "#666";
};

// ── Components ──────────────────────────────────────────────────────────────

function Tabs({ tabs, active, onChange }) {
  return (
    <div style={{ display: "flex", gap: 4 }}>
      {tabs.map(t => (
        <button key={t.id} onClick={() => onChange(t.id)} style={{
          padding: "8px 16px", borderRadius: 6, border: "none", cursor: "pointer",
          background: active === t.id ? "rgba(0,201,167,0.1)" : "transparent",
          color: active === t.id ? C.acc : C.muted,
          fontWeight: 500, fontSize: 12,
        }}>{t.label}</button>
      ))}
    </div>
  );
}

const inputStyle = {
  width: "100%", padding: "10px 12px", borderRadius: 6,
  border: `1px solid ${C.border}`, background: "#0d0d0d", color: C.fg, fontSize: 13,
};

function Modal({ show, onClose, title, children }) {
  if (!show) return null;
  return (
    <>
      <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.7)", zIndex: 100 }} />
      <div style={{
        position: "fixed", top: "50%", left: "50%", transform: "translate(-50%, -50%)",
        background: C.surface, border: `1px solid ${C.border}`, borderRadius: 12,
        padding: 24, zIndex: 101, width: 400, maxWidth: "90vw",
      }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
          <div style={{ fontSize: 16, fontWeight: 600 }}>{title}</div>
          <button onClick={onClose} style={{ background: "none", border: "none", color: C.muted, fontSize: 20, cursor: "pointer" }}>×</button>
        </div>
        {children}
      </div>
    </>
  );
}

function Btn({ children, onClick, disabled, danger, secondary }) {
  return (
    <button onClick={onClick} disabled={disabled} style={{
      padding: "10px 16px", borderRadius: 6, border: secondary ? `1px solid ${C.border}` : "none",
      background: danger ? C.red : secondary ? "transparent" : C.acc,
      color: danger || !secondary ? "#000" : C.muted,
      fontSize: 12, fontWeight: 600, cursor: disabled ? "default" : "pointer",
      opacity: disabled ? 0.5 : 1,
    }}>{children}</button>
  );
}

function StatBox({ label, value, sub, color = C.fg }) {
  return (
    <div style={{ padding: "12px 16px", background: C.surface, borderRadius: 8, minWidth: 140 }}>
      <div style={{ fontSize: 10, color: C.muted, marginBottom: 4, textTransform: "uppercase", letterSpacing: "0.05em" }}>{label}</div>
      <div style={{ fontSize: 18, fontWeight: 600, color }}>{value}</div>
      {sub && <div style={{ fontSize: 12, color: C.blue, marginTop: 2 }}>{sub}</div>}
    </div>
  );
}

function DataTable({ columns, data, onRowClick, selectedIds, onSelect, sortable = true }) {
  const [sortCol, setSortCol] = useState(null);
  const [sortDir, setSortDir] = useState("desc");

  const sorted = useMemo(() => {
    if (!sortCol) return data;
    return [...data].sort((a, b) => {
      let va = a[sortCol], vb = b[sortCol];
      if (typeof va === "string") va = va.toLowerCase();
      if (typeof vb === "string") vb = vb.toLowerCase();
      if (va < vb) return sortDir === "asc" ? -1 : 1;
      if (va > vb) return sortDir === "asc" ? 1 : -1;
      return 0;
    });
  }, [data, sortCol, sortDir]);

  const toggleSort = (col) => {
    if (sortCol === col) setSortDir(d => d === "asc" ? "desc" : "asc");
    else { setSortCol(col); setSortDir("desc"); }
  };

  return (
    <div style={{ overflow: "auto", maxHeight: "calc(100vh - 220px)", background: C.surface, borderRadius: 8 }}>
      <table>
        <thead>
          <tr>
            {onSelect && <th style={{ width: 32 }}><input type="checkbox" onChange={e => onSelect(e.target.checked ? data.map(d => d.id) : [])} /></th>}
            {columns.map(col => (
              <th key={col.key} onClick={() => sortable && toggleSort(col.key)} style={{ cursor: sortable ? "pointer" : "default", whiteSpace: "nowrap" }}>
                {col.label} {sortCol === col.key && (sortDir === "asc" ? "↑" : "↓")}
              </th>
            ))}
          </tr>
        </thead>
        <tbody>
          {sorted.length === 0 ? (
            <tr><td colSpan={columns.length + (onSelect ? 1 : 0)} style={{ textAlign: "center", color: C.muted, padding: 40 }}>No data</td></tr>
          ) : sorted.map(row => (
            <tr key={row.id} onClick={() => onRowClick?.(row)} style={{ cursor: onRowClick ? "pointer" : "default" }}>
              {onSelect && (
                <td onClick={e => e.stopPropagation()}>
                  <input type="checkbox" checked={selectedIds?.includes(row.id)} onChange={e => {
                    if (e.target.checked) onSelect([...selectedIds, row.id]);
                    else onSelect(selectedIds.filter(id => id !== row.id));
                  }} />
                </td>
              )}
              {columns.map(col => (
                <td key={col.key} style={col.style}>{col.render ? col.render(row[col.key], row) : row[col.key]}</td>
              ))}
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

function FilterBar({ filters, values, onChange }) {
  return (
    <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
      {filters.map(f => (
        <select key={f.key} value={values[f.key] || ""} onChange={e => onChange({ ...values, [f.key]: e.target.value })}
          style={{ padding: "6px 10px", borderRadius: 6, border: `1px solid ${C.border}`, background: C.surface, color: C.fg, fontSize: 12 }}>
          <option value="">{f.label}: All</option>
          {f.options.map(o => <option key={o} value={o}>{o}</option>)}
        </select>
      ))}
    </div>
  );
}

function MonthlyGrid({ data, months, renderCell, rowLabels }) {
  return (
    <div style={{ overflow: "auto", background: C.surface, borderRadius: 8 }}>
      <table>
        <thead>
          <tr>
            <th style={{ minWidth: 120 }}></th>
            {months.map(m => <th key={m} style={{ minWidth: 100, textAlign: "right" }}>{getMonthName(m)}</th>)}
            <th style={{ minWidth: 100, textAlign: "right", color: C.acc }}>Total</th>
          </tr>
        </thead>
        <tbody>
          {rowLabels.map(label => (
            <tr key={label}>
              <td style={{ fontWeight: 500 }}>{label}</td>
              {months.map(m => <td key={m} style={{ textAlign: "right" }}>{renderCell(label, m)}</td>)}
              <td style={{ textAlign: "right", fontWeight: 600, color: C.acc }}>
                {renderCell(label, "total")}
              </td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

// ── Overview View ───────────────────────────────────────────────────────────
function OverviewView({ data }) {
  const txs = data.transactions || [];
  const thisMonth = new Date().toISOString().slice(0, 7);
  const monthTx = txs.filter(t => t.date?.startsWith(thisMonth) && !t.pending);

  // Totals
  const eurAccTotal = (data.eurAccounts || []).reduce((s, a) => s + (a.balance || 0), 0);
  const idrAccTotal = (data.idrAccounts || []).reduce((s, a) => s + (a.balance || 0), 0);
  const eurDebt = (data.debts || []).filter(d => d.currency === "EUR").reduce((s, d) => s + (d.remaining || 0), 0);
  const idrDebt = (data.debts || []).filter(d => d.currency === "IDR").reduce((s, d) => s + (d.remaining || 0), 0);

  const eurIncome = monthTx.filter(t => t.type === "income" && t.currency === "EUR").reduce((s, t) => s + t.amount, 0);
  const eurExpense = monthTx.filter(t => t.type === "expense" && t.currency === "EUR").reduce((s, t) => s + t.amount, 0);

  // Spending by category (donut)
  const catSpend = {};
  monthTx.filter(t => t.type === "expense" && t.currency === "EUR").forEach(t => {
    catSpend[t.category] = (catSpend[t.category] || 0) + t.amount;
  });
  const donutData = Object.entries(catSpend).map(([cat, value]) => ({ cat, value })).sort((a, b) => b.value - a.value);
  const donutTotal = donutData.reduce((s, d) => s + d.value, 0);

  // 6 month trend
  const trendData = [];
  for (let i = 5; i >= 0; i--) {
    const d = new Date();
    d.setMonth(d.getMonth() - i);
    const m = d.toISOString().slice(0, 7);
    const label = d.toLocaleDateString("en-US", { month: "short" });
    const expenses = txs.filter(t => t.date?.startsWith(m) && t.type === "expense" && t.currency === "EUR" && !t.pending).reduce((s, t) => s + t.amount, 0);
    const income = txs.filter(t => t.date?.startsWith(m) && t.type === "income" && t.currency === "EUR" && !t.pending).reduce((s, t) => s + t.amount, 0);
    trendData.push({ label, expenses, income });
  }
  const trendMax = Math.max(...trendData.map(t => Math.max(t.expenses, t.income)), 1);

  // Upcoming bills
  const upcoming = [
    ...(data.subscriptions || []).map(s => ({ name: s.name, date: s.nextDate, amount: s.amount, currency: s.currency })),
    ...(data.debts || []).filter(d => d.remaining > 0 && d.monthly > 0).map(d => ({ name: d.name, date: d.nextDate, amount: d.monthly, currency: d.currency })),
  ].filter(b => b.date).sort((a, b) => (a.date || "").localeCompare(b.date || "")).slice(0, 6);

  // Accounts
  const allAccounts = [
    ...(data.eurAccounts || []).map(a => ({ ...a, currency: "EUR" })),
    ...(data.idrAccounts || []).map(a => ({ ...a, currency: "IDR" })),
  ];

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
      {/* Stats row */}
      <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
        <StatBox label="Net Worth (EUR)" value={fmtEUR(eurAccTotal - eurDebt)} color={C.acc} />
        <StatBox label="Net Worth (IDR)" value={fmtIDR(idrAccTotal - idrDebt)} color={C.blue} />
        <StatBox label="This Month In" value={fmtEUR(eurIncome)} color={C.acc} />
        <StatBox label="This Month Out" value={fmtEUR(eurExpense)} color={C.red} />
        <StatBox label="Net" value={fmtEUR(eurIncome - eurExpense)} color={eurIncome >= eurExpense ? C.acc : C.red} />
      </div>

      {/* Accounts row */}
      <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
        {allAccounts.map((acc, i) => (
          <div key={i} style={{ padding: "8px 14px", background: C.surface, borderRadius: 6, display: "flex", alignItems: "center", gap: 10 }}>
            <div style={{ width: 6, height: 6, borderRadius: "50%", background: acc.currency === "EUR" ? C.acc : C.blue }} />
            <span style={{ color: C.muted, fontSize: 12 }}>{acc.name}</span>
            <span style={{ fontWeight: 600, fontSize: 13 }}>{fmtAmt(acc.balance, acc.currency)}</span>
          </div>
        ))}
      </div>

      {/* Charts row */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 16 }}>
        {/* Donut */}
        <div style={{ background: C.surface, borderRadius: 12, padding: 20 }}>
          <div style={{ fontSize: 10, color: C.muted, marginBottom: 16, textTransform: "uppercase", letterSpacing: "0.05em" }}>Spending Breakdown</div>
          {donutTotal === 0 ? <div style={{ color: C.muted }}>No spending this month</div> : (
            <div style={{ display: "flex", alignItems: "center", gap: 20 }}>
              <svg width={140} height={140}>
                {(() => {
                  let cumAngle = -Math.PI / 2;
                  const cx = 70, cy = 70, r = 55, inner = 35;
                  return donutData.map(({ cat, value }, i) => {
                    const angle = (value / donutTotal) * 2 * Math.PI;
                    const x1 = cx + r * Math.cos(cumAngle), y1 = cy + r * Math.sin(cumAngle);
                    cumAngle += angle;
                    const x2 = cx + r * Math.cos(cumAngle), y2 = cy + r * Math.sin(cumAngle);
                    const xi1 = cx + inner * Math.cos(cumAngle - angle), yi1 = cy + inner * Math.sin(cumAngle - angle);
                    const xi2 = cx + inner * Math.cos(cumAngle), yi2 = cy + inner * Math.sin(cumAngle);
                    const large = angle > Math.PI ? 1 : 0;
                    const d = `M${xi1},${yi1} L${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} L${xi2},${yi2} A${inner},${inner} 0 ${large},0 ${xi1},${yi1} Z`;
                    return <path key={i} d={d} fill={getCatColor(cat, data.categories)} opacity={0.85} />;
                  });
                })()}
              </svg>
              <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                {donutData.slice(0, 5).map((d, i) => (
                  <div key={i} style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 11 }}>
                    <div style={{ width: 8, height: 8, borderRadius: 2, background: getCatColor(d.cat, data.categories) }} />
                    <span style={{ color: C.muted }}>{d.cat}</span>
                    <span style={{ marginLeft: "auto" }}>{((d.value / donutTotal) * 100).toFixed(0)}%</span>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>

        {/* Trend */}
        <div style={{ background: C.surface, borderRadius: 12, padding: 20 }}>
          <div style={{ fontSize: 10, color: C.muted, marginBottom: 16, textTransform: "uppercase", letterSpacing: "0.05em" }}>6 Month Trend</div>
          <div style={{ display: "flex", alignItems: "flex-end", height: 100, gap: 6 }}>
            {trendData.map((t, i) => (
              <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 2 }}>
                <div style={{ width: "40%", height: `${(t.income / trendMax) * 100}%`, minHeight: 2, background: C.acc, borderRadius: 2, opacity: 0.7 }} />
                <div style={{ width: "40%", height: `${(t.expenses / trendMax) * 100}%`, minHeight: 2, background: C.red, borderRadius: 2, opacity: 0.7 }} />
              </div>
            ))}
          </div>
          <div style={{ display: "flex", marginTop: 8 }}>
            {trendData.map((t, i) => <div key={i} style={{ flex: 1, textAlign: "center", fontSize: 9, color: C.muted }}>{t.label}</div>)}
          </div>
          <div style={{ display: "flex", gap: 16, justifyContent: "center", marginTop: 12 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 10 }}><div style={{ width: 8, height: 8, borderRadius: 2, background: C.acc }} /><span style={{ color: C.muted }}>Income</span></div>
            <div style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 10 }}><div style={{ width: 8, height: 8, borderRadius: 2, background: C.red }} /><span style={{ color: C.muted }}>Expenses</span></div>
          </div>
        </div>

        {/* Upcoming */}
        <div style={{ background: C.surface, borderRadius: 12, padding: 20 }}>
          <div style={{ fontSize: 10, color: C.muted, marginBottom: 16, textTransform: "uppercase", letterSpacing: "0.05em" }}>Upcoming Bills</div>
          {upcoming.length === 0 ? <div style={{ color: C.muted }}>No upcoming bills</div> : (
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {upcoming.map((b, i) => (
                <div key={i} style={{ display: "flex", alignItems: "center", gap: 10, fontSize: 12 }}>
                  <span style={{ color: C.muted, width: 50 }}>{fmtDate(b.date)?.slice(0, 6)}</span>
                  <span style={{ flex: 1 }}>{b.name}</span>
                  <span style={{ color: C.red, fontWeight: 500 }}>{fmtAmt(b.amount, b.currency)}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>

      {/* Recent transactions */}
      <div style={{ background: C.surface, borderRadius: 12, padding: 20 }}>
        <div style={{ fontSize: 10, color: C.muted, marginBottom: 16, textTransform: "uppercase", letterSpacing: "0.05em" }}>Recent Transactions</div>
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Type</th>
              <th>Category</th>
              <th style={{ textAlign: "right" }}>Amount</th>
              <th>Account</th>
              <th>Note</th>
            </tr>
          </thead>
          <tbody>
            {txs.slice(0, 10).map(tx => (
              <tr key={tx.id}>
                <td>{tx.date}</td>
                <td><span style={{ color: tx.type === "income" ? C.acc : C.red }}>{tx.type === "income" ? "IN" : "OUT"}</span></td>
                <td><span style={{ color: getCatColor(tx.category, data.categories) }}>{tx.category}</span></td>
                <td style={{ textAlign: "right", fontWeight: 600, color: tx.type === "income" ? C.acc : C.fg }}>{fmtAmt(tx.amount, tx.currency)}</td>
                <td style={{ color: C.muted }}>{tx.accountName}</td>
                <td style={{ color: C.muted }}>{tx.note || "—"}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ── Transactions View ───────────────────────────────────────────────────────
function TransactionsView({ data, upd }) {
  const [selected, setSelected] = useState([]);
  const [filters, setFilters] = useState({});
  const [editTx, setEditTx] = useState(null);

  const categories = [...new Set((data.transactions || []).map(t => t.category))].filter(Boolean).sort();
  const accounts = [...new Set((data.transactions || []).map(t => t.accountName))].filter(Boolean).sort();
  const months = [...new Set((data.transactions || []).map(t => getMonthKey(t.date)))].filter(Boolean).sort().reverse();

  const filtered = useMemo(() => {
    return (data.transactions || []).filter(t => {
      if (filters.type && t.type !== filters.type) return false;
      if (filters.category && t.category !== filters.category) return false;
      if (filters.account && t.accountName !== filters.account) return false;
      if (filters.month && getMonthKey(t.date) !== filters.month) return false;
      if (filters.currency && t.currency !== filters.currency) return false;
      return true;
    });
  }, [data.transactions, filters]);

  const columns = [
    { key: "date", label: "Date", render: v => v },
    { key: "type", label: "Type", render: v => <span style={{ color: v === "income" ? C.acc : C.red }}>{v === "income" ? "IN" : "OUT"}</span> },
    { key: "category", label: "Category", render: (v, row) => <span style={{ color: getCatColor(v, data.categories) }}>{v}</span> },
    { key: "amount", label: "Amount", style: { textAlign: "right", fontWeight: 600 }, render: (v, row) => <span style={{ color: row.type === "income" ? C.acc : C.fg }}>{fmtAmt(v, row.currency)}</span> },
    { key: "accountName", label: "Account" },
    { key: "note", label: "Note", render: v => v || "—" },
  ];

  const bulkDelete = () => {
    if (!confirm(`Delete ${selected.length} transactions?`)) return;
    const txs = (data.transactions || []).filter(t => !selected.includes(t.id));
    upd("transactions", txs);
    setSelected([]);
  };

  const bulkRecategorize = () => {
    const newCat = prompt("New category:");
    if (!newCat) return;
    const txs = (data.transactions || []).map(t => selected.includes(t.id) ? { ...t, category: newCat } : t);
    upd("transactions", txs);
    setSelected([]);
  };

  const exportCSV = () => {
    const headers = ["Date", "Type", "Category", "Amount", "Currency", "Account", "Note"];
    const rows = filtered.map(t => [t.date, t.type, t.category, t.amount, t.currency, t.accountName, t.note || ""]);
    const csv = [headers, ...rows].map(r => r.join(",")).join("\n");
    const blob = new Blob([csv], { type: "text/csv" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `vault-transactions-${todayStr()}.csv`;
    a.click();
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 12 }}>
        <FilterBar
          filters={[
            { key: "type", label: "Type", options: ["expense", "income"] },
            { key: "category", label: "Category", options: categories },
            { key: "account", label: "Account", options: accounts },
            { key: "month", label: "Month", options: months },
            { key: "currency", label: "Currency", options: ["EUR", "IDR"] },
          ]}
          values={filters}
          onChange={setFilters}
        />
        <div style={{ display: "flex", gap: 8 }}>
          {selected.length > 0 && (
            <>
              <button onClick={bulkRecategorize} style={{ padding: "6px 12px", borderRadius: 6, border: `1px solid ${C.border}`, background: "transparent", color: C.fg, cursor: "pointer" }}>
                Recategorize ({selected.length})
              </button>
              <button onClick={bulkDelete} style={{ padding: "6px 12px", borderRadius: 6, border: "none", background: C.red, color: "#000", cursor: "pointer" }}>
                Delete ({selected.length})
              </button>
            </>
          )}
          <button onClick={exportCSV} style={{ padding: "6px 12px", borderRadius: 6, border: `1px solid ${C.border}`, background: "transparent", color: C.muted, cursor: "pointer" }}>
            Export CSV
          </button>
        </div>
      </div>

      <div style={{ fontSize: 11, color: C.muted }}>{filtered.length} transactions</div>

      <DataTable
        columns={columns}
        data={filtered}
        selectedIds={selected}
        onSelect={setSelected}
        onRowClick={setEditTx}
      />
    </div>
  );
}

// ── Monthly View ────────────────────────────────────────────────────────────
function MonthlyView({ data }) {
  const txs = (data.transactions || []).filter(t => !t.pending && t.currency === "EUR");
  
  const allMonths = [...new Set(txs.map(t => getMonthKey(t.date)))].filter(Boolean).sort().reverse().slice(0, 12);
  const categories = [...new Set(txs.filter(t => t.type === "expense").map(t => t.category))].filter(Boolean).sort();

  const getSum = (cat, month) => {
    return txs.filter(t => t.type === "expense" && t.category === cat && (month === "total" || getMonthKey(t.date) === month))
      .reduce((s, t) => s + t.amount, 0);
  };

  const getMonthTotal = (month, type) => {
    return txs.filter(t => t.type === type && (month === "total" || getMonthKey(t.date) === month))
      .reduce((s, t) => s + t.amount, 0);
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 24 }}>
      {/* Summary row */}
      <div style={{ overflow: "auto", background: C.surface, borderRadius: 8 }}>
        <table>
          <thead>
            <tr>
              <th style={{ minWidth: 120 }}></th>
              {allMonths.map(m => <th key={m} style={{ minWidth: 100, textAlign: "right" }}>{getMonthName(m)}</th>)}
            </tr>
          </thead>
          <tbody>
            <tr>
              <td style={{ fontWeight: 500, color: C.acc }}>Income</td>
              {allMonths.map(m => <td key={m} style={{ textAlign: "right", color: C.acc }}>{fmtEUR(getMonthTotal(m, "income"))}</td>)}
            </tr>
            <tr>
              <td style={{ fontWeight: 500, color: C.red }}>Expenses</td>
              {allMonths.map(m => <td key={m} style={{ textAlign: "right", color: C.red }}>{fmtEUR(getMonthTotal(m, "expense"))}</td>)}
            </tr>
            <tr style={{ borderTop: `2px solid ${C.border}` }}>
              <td style={{ fontWeight: 600 }}>Net</td>
              {allMonths.map(m => {
                const net = getMonthTotal(m, "income") - getMonthTotal(m, "expense");
                return <td key={m} style={{ textAlign: "right", fontWeight: 600, color: net >= 0 ? C.acc : C.red }}>{fmtEUR(net)}</td>;
              })}
            </tr>
          </tbody>
        </table>
      </div>

      {/* Category breakdown */}
      <div style={{ fontSize: 11, color: C.muted, textTransform: "uppercase", letterSpacing: "0.05em" }}>Expenses by Category</div>
      <MonthlyGrid
        months={allMonths}
        rowLabels={categories}
        renderCell={(cat, month) => {
          const val = getSum(cat, month);
          return val > 0 ? <span style={{ color: C.fg }}>{fmtEUR(val)}</span> : <span style={{ color: C.dim }}>—</span>;
        }}
      />
    </div>
  );
}

// ── Accounts View ───────────────────────────────────────────────────────────
function AccountsView({ data, upd }) {
  const [showModal, setShowModal] = useState(false);
  const [editAcc, setEditAcc] = useState(null);
  const [formName, setFormName] = useState("");
  const [formBalance, setFormBalance] = useState("");
  const [formCurrency, setFormCurrency] = useState("EUR");

  const allAccounts = [
    ...(data.eurAccounts || []).map(a => ({ ...a, currency: "EUR" })),
    ...(data.idrAccounts || []).map(a => ({ ...a, currency: "IDR" })),
  ];

  const pockets = data.goals || [];

  const eurTotal = (data.eurAccounts || []).reduce((s, a) => s + (a.balance || 0), 0);
  const idrTotal = (data.idrAccounts || []).reduce((s, a) => s + (a.balance || 0), 0);

  const openAdd = () => {
    setEditAcc(null);
    setFormName("");
    setFormBalance("");
    setFormCurrency("EUR");
    setShowModal(true);
  };

  const openEdit = (acc) => {
    setEditAcc(acc);
    setFormName(acc.name);
    setFormBalance(acc.balance?.toString() || "0");
    setFormCurrency(acc.currency);
    setShowModal(true);
  };

  const save = () => {
    if (!formName.trim()) return;
    const acc = { id: editAcc?.id || Date.now(), name: formName.trim(), balance: parseFloat(formBalance) || 0 };
    const key = formCurrency === "EUR" ? "eurAccounts" : "idrAccounts";
    const accs = data[key] || [];

    if (editAcc) {
      if (editAcc.currency !== formCurrency) {
        const oldKey = editAcc.currency === "EUR" ? "eurAccounts" : "idrAccounts";
        upd(oldKey, (data[oldKey] || []).filter(a => a.id !== editAcc.id));
        upd(key, [...accs, acc]);
      } else {
        upd(key, accs.map(a => a.id === editAcc.id ? acc : a));
      }
    } else {
      upd(key, [...accs, acc]);
    }
    setShowModal(false);
  };

  const deleteAcc = () => {
    if (!confirm(`Delete ${editAcc.name}?`)) return;
    const key = editAcc.currency === "EUR" ? "eurAccounts" : "idrAccounts";
    upd(key, (data[key] || []).filter(a => a.id !== editAcc.id));
    setShowModal(false);
  };

  const columns = [
    { key: "name", label: "Account", style: { fontWeight: 500 } },
    { key: "currency", label: "Currency", render: v => <span style={{ color: v === "EUR" ? C.acc : C.blue }}>{v}</span> },
    { key: "balance", label: "Balance", style: { textAlign: "right", fontWeight: 600 }, render: (v, row) => fmtAmt(v, row.currency) },
    { key: "actions", label: "", style: { width: 60 }, render: (_, row) => (
      <button onClick={(e) => { e.stopPropagation(); openEdit(row); }} style={{ background: "none", border: "none", color: C.muted, cursor: "pointer", fontSize: 11 }}>Edit</button>
    )},
  ];

  const pocketColumns = [
    { key: "emoji", label: "", style: { width: 32 } },
    { key: "name", label: "Pocket", style: { fontWeight: 500 } },
    { key: "type", label: "Type", render: v => <span style={{ color: v === "spending" ? C.amber : C.acc }}>{v}</span> },
    { key: "saved", label: "Saved", style: { textAlign: "right" }, render: (v, row) => fmtEUR(v) },
    { key: "goal", label: "Goal", style: { textAlign: "right" }, render: (v, row) => v > 0 ? fmtEUR(v) : "—" },
    { key: "progress", label: "Progress", style: { width: 120 }, render: (_, row) => {
      if (!row.goal) return "—";
      const pct = Math.min((row.saved / row.goal) * 100, 100);
      return (
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <div style={{ flex: 1, height: 4, background: C.border, borderRadius: 2 }}>
            <div style={{ width: `${pct}%`, height: "100%", background: row.type === "spending" ? C.amber : C.acc, borderRadius: 2 }} />
          </div>
          <span style={{ fontSize: 11, color: C.muted }}>{pct.toFixed(0)}%</span>
        </div>
      );
    }},
  ];

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 24 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div style={{ display: "flex", gap: 12 }}>
          <StatBox label="EUR Total" value={fmtEUR(eurTotal)} color={C.acc} />
          <StatBox label="IDR Total" value={fmtIDR(idrTotal)} color={C.blue} />
        </div>
        <Btn onClick={openAdd}>+ Add Account</Btn>
      </div>

      <div style={{ fontSize: 11, color: C.muted, textTransform: "uppercase", letterSpacing: "0.05em" }}>Accounts</div>
      <DataTable columns={columns} data={allAccounts} sortable={false} />

      {pockets.length > 0 && (
        <>
          <div style={{ fontSize: 11, color: C.muted, textTransform: "uppercase", letterSpacing: "0.05em" }}>Pockets</div>
          <DataTable columns={pocketColumns} data={pockets} sortable={false} />
        </>
      )}

      <Modal show={showModal} onClose={() => setShowModal(false)} title={editAcc ? "Edit Account" : "Add Account"}>
        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          <div>
            <div style={{ fontSize: 11, color: C.muted, marginBottom: 6 }}>CURRENCY</div>
            <div style={{ display: "flex", gap: 6 }}>
              {["EUR", "IDR"].map(c => (
                <button key={c} onClick={() => setFormCurrency(c)} style={{
                  flex: 1, padding: "8px", borderRadius: 6,
                  border: `1px solid ${formCurrency === c ? C.amber : C.border}`,
                  background: formCurrency === c ? "rgba(249,202,36,0.1)" : "transparent",
                  color: formCurrency === c ? C.amber : C.muted,
                  fontSize: 12, cursor: "pointer",
                }}>{c}</button>
              ))}
            </div>
          </div>
          <div>
            <div style={{ fontSize: 11, color: C.muted, marginBottom: 6 }}>NAME</div>
            <input value={formName} onChange={e => setFormName(e.target.value)} placeholder="Account name" style={inputStyle} />
          </div>
          <div>
            <div style={{ fontSize: 11, color: C.muted, marginBottom: 6 }}>BALANCE</div>
            <input type="number" value={formBalance} onChange={e => setFormBalance(e.target.value)} placeholder="0" style={inputStyle} />
          </div>
          <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
            {editAcc && <Btn onClick={deleteAcc} danger>Delete</Btn>}
            <div style={{ flex: 1 }} />
            <Btn onClick={() => setShowModal(false)} secondary>Cancel</Btn>
            <Btn onClick={save} disabled={!formName.trim()}>Save</Btn>
          </div>
        </div>
      </Modal>
    </div>
  );
}

// ── Debts & Subs View ───────────────────────────────────────────────────────
function DebtsSubsView({ data, upd }) {
  const [showDebtModal, setShowDebtModal] = useState(false);
  const [showSubModal, setShowSubModal] = useState(false);
  const [editDebt, setEditDebt] = useState(null);
  const [editSub, setEditSub] = useState(null);
  
  // Debt form
  const [debtName, setDebtName] = useState("");
  const [debtTotal, setDebtTotal] = useState("");
  const [debtRemaining, setDebtRemaining] = useState("");
  const [debtMonthly, setDebtMonthly] = useState("");
  const [debtCurrency, setDebtCurrency] = useState("EUR");

  // Sub form
  const [subName, setSubName] = useState("");
  const [subAmount, setSubAmount] = useState("");
  const [subCurrency, setSubCurrency] = useState("EUR");
  const [subRenewal, setSubRenewal] = useState("Monthly");
  const [subNextDate, setSubNextDate] = useState(todayStr());

  const debts = data.debts || [];
  const subs = data.subscriptions || [];

  const eurDebt = debts.filter(d => d.currency === "EUR").reduce((s, d) => s + (d.remaining || 0), 0);
  const eurSubsMonthly = subs.filter(s => s.currency === "EUR" && s.renewal === "Monthly").reduce((s, sub) => s + sub.amount, 0);

  // Debt handlers
  const openAddDebt = () => {
    setEditDebt(null);
    setDebtName(""); setDebtTotal(""); setDebtRemaining(""); setDebtMonthly(""); setDebtCurrency("EUR");
    setShowDebtModal(true);
  };

  const openEditDebt = (d) => {
    setEditDebt(d);
    setDebtName(d.name); setDebtTotal(d.total?.toString() || ""); 
    setDebtRemaining(d.remaining?.toString() || ""); setDebtMonthly(d.monthly?.toString() || "");
    setDebtCurrency(d.currency || "EUR");
    setShowDebtModal(true);
  };

  const saveDebt = () => {
    if (!debtName.trim() || !debtTotal) return;
    const debt = {
      id: editDebt?.id || Date.now(),
      name: debtName.trim(),
      total: parseFloat(debtTotal) || 0,
      remaining: parseFloat(debtRemaining) || parseFloat(debtTotal) || 0,
      monthly: parseFloat(debtMonthly) || 0,
      currency: debtCurrency,
    };
    if (editDebt) {
      upd("debts", debts.map(d => d.id === editDebt.id ? debt : d));
    } else {
      upd("debts", [...debts, debt]);
    }
    setShowDebtModal(false);
  };

  const deleteDebt = () => {
    if (!confirm(`Delete ${editDebt.name}?`)) return;
    upd("debts", debts.filter(d => d.id !== editDebt.id));
    setShowDebtModal(false);
  };

  // Sub handlers
  const openAddSub = () => {
    setEditSub(null);
    setSubName(""); setSubAmount(""); setSubCurrency("EUR"); setSubRenewal("Monthly"); setSubNextDate(todayStr());
    setShowSubModal(true);
  };

  const openEditSub = (s) => {
    setEditSub(s);
    setSubName(s.name); setSubAmount(s.amount?.toString() || "");
    setSubCurrency(s.currency || "EUR"); setSubRenewal(s.renewal || "Monthly");
    setSubNextDate(s.nextDate || todayStr());
    setShowSubModal(true);
  };

  const saveSub = () => {
    if (!subName.trim() || !subAmount) return;
    const sub = {
      id: editSub?.id || Date.now(),
      name: subName.trim(),
      amount: parseFloat(subAmount) || 0,
      currency: subCurrency,
      renewal: subRenewal,
      nextDate: subNextDate,
    };
    if (editSub) {
      upd("subscriptions", subs.map(s => s.id === editSub.id ? sub : s));
    } else {
      upd("subscriptions", [...subs, sub]);
    }
    setShowSubModal(false);
  };

  const deleteSub = () => {
    if (!confirm(`Delete ${editSub.name}?`)) return;
    upd("subscriptions", subs.filter(s => s.id !== editSub.id));
    setShowSubModal(false);
  };

  const debtColumns = [
    { key: "name", label: "Debt", style: { fontWeight: 500 } },
    { key: "currency", label: "Cur", render: v => <span style={{ color: v === "EUR" ? C.acc : C.blue }}>{v}</span> },
    { key: "total", label: "Total", style: { textAlign: "right" }, render: (v, row) => fmtAmt(v, row.currency) },
    { key: "remaining", label: "Remaining", style: { textAlign: "right" }, render: (v, row) => <span style={{ color: C.red }}>{fmtAmt(v, row.currency)}</span> },
    { key: "monthly", label: "Monthly", style: { textAlign: "right" }, render: (v, row) => fmtAmt(v, row.currency) },
    { key: "progress", label: "Paid", style: { width: 100 }, render: (_, row) => {
      const pct = row.total > 0 ? ((row.total - row.remaining) / row.total) * 100 : 0;
      return (
        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
          <div style={{ flex: 1, height: 4, background: C.border, borderRadius: 2 }}>
            <div style={{ width: `${pct}%`, height: "100%", background: C.acc, borderRadius: 2 }} />
          </div>
          <span style={{ fontSize: 10, color: C.muted }}>{pct.toFixed(0)}%</span>
        </div>
      );
    }},
    { key: "actions", label: "", style: { width: 50 }, render: (_, row) => (
      <button onClick={(e) => { e.stopPropagation(); openEditDebt(row); }} style={{ background: "none", border: "none", color: C.muted, cursor: "pointer", fontSize: 11 }}>Edit</button>
    )},
  ];

  const subColumns = [
    { key: "name", label: "Subscription", style: { fontWeight: 500 } },

    { key: "renewal", label: "Renewal" },
    { key: "nextDate", label: "Next Date", render: v => fmtDate(v) },
    { key: "actions", label: "", style: { width: 50 }, render: (_, row) => (
      <button onClick={(e) => { e.stopPropagation(); openEditSub(row); }} style={{ background: "none", border: "none", color: C.muted, cursor: "pointer", fontSize: 11 }}>Edit</button>
    )},
  ];

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 24 }}>
      <div style={{ display: "flex", gap: 12 }}>
        <StatBox label="Total Debt" value={fmtEUR(eurDebt)} color={C.red} />
        <StatBox label="Monthly Subs" value={fmtEUR(eurSubsMonthly)} color={C.purple} />
      </div>

      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div style={{ fontSize: 11, color: C.muted, textTransform: "uppercase", letterSpacing: "0.05em" }}>Debts</div>
        <Btn onClick={openAddDebt}>+ Add Debt</Btn>
      </div>
      {debts.length === 0 ? (
        <div style={{ color: C.muted, background: C.surface, padding: 24, borderRadius: 8 }}>No debts 🎉</div>
      ) : (
        <DataTable columns={debtColumns} data={debts} sortable={false} />

      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div style={{ fontSize: 11, color: C.muted, textTransform: "uppercase", letterSpacing: "0.05em" }}>Subscriptions</div>

      </div>

                  border: `1px solid ${subCurrency === c ? C.amber : C.border}`,

          <div style={{ display: "flex", gap: 8, marginTop: 8 }}>

            <div style={{ flex: 1 }} />
            <Btn onClick={() => setShowSubModal(false)} secondary>Cancel</Btn>

// ── Import/Export View ──────────────────────────────────────────────────────
function SyncView({ data, setData }) {
  const [importText, setImportText] = useState("");
  const [showExport, setShowExport] = useState(false);

  const doImport = () => {
    try {
      const parsed = JSON.parse(importText);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(parsed));
      setData(parsed);
      setImportText("");
      alert("Imported successfully!");
    } catch (e) {
      alert("Invalid JSON");
    }
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 24, maxWidth: 800 }}>
      <div style={{ fontSize: 11, color: C.muted, textTransform: "uppercase", letterSpacing: "0.05em" }}>Export Data</div>
      <div style={{ background: C.surface, padding: 16, borderRadius: 8 }}>
        <p style={{ color: C.muted, marginBottom: 12, fontSize: 12 }}>Copy this JSON and paste it on your other device to sync.</p>
        <button onClick={() => setShowExport(!showExport)} style={{ padding: "8px 16px", borderRadius: 6, border: `1px solid ${C.border}`, background: "transparent", color: C.fg, cursor: "pointer", marginBottom: showExport ? 12 : 0 }}>
          {showExport ? "Hide JSON" : "Show JSON"}
        </button>
        {showExport && (
          <textarea
            readOnly
            value={JSON.stringify(data, null, 2)}
            style={{ width: "100%", height: 200, padding: 12, borderRadius: 6, border: `1px solid ${C.border}`, background: "#0d0d0d", color: C.fg, fontSize: 11, fontFamily: "monospace", resize: "vertical" }}
            onClick={e => e.target.select()}
          />
        )}
      </div>

      <div style={{ fontSize: 11, color: C.muted, textTransform: "uppercase", letterSpacing: "0.05em" }}>Import Data</div>
      <div style={{ background: C.surface, padding: 16, borderRadius: 8 }}>
        <p style={{ color: C.muted, marginBottom: 12, fontSize: 12 }}>Paste JSON from your other device to import.</p>
        <textarea
          value={importText}
          onChange={e => setImportText(e.target.value)}
          placeholder="Paste JSON here..."
          style={{ width: "100%", height: 150, padding: 12, borderRadius: 6, border: `1px solid ${C.border}`, background: "#0d0d0d", color: C.fg, fontSize: 11, fontFamily: "monospace", resize: "vertical", marginBottom: 12 }}
        />
        <button onClick={doImport} disabled={!importText.trim()} style={{ padding: "8px 16px", borderRadius: 6, border: "none", background: C.acc, color: "#000", cursor: "pointer", fontWeight: 600, opacity: importText.trim() ? 1 : 0.5 }}>
          Import
        </button>
      </div>
    </div>
  );
}

// ── Main App ────────────────────────────────────────────────────────────────
function VaultPlus() {
  const [tab, setTab] = useState("overview");
  const [data, setData] = useState(null);

  useEffect(() => {
    const stored = localStorage.getItem(STORAGE_KEY);
    if (stored) {
      try { setData(JSON.parse(stored)); }
      catch (e) { setData({}); }
    } else { setData({}); }
  }, []);

  useEffect(() => {
    if (data) localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }, [data]);

  const upd = (key, val) => setData(d => ({ ...d, [key]: val }));

  if (!data) return <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100vh", color: C.muted }}>Loading...</div>;

  // Stats
  const eurTotal = (data.eurAccounts || []).reduce((s, a) => s + (a.balance || 0), 0);
  const idrTotal = (data.idrAccounts || []).reduce((s, a) => s + (a.balance || 0), 0);
  const eurDebt = (data.debts || []).filter(d => d.currency === "EUR").reduce((s, d) => s + (d.remaining || 0), 0);
  const idrDebt = (data.debts || []).filter(d => d.currency === "IDR").reduce((s, d) => s + (d.remaining || 0), 0);

  const tabs = [
    { id: "overview", label: "Overview" },
    { id: "transactions", label: "Transactions" },
    { id: "monthly", label: "Monthly" },
    { id: "accounts", label: "Accounts" },
    { id: "debts", label: "Debts & Subs" },
    { id: "sync", label: "Sync" },
  ];

  return (
    <div style={{ minHeight: "100vh", background: C.bg }}>
      {/* Header */}
      <div style={{ padding: "16px 24px", borderBottom: `1px solid ${C.border}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 32 }}>
          <div style={{ fontSize: 22, fontWeight: 700, letterSpacing: "-1px" }}>vault<span style={{ color: C.acc }}>+</span></div>
          <Tabs tabs={tabs} active={tab} onChange={setTab} />
        </div>
        <div style={{ textAlign: "right" }}>
          <div style={{ fontSize: 10, color: C.muted, marginBottom: 2, textTransform: "uppercase", letterSpacing: "0.05em" }}>Net Worth</div>
          <div style={{ fontSize: 18, fontWeight: 600, color: C.acc }}>{fmtEUR(eurTotal - eurDebt)}</div>
          <div style={{ fontSize: 12, color: C.blue }}>{fmtIDR(idrTotal - idrDebt)}</div>
        </div>
      </div>

      {/* Content */}
      <div style={{ padding: 24 }}>
        {tab === "overview" && <OverviewView data={data} />}
        {tab === "transactions" && <TransactionsView data={data} upd={upd} />}
        {tab === "monthly" && <MonthlyView data={data} />}
        {tab === "accounts" && <AccountsView data={data} upd={upd} />}
        {tab === "debts" && <DebtsSubsView data={data} upd={upd} />}
        {tab === "sync" && <SyncView data={data} setData={setData} />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<VaultPlus />);
  </script>
</body>
</html>
